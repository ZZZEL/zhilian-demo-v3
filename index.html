    function renderReports() {
      if (activeReportSource === "upload") {
        activeReportSource = "dialog";
      }
      if (!["conversation", "time"].includes(activeReportOrganize)) {
        activeReportOrganize = "time";
      }
      syncReportFilterControls();
      const reports = buildReportCatalog();
      const query = reportsSearch.value.trim().toLowerCase();
      syncAdaptiveSearches();
      const getAssetOriginLabel = (item) => {
        if (item.source === "upload") return "我的上传";
        if (item.source === "dialog") return "对话生成";
        return "";
      };
      const dialogProjectByTitle = reports.reduce((acc, item) => {
        if (item.source === "dialog" && item.title && item.project) {
          acc.set(item.title, item.project);
        }
        return acc;
      }, new Map());
      const sortedConversationHistory = conversationHistory
        .map((item, index) => ({ ...item, index }))
        .sort((a, b) => getHistoryTimestamp(b) - getHistoryTimestamp(a));
      const orderedConversationHistory = [
        ...sortedConversationHistory.filter((item) => item.favorite),
        ...sortedConversationHistory.filter((item) => !item.favorite)
      ];
      const conversationRankByKey = orderedConversationHistory.reduce((acc, item, index) => {
        [item.question, item.title, getHistoryTitle(item)].filter(Boolean).forEach((key) => {
          if (!acc.has(key)) acc.set(key, index);
        });
        return acc;
      }, new Map());
      const getConversationReportGroupLabel = (item) => {
        if (item.source === "upload") {
          return item.sourceQuestion
            || dialogProjectByTitle.get(item.title)
            || (item.project && item.project !== "我的上传" ? item.project : "")
            || item.title
            || "未命名对话";
        }
        return item.project || item.sourceQuestion || item.title || "未命名对话";
      };
      const getConversationReportRank = (item, groupLabel) => {
        const candidates = [item.sourceQuestion, item.project, item.title, groupLabel].filter(Boolean);
        const matchedKey = candidates.find((key) => conversationRankByKey.has(key));
        return matchedKey ? conversationRankByKey.get(matchedKey) : Number.MAX_SAFE_INTEGER;
      };
      const matchesActiveReportSource = (item) => {
        if (activeReportSource === "dialog") return item.source === "dialog" || item.source === "upload";
        return item.source === activeReportSource;
      };
      const visibleReports = reports.filter((item) => {
        const displayTime = formatAssetTime(item.time, item.createdAt || item.updatedAt);
        const formatInfo = getAssetFormatInfo(item);
        const originLabel = getAssetOriginLabel(item);
        const searchable = [
          item.project,
          item.sourceQuestion,
          item.title,
          item.summary,
          item.meta,
          formatInfo.label,
          formatInfo.typeLabel,
          formatInfo.category,
          getConversationReportGroupLabel(item),
          originLabel,
          item.time,
          displayTime
        ].filter(Boolean).join(" ").toLowerCase();
        const matchesFilter = matchesReportFilters(item);
        const matchesSource = matchesActiveReportSource(item);
        return matchesSource && matchesFilter && (!query || searchable.includes(query));
      });
      reportsGrid.classList.toggle("is-dialog-assets", activeReportSource === "dialog");
      reportsGrid.classList.toggle("is-task-assets", activeReportSource === "subscription");
      reportsGrid.classList.remove("is-upload-assets");
      syncReportTaskLayoutToggle();
      syncReportOrganizeControls();
      reportSourceTabs.querySelectorAll("[data-report-source-filter]").forEach((button) => {
        const isActive = button.dataset.reportSourceFilter === activeReportSource;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-selected", String(isActive));
      });
      syncReportFilterControls();
      const filterLabel = getReportFilterSummaryLabel();
      const filterHasValue = activeReportSourceFilter !== "all" || activeReportFormatFilter !== "all";
      reportFilterToggle.classList.toggle("is-filtered", filterHasValue);
      reportFilterValue.textContent = filterHasValue ? filterLabel : "";
      reportFilterToggle.setAttribute("title", `筛选资产：${filterLabel}`);
      reportFilterToggle.setAttribute("aria-label", `筛选资产：${filterLabel}`);
      const previewIsOpen = reportsView.classList.contains("preview-open");
      if (!previewIsOpen) {
        activeReportIndex = "";
      } else if (!visibleReports.some((item) => item.id === activeReportIndex)) {
        activeReportIndex = "";
        closeReportsPreview(true, false);
      }
      let reportCollapseNeedsLayoutSync = false;
      const flushReportCollapseLayoutSync = () => {
        if (!reportCollapseNeedsLayoutSync || pendingReportCollapseLayoutFrame) return;
        pendingReportCollapseLayoutFrame = requestAnimationFrame(() => {
          pendingReportCollapseLayoutFrame = 0;
          const boardInner = reportsGrid.closest(".reports-board-inner");
          const stableWidth = boardInner?.clientWidth || boardInner?.getBoundingClientRect().width || reportsGrid.clientWidth || 0;
          if (stableWidth > 0 && reportsView.classList.contains("active")) {
            renderReports();
          }
        });
      };
      const renderReportCard = (item, options = {}) => {
        const formatInfo = getAssetFormatInfo(item);
        const displayTime = formatAssetTime(item.time, item.createdAt || item.updatedAt) || formatAssetDateTime(new Date(), { allowJustNow: false });
        const tags = (options.tags || []).filter(Boolean);
        const title = item.title || "未命名文件";
        const originLabel = getAssetOriginLabel(item);
        const cardLabel = `${title}，${formatInfo.label}${originLabel ? `，${originLabel}` : ""}，${displayTime}`;
        return `
          <article class="report-card${previewIsOpen && item.id === activeReportIndex ? " is-active" : ""}" role="button" tabindex="0" data-report-id="${escapeHtml(item.id)}" title="${escapeHtml(cardLabel)}" aria-label="${escapeHtml(cardLabel)}">
            <span class="report-file-preview ${escapeHtml(formatInfo.className)}" aria-hidden="true">
              ${originLabel ? `<span class="report-origin-badge">${escapeHtml(originLabel)}</span>` : ""}
              <span class="report-file-symbol">${assetFormatIconSvg(formatInfo.category)}</span>
            </span>
            <span class="case-body report-body">
              <h3>${escapeHtml(title)}</h3>
              <span class="report-time">${escapeHtml(displayTime)}</span>
              ${tags.length ? `<span class="report-card-tags">${tags.map((tag) => `<span>${escapeHtml(tag)}</span>`).join("")}</span>` : ""}
            </span>
          </article>
        `;
      };
      const getReportGroupCollapseConfig = () => {
        const parsePixelValue = (value, fallback = 0) => {
          const match = String(value || "").match(/[\d.]+/);
          return match ? Number(match[0]) : fallback;
        };
        const boardInner = reportsGrid.closest(".reports-board-inner");
        const reportsShell = reportsGrid.closest(".reports-shell");
        const reportsShellStyle = reportsShell ? getComputedStyle(reportsShell) : null;
        const rootStyle = getComputedStyle(document.documentElement);
        const shellPadding = parsePixelValue(reportsShellStyle?.paddingLeft) + parsePixelValue(reportsShellStyle?.paddingRight);
        const sidebarWidth = parsePixelValue(rootStyle.getPropertyValue("--sidebar-width"), 252);
        const reportsViewWidth = reportsView.getBoundingClientRect().width || Math.max(0, window.innerWidth - sidebarWidth);
        const activePreviewWidth = reportsView.classList.contains("preview-open")
          ? parsePixelValue(getComputedStyle(reportsView).getPropertyValue("--reports-preview-cap"))
          : 0;
        const availableViewWidth = Math.max(0, reportsViewWidth - activePreviewWidth);
        const estimatedContentWidth = Math.min(1360, Math.max(0, availableViewWidth - shellPadding));
        const measuredContentWidth = boardInner?.clientWidth
          || boardInner?.getBoundingClientRect().width
          || reportsGrid.clientWidth
          || reportsGrid.getBoundingClientRect().width
          || reportsBoard.clientWidth
          || reportsBoard.getBoundingClientRect().width;
        if (!measuredContentWidth) {
          reportCollapseNeedsLayoutSync = true;
        }
        const availableWidth = measuredContentWidth || estimatedContentWidth;
        const minCardWidth = parsePixelValue(rootStyle.getPropertyValue("--report-card-min"), 220);
        const columnGap = 12;
        const columnCount = Math.max(1, Math.floor((availableWidth + columnGap) / (minCardWidth + columnGap)));
        const maxRows = columnCount >= 5 ? 3 : columnCount >= 4 ? 2 : columnCount >= 3 ? 3 : 4;
        const slotLimit = Math.max(1, columnCount * maxRows);
        return {
          columnCount,
          maxRows,
          slotLimit,
          collapsedItemLimit: Math.max(1, slotLimit - 1)
        };
      };
      const renderReportGroupFiles = (items, expandKey) => {
        const sortedItems = [...items].sort((a, b) => getReportAssetTimestamp(b) - getReportAssetTimestamp(a));
        const collapseConfig = getReportGroupCollapseConfig();
        const isExpanded = expandedReportGroups.has(expandKey);
        const hasOverflow = sortedItems.length > collapseConfig.slotLimit;
        const visibleItems = hasOverflow && !isExpanded
          ? sortedItems.slice(0, collapseConfig.collapsedItemLimit)
          : sortedItems;
        const hiddenItemCount = Math.max(0, sortedItems.length - collapseConfig.collapsedItemLimit);
        const expandSpacerCount = hasOverflow && isExpanded && collapseConfig.columnCount > 1
          ? (collapseConfig.columnCount - 1 - (visibleItems.length % collapseConfig.columnCount) + collapseConfig.columnCount) % collapseConfig.columnCount
          : 0;
        const expandSpacers = Array.from({ length: expandSpacerCount }, () => `<span class="report-group-expand-spacer" aria-hidden="true"></span>`).join("");
        return `
          ${visibleItems.map((item) => renderReportCard(item)).join("")}
          ${expandSpacers}
          ${hasOverflow ? `
            <button class="report-group-expand-card" type="button" data-report-group-expand="${escapeHtml(expandKey)}" aria-expanded="${String(isExpanded)}">
              <span class="report-group-expand-icon" aria-hidden="true">
                <svg viewBox="0 0 48 48">
                  <path d="${isExpanded ? "M24 34V14M14 24l10-10 10 10" : "M24 14v20M14 24l10 10 10-10"}"></path>
                </svg>
              </span>
              <strong>${isExpanded ? "收起" : `展开 ${hiddenItemCount} 个资产`}</strong>
            </button>
          ` : ""}
        `;
      };
      if (activeReportSource === "subscription") {
        const isTaskRows = activeReportTaskLayout === "rows";
        const isTaskExplorer = activeReportTaskLayout === "explorer";
        const taskFilePreviewLimit = window.matchMedia("(max-width: 720px)").matches ? 1 : isTaskRows ? 5 : 3;
        const groups = visibleReports.reduce((acc, item) => {
          const groupKey = item.sourceTaskId || item.project || "未命名任务";
          if (!acc.has(groupKey)) acc.set(groupKey, []);
          acc.get(groupKey).push(item);
          return acc;
        }, new Map());
        const taskGroups = Array.from(groups.entries()).map(([groupKey, items]) => {
          const task = subscriptionTasks.find((item) => item.id === groupKey);
          return {
            groupKey,
            items,
            task,
            groupName: task?.name || items[0]?.project || "未命名任务",
            groupSummary: task?.summary || items[0]?.summary || "任务产出文档"
          };
        });
        if (isTaskExplorer) {
          const sortedTaskReports = [...visibleReports].sort((a, b) => getReportAssetTimestamp(b) - getReportAssetTimestamp(a));
          if (activeReportTaskOrganize === "task") {
            reportsGrid.innerHTML = taskGroups.map(({ groupKey, items, groupName, groupSummary }) => {
              const sortedItems = [...items].sort((a, b) => getReportAssetTimestamp(b) - getReportAssetTimestamp(a));
              const firstReportId = sortedItems[0]?.id || "";
              const expandKey = `subscription:task:${groupKey}`;
              return `
                <section class="report-group report-task-report-group" data-report-task-id="${escapeHtml(groupKey)}">
                  <button class="report-group-source-button report-task-group-source" type="button" data-report-source="${escapeHtml(firstReportId)}" aria-label="跳转至任务">
                    <span class="report-task-group-main">
                      <span class="report-group-heading report-task-group-heading">
                        <strong title="${escapeHtml(groupName)}">${escapeHtml(groupName)}</strong>
                      </span>
                      <span class="report-task-summary report-task-group-description">${escapeHtml(groupSummary)}</span>
                    </span>
                    <span class="report-group-source-icon" aria-hidden="true">跳转至任务</span>
                  </button>
                  <div class="report-group-files">
                    ${renderReportGroupFiles(sortedItems, expandKey)}
                  </div>
                </section>
              `;
            }).join("");
          } else {
            const taskTimeGroups = Array.from(sortedTaskReports.reduce((acc, item) => {
              const groupLabel = getReportTimeGroupLabel(item);
              if (!acc.has(groupLabel)) acc.set(groupLabel, []);
              acc.get(groupLabel).push(item);
              return acc;
            }, new Map()).entries());
            reportsGrid.innerHTML = taskTimeGroups.map(([groupLabel, items]) => {
              const expandKey = `subscription:time:${groupLabel}`;
              return `
                <section class="report-group" data-report-task-id="${escapeHtml(expandKey)}">
                  <div class="report-group-title">
                    <span class="report-group-heading">
                      <strong title="${escapeHtml(groupLabel)}">${escapeHtml(groupLabel)}</strong>
                    </span>
                  </div>
                  <div class="report-group-files">
                    ${renderReportGroupFiles(items, expandKey)}
                  </div>
                </section>
              `;
            }).join("");
          }
        } else {
          reportsGrid.innerHTML = taskGroups.map(({ groupKey, items, groupName, groupSummary }) => {
            const firstReportId = items[0]?.id || "";
            const visibleItems = items.slice(0, taskFilePreviewLimit);
            return `
              <article class="subscription-card report-task-card" data-report-task-id="${escapeHtml(groupKey)}">
                <button class="report-task-header" type="button" data-report-source="${escapeHtml(firstReportId)}" title="跳转至任务" aria-label="跳转至任务：${escapeHtml(groupName)}">
                  <span class="report-task-title-row">
                    <strong>${escapeHtml(groupName)}</strong>
                    <span class="report-task-open-hint" aria-hidden="true">跳转至任务</span>
                  </span>
                  <span class="report-task-summary">${escapeHtml(groupSummary)}</span>
                </button>
                <section class="report-task-files" aria-label="${escapeHtml(groupName)}的任务文件">
                  <div class="report-task-documents">
                    ${visibleItems.map((item) => renderReportCard(item)).join("")}
                  </div>
                </section>
              </article>
            `;
          }).join("");
        }
        reportsLimit.textContent = "";
        reportsEmpty.textContent = query ? "没有匹配的资产" : "暂无来自任务的资产";
        reportsBoard.classList.toggle("has-reports", visibleReports.length > 0);
        scheduleReportStickyHeadersSync();
        flushReportCollapseLayoutSync();
        if (reportsView.classList.contains("preview-open")) {
          const activeReport = visibleReports.find((item) => item.id === activeReportIndex);
          if (activeReport) {
            setReportsPreviewContent(activeReport);
          } else {
            closeReportsPreview(true, false);
          }
        }
        return;
      }
      const sourceEmptyLabels = {
        dialog: "暂无来自对话的资产",
        subscription: "暂无来自任务的资产"
      };
      const visibleDialogReports = [...visibleReports].sort((a, b) => getReportAssetTimestamp(b) - getReportAssetTimestamp(a));
      const reportGroups = (() => {
        const groupedReports = visibleDialogReports.reduce((acc, item) => {
          const groupLabel = activeReportOrganize === "time"
            ? getReportTimeGroupLabel(item)
            : getConversationReportGroupLabel(item);
          if (!acc.has(groupLabel)) acc.set(groupLabel, []);
          acc.get(groupLabel).push(item);
          return acc;
        }, new Map());
        if (activeReportOrganize === "time") return Array.from(groupedReports.entries());
        return Array.from(groupedReports.entries()).sort(([labelA, itemsA], [labelB, itemsB]) => {
          const rankA = Math.min(...itemsA.map((item) => getConversationReportRank(item, labelA)));
          const rankB = Math.min(...itemsB.map((item) => getConversationReportRank(item, labelB)));
          if (rankA !== rankB) return rankA - rankB;
          const latestAssetA = Math.max(...itemsA.map(getReportAssetTimestamp));
          const latestAssetB = Math.max(...itemsB.map(getReportAssetTimestamp));
          return latestAssetB - latestAssetA;
        });
      })();
      reportsGrid.innerHTML = reportGroups.map(([groupLabel, items]) => {
        const sourceReportId = activeReportOrganize === "conversation" ? items[0]?.id || "" : "";
        const titleContent = sourceReportId ? `
          <button class="report-group-source-button" type="button" data-report-source="${escapeHtml(sourceReportId)}" aria-label="跳转至对话">
            <span class="report-group-heading">
              <strong>${escapeHtml(groupLabel)}</strong>
            </span>
            <span class="report-group-source-icon" aria-hidden="true">跳转至对话</span>
          </button>
        ` : `
          <span class="report-group-heading">
            <strong title="${escapeHtml(groupLabel)}">${escapeHtml(groupLabel)}</strong>
          </span>
        `;
        return `
          <section class="report-group">
            <div class="report-group-title">
              ${titleContent}
            </div>
            <div class="report-group-files">
              ${renderReportGroupFiles(items, `dialog:${activeReportOrganize}:${groupLabel}`)}
            </div>
          </section>
        `;
      }).join("");
      reportsLimit.textContent = "";
      reportsEmpty.textContent = query ? "没有匹配的资产" : sourceEmptyLabels[activeReportSource] || "暂无资产";
      reportsBoard.classList.toggle("has-reports", visibleReports.length > 0);
      scheduleReportStickyHeadersSync();
      flushReportCollapseLayoutSync();
      if (reportsView.classList.contains("preview-open")) {
        const activeReport = visibleReports.find((item) => item.id === activeReportIndex);
        if (activeReport) {
          setReportsPreviewContent(activeReport);
        } else {
          closeReportsPreview(true, false);
        }
      }
    }

    function setReportsPreviewContent(report) {
      const sourceLabel = report.source === "subscription" ? "跳转至任务" : "跳转至对话";
      const hasSourceAction = Boolean(report.id);
      reportsPanelTitle.textContent = report.title;
      reportsPanelSource.hidden = !hasSourceAction;
      if (hasSourceAction) {
        reportsPanelSource.dataset.reportSource = report.id;
        reportsPanelSource.setAttribute("title", sourceLabel);
        reportsPanelSource.setAttribute("aria-label", sourceLabel);
      } else {
        delete reportsPanelSource.dataset.reportSource;
        reportsPanelSource.removeAttribute("title");
        reportsPanelSource.removeAttribute("aria-label");
      }
      reportsPanelDownload.setAttribute("href", report.fileHref || DEFAULT_REPORT_FILE);
      reportsPanelBody.className = "preview-body";
      reportsPanelBody.innerHTML = `
        <iframe class="preview-frame" src="${escapeHtml(report.previewHref || DEFAULT_REPORT_PREVIEW)}" title="报告预览"></iframe>
      `;
    }

    function revealSubscriptionCard(taskId) {
      const task = subscriptionTasks.find((item) => item.id === taskId);
      if (!task) return;
      subscriptionsSearch.value = "";
      subscriptionHighlightId = task.id;
      clearTimeout(subscriptionHighlightTimer);
      closeReportsPreview(true);
      showSubscriptions();
      setSubscriptionView("list", { render: false });
      requestAnimationFrame(() => {
        const card = Array.from(subscriptionGrid.querySelectorAll("[data-subscription-id]")).find((item) => item.dataset.subscriptionId === task.id);
        if (!card) return;
        card.scrollIntoView({ block: "center", behavior: "smooth" });
        card.focus({ preventScroll: true });
        subscriptionHighlightTimer = setTimeout(() => {
          subscriptionHighlightId = "";
          card.classList.remove("is-source-highlight");
        }, 3200);
      });
    }

    function openReportSourceConversation(reportId) {
      const report = buildReportCatalog().find((item) => item.id === reportId);
      if (!report) return;
      if (report.source === "subscription") {
        revealSubscriptionCard(report.sourceTaskId);
        return;
      }
      const sourceQuestion = report.sourceQuestion || (report.source === "upload" ? report.title : report.project) || report.title;
      const existing = conversationHistory.find((item) => item.question === sourceQuestion);
      closeReportsPreview(true);
      if (existing?.messagesHtml) {
        showHistoryRecord(existing);
        return;
      }
      if (report.sourceScenarioKey && report.sourceScenarioKey !== "custom") {
        runAnalysis(report.sourceScenarioKey, sourceQuestion);
        return;
      }
      runQaAnalysis(sourceQuestion);
    }

    function updateReportsPreviewCap() {
      const sidebarWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-width")) || 0;
      const viewWidth = reportsView.getBoundingClientRect().width || Math.max(0, window.innerWidth - sidebarWidth);
      if (!viewWidth) return;
      const previewCap = Math.floor(viewWidth * 2 / 5);
      reportsView.style.setProperty("--reports-preview-cap", `${Math.max(0, previewCap)}px`);
    }

    function scheduleReportsLayoutRender(delay = 0) {
      const render = () => {
        if (reportsView.classList.contains("active")) {
          renderReports();
        }
      };
      if (delay) {
        setTimeout(render, delay);
        return;
      }
      requestAnimationFrame(render);
    }

    function scheduleReportBoardWidthRender() {
      if (pendingReportBoardResizeFrame) return;
      pendingReportBoardResizeFrame = requestAnimationFrame(() => {
        pendingReportBoardResizeFrame = 0;
        if (!reportsView.classList.contains("active") || !reportsGrid.classList.contains("is-grouped-assets")) return;
        const currentWidth = Math.round(reportsBoardInner?.getBoundingClientRect().width || reportsBoardInner?.clientWidth || 0);
        if (!currentWidth || Math.abs(currentWidth - lastReportBoardInnerWidth) < 1) return;
        lastReportBoardInnerWidth = currentWidth;
        renderReports();
      });
    }

    function openReportsPreviewPanel(id) {
      const report = buildReportCatalog().find((item) => item.id === id);
      if (!report) return;
      activeReportIndex = id;
      document.activeElement?.blur?.();
      updateReportsPreviewCap();
      setReportsPreviewContent(report);
      reportsPreview.setAttribute("aria-hidden", "false");
      reportsView.classList.remove("preview-closing");
      reportsView.classList.add("preview-open");
      renderReports();
      scheduleReportsLayoutRender();
      scheduleReportsLayoutRender(340);
    }

    function closeReportsPreview(immediate = false, renderList = true) {
      activeReportIndex = "";
      if (immediate) {
        reportsView.classList.remove("preview-open", "preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");
        if (renderList && reportsView.classList.contains("active")) {
          renderReports();
        }
        return;
      }
      if (!reportsView.classList.contains("preview-open")) {
        reportsView.classList.remove("preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");
        if (renderList && reportsView.classList.contains("active")) {
          renderReports();
        }
        return;
      }
      reportsView.classList.remove("preview-open");
      reportsView.classList.add("preview-closing");
      if (renderList && reportsView.classList.contains("active")) {
        renderReports();
      }
      setTimeout(() => {
        reportsView.classList.remove("preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");
        if (renderList && reportsView.classList.contains("active")) {
          renderReports();
        }
      }, 320);
    }

    function addHistoryEntry(question, scenarioKey, toolState = activeToolState, capabilityState = activeCapabilityState) {
      const existing = conversationHistory.find((item) => item.question === question);
      const now = Date.now();
      conversationHistory = conversationHistory.filter((item) => item.question !== question);
      conversationHistory.unshift({
        question,
        scenarioKey,
        title: existing?.title || getDefaultHistoryTitle(question, scenarioKey) || "",
        titleManual: Boolean(existing?.titleManual),
        favorite: Boolean(existing?.favorite),
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        toolState: normalizeToolState(toolState),
        capabilityState: normalizeCapabilityState(capabilityState),
        messagesHtml: stripReportArtifacts(existing?.messagesHtml || ""),
        latestUserText: question,
        reportTitle: "",
        reportMeta: "",
        reportTime: "",
        seedKey: existing?.seedKey || "",
        seedVersion: Number(existing?.seedVersion || 0)
      });
      conversationHistory = conversationHistory.slice(0, 40);
      persistHistory();
      renderHistory();
      renderHistorySearchResults();
    }

    function saveHistorySnapshot(question) {
      const index = conversationHistory.findIndex((item) => item.question === question);
      if (index < 0) return;
      const snapshot = messages.cloneNode(true);
      snapshot.querySelectorAll("[data-live-process]").forEach((node) => node.removeAttribute("data-live-process"));
      snapshot.querySelectorAll("[data-live-file]").forEach((node) => node.remove());
      const latestUserText = Array.from(snapshot.querySelectorAll(".message.user .bubble")).at(-1)?.textContent?.trim() || question;
      conversationHistory[index] = {
        ...conversationHistory[index],
        updatedAt: Date.now(),
        toolState: normalizeToolState(activeRunToolState),
        capabilityState: normalizeCapabilityState(activeRunCapabilityState),
        messagesHtml: snapshot.innerHTML,
        latestUserText,
        reportTitle: "",
        reportMeta: "",
        reportTime: ""
      };
      persistHistory();
      renderHistory();
      renderHistorySearchResults();
    }

    function showHistoryRecord(record) {
      activeRunId += 1;
      setGenerating(false);
      activeHistoryQuestion = record.question;
      activeToolState = normalizeToolState(record.toolState || activeToolState);
      activeCapabilityState = normalizeCapabilityState(record.capabilityState || null);
      activeRunCapabilityState = activeCapabilityState;
      activeRunToolState = activeToolState;
      applyToolState(questionForm, activeToolState);
      applyToolState(chatForm, activeToolState);
      renderCapabilityControls();
      renderHistory();
      showChat({ toolState: activeToolState, capabilityState: activeCapabilityState });
      clearChatInput();
      questionInput.value = "";
      messages.innerHTML = record.messagesHtml || "";
      suppressAutoScroll = false;
      closeReportsPreview(true);
      requestAnimationFrame(() => {
        messages.scrollTo({ top: messages.scrollHeight, behavior: "auto" });
      });
    }

    function setSidebarActive(view) {
      newChatBtn.classList.remove("is-active");
      reportsBtn.classList.toggle("is-active", view === "reports");
      agentsBtn.classList.toggle("is-active", view === "agents" || view === "skills");
      skillsBtn.classList.toggle("is-active", false);
      subscriptionsBtn.classList.toggle("is-active", view === "subscriptions");
    }

    function syncPluginTabs(activeTab) {
      document.querySelectorAll("[data-plugin-tab]").forEach((button) => {
        const isActive = button.dataset.pluginTab === activeTab;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-selected", String(isActive));
      });
      document.querySelectorAll("[data-plugin-tools]").forEach((group) => {
        const isActive = group.dataset.pluginTools === activeTab;
        group.classList.toggle("is-active", isActive);
        group.hidden = !isActive;
      });
      document.querySelectorAll("[data-plugin-panel]").forEach((panel) => {
        panel.hidden = panel.dataset.pluginPanel !== activeTab;
      });
    }

    function switchPluginContent(activeTab, options = {}) {
      setSidebarActive("agents");
      syncPluginTabs(activeTab);
      if (activeTab === "skills") {
        renderSkills();
      } else {
        renderAgents();
      }
      if (options.updateHash !== false) {
        const nextHash = activeTab === "skills" ? "#skills" : "#agents";
        if (location.hash !== nextHash) {
          history.pushState({ view: activeTab }, "", nextHash);
        }
      }
    }

    function resetPluginModuleState() {
      activeAgentId = "";
      activeAgentFilter = "all";
      activeSkillId = "";
      activeSkillFilter = "all";
      activePluginView = "card";
      if (agentsSearch) {
        agentsSearch.value = "";
        syncAdaptiveSearch(agentsSearch);
      }
      if (skillsSearch) {
        skillsSearch.value = "";
        syncAdaptiveSearch(skillsSearch);
      }
      renderPluginViewControls();
    }

    function showChat(options = {}) {
      resetPluginModuleState();
      activeToolState = normalizeToolState(options.toolState || activeToolState);
      const nextCapabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeCapabilityState = options.keepCapabilityInComposer ? nextCapabilityState : null;
      applyToolState(questionForm, activeToolState);
      applyToolState(chatForm, activeToolState);
      renderCapabilityControls();
      if (document.activeElement && typeof document.activeElement.blur === "function") {
        document.activeElement.blur();
      }
      forcePageTop();
      messages.innerHTML = "";
      closePreview(true);
      closeReportsPreview(true);
      closeDetail();
      suppressAutoScroll = true;
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.remove("active");
      chatView.classList.add("active");
      setSidebarActive("");
      if (location.hash !== "#chat") {
        history.pushState({ view: "chat" }, "", "#chat");
      }
      forcePageTop();
      requestAnimationFrame(forcePageTop);
      setTimeout(forcePageTop, 80);
    }

    function showHome() {
      resetPluginModuleState();
      activeRunId += 1;
      messages.innerHTML = "";
      closePreview(true);
      closeReportsPreview(true);
      closeDetail();
      chatView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.remove("active");
      homeView.classList.add("active");
      questionInput.value = "";
      clearAttachments("home");
      clearChatInput();
      applyToolState(questionForm, activeToolState);
      applyToolState(chatForm, activeToolState);
      renderCapabilityControls();
      setGenerating(false);
      activeHistoryQuestion = "";
      renderHistory();
      selectedScenarioKey = null;
      setSidebarActive("home");
      if (location.hash === "#chat" || location.hash === "#reports" || location.hash === "#agents" || location.hash === "#skills" || location.hash === "#subscriptions") {
        history.pushState({ view: "home" }, "", location.pathname);

    async function typeText(target, content, runId, speed = 15) {
      target.textContent = "";
      for (let i = 0; i < content.length; i += 1) {
        if (activeRunId !== runId) return false;
        target.textContent += content[i];
        if (i % 3 === 0) scrollToBottom();
        const char = content[i];
        await sleep(char === "\n" ? 180 : /[。；，、]/.test(char) ? speed * 4 : speed);
      }
      scrollToBottom();
      return true;
    }

    async function typeParagraphs(target, content, runId, speed = 12) {
      target.innerHTML = "";
      const paragraphs = content.split("\n").filter(Boolean);
      for (let i = 0; i < paragraphs.length; i += 1) {
        if (activeRunId !== runId) return false;
        const paragraph = document.createElement("p");
        target.appendChild(paragraph);
        const complete = await typeText(paragraph, paragraphs[i], runId, speed);
        if (!complete) return false;
        if (i < paragraphs.length - 1) await sleep(210);
      }
      return true;
    }

    function openReportPanel(options = {}) {

    function getSourceInitial(source) {
      const normalized = String(source || "").trim();
      if (!normalized) return "S";
      const firstAscii = normalized.match(/[A-Za-z]/);
      return firstAscii ? firstAscii[0].toUpperCase() : normalized.slice(0, 1);
    }

    function getHostname(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return "";
      }
    }

    function getFaviconUrl(url) {
      const hostname = getHostname(url);
      return hostname ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostname)}&sz=32` : "";
    }

    function renderSearchResultCard(item, index) {
      const faviconUrl = getFaviconUrl(item.url);
      return `
        <a class="search-result-card" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">
          ${faviconUrl
          ? `<img class="search-result-favicon" src="${escapeHtml(faviconUrl)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: 'search-result-fallback', textContent: '${escapeHtml(getSourceInitial(item.source))}' }))">`
          : `<span class="search-result-fallback" aria-hidden="true">${escapeHtml(getSourceInitial(item.source))}</span>`}
          <span class="search-result-main">
            <strong>${escapeHtml(item.title)}</strong>
            <p>${escapeHtml(item.summary)}</p>
          </span>
        </a>
      `;
    }

    function renderSearchStatus(group, revealCount) {
      const isComplete = revealCount >= group.results.length;
      return `
        <div class="search-status${isComplete ? " is-complete" : ""}" data-search-status>
          <span class="search-status-main">已识别到 ${Math.min(revealCount, group.results.length)} 个相关结果</span>
        </div>
      `;
    }

    function renderSearchResults(group, revealCount) {
      const visibleResults = group.results.slice(0, revealCount);
      return `
        ${renderSearchStatus(group, revealCount)}
        <div class="search-results" data-search-results>
          ${visibleResults.map((item, index) => renderSearchResultCard(item, index)).join("")}
        </div>
      `;
    }

    function openSearchPanel(searchKey, query, options = {}) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (options.auto && sidePanelDismissed) return;
      const revealCount = typeof options.revealCount === "number" ? options.revealCount : group.results.length;
      panelKicker.textContent = "检索结果";
      panelTitle.textContent = query || group.title;
      panelDownload.style.display = "none";
      panelBody.className = "preview-body search-results-body";
      panelBody.innerHTML = renderSearchResults(group, Math.min(revealCount, group.results.length));
      renderedSearchKey = searchKey;
      renderedSearchCount = Math.min(revealCount, group.results.length);
      openSidePanel(options);
    }

    function appendSearchResults(searchKey, query, revealCount, options = {}) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (options.auto && sidePanelDismissed) return;
      const nextCount = Math.min(revealCount, group.results.length);
      if (renderedSearchKey !== searchKey || panelBody.className !== "preview-body search-results-body") {
        openSearchPanel(searchKey, query || group.title, { ...options, revealCount: nextCount });
        return;
      }
      panelKicker.textContent = "检索结果";
      panelTitle.textContent = query || group.title;
      panelDownload.style.display = "none";
      openSidePanel(options);
      const list = panelBody.querySelector("[data-search-results]");
      if (!list) {
        openSearchPanel(searchKey, query || group.title, { ...options, revealCount: nextCount });
        return;
      }
      const status = panelBody.querySelector("[data-search-status]");
      if (status) {
        status.outerHTML = renderSearchStatus(group, nextCount);
      }
      for (let i = renderedSearchCount; i < nextCount; i += 1) {
        list.insertAdjacentHTML("beforeend", renderSearchResultCard(group.results[i], i));
      }
      renderedSearchCount = nextCount;
      panelBody.scrollTo({ top: panelBody.scrollHeight, behavior: "smooth" });
    }

    function startAutoSearchPanel(searchKey) {
      if (sidePanelDismissed) return;
      if (activeAutoSearchKey !== searchKey) {
        activeAutoSearchKey = searchKey;
        activeAutoSearchCount = 0;
      }
      const group = searchResultGroups[searchKey];
      openSearchPanel(searchKey, group?.title, { auto: true, revealCount: activeAutoSearchCount });
    }

    function revealAutoSearchResult(searchKey) {
      if (sidePanelDismissed) return;
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (activeAutoSearchKey !== searchKey) {
        activeAutoSearchKey = searchKey;
        activeAutoSearchCount = 0;
      }
      activeAutoSearchCount = Math.min(activeAutoSearchCount + 1, group.results.length);
      appendSearchResults(searchKey, group.title, activeAutoSearchCount, { auto: true });
    }

    function searchRevealDelay(index, total) {
      const cadence = [190, 250, 220, 300, 210, 270, 240];
      const densityAdjustment = total > 10 ? -45 : total < 5 ? 55 : 0;
      return Math.max(170, cadence[index % cadence.length] + densityAdjustment);
    }

    async function revealSearchResultsForChip(searchKey, runId) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (sidePanelDismissed) {
        await sleep(900);
        return true;
      }
      startAutoSearchPanel(searchKey);
      await sleep(280);
      for (let i = activeAutoSearchCount; i < group.results.length; i += 1) {
        if (activeRunId !== runId) return false;
        if (sidePanelDismissed) return true;
        revealAutoSearchResult(searchKey);
        await sleep(searchRevealDelay(i, group.results.length));
        if ((i + 1) % 5 === 0 && i + 1 < group.results.length) {
          await sleep(260);
        }
      }
      await sleep(group.results.length >= 10 ? 1650 : group.results.length <= 4 ? 1150 : 1400);
      return true;
    }

    function closePreview(immediate = false, userInitiated = false) {
      clearTimeout(previewCloseTimer);
      if (userInitiated) sidePanelDismissed = true;
      if (immediate) {
        chatView.classList.remove("preview-open", "preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
        return;
      }
      if (!chatView.classList.contains("preview-open")) {
        chatView.classList.remove("preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
        return;
      }
      chatView.classList.remove("preview-open");
      chatView.classList.add("preview-closing");
      previewCloseTimer = setTimeout(() => {
        chatView.classList.remove("preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
      }, 320);
    }

    function appendProcessStep(card, step, index) {
      const list = card.querySelector(".process-list");
      const el = document.createElement("div");
      el.className = "process-step active";
      el.dataset.step = index;
      el.dataset.summary = step.summary || `${step.title}已完成`;
      const sections = step.sections || [{
        title: step.title,
        icon: step.icon,
        text: step.text,
        summary: step.summary,
        chips: step.chips || []
      }];
      const inner = `<div class="step-sections">${sections.map(renderSection).join("")}</div>`;
      el.innerHTML = `
        <div class="step-dot">${index + 1}</div>
        <div class="step-copy">
          ${step.sections ? `<strong>${stepTitleIcon(step.icon)}${step.title}</strong><p>${step.text}</p>` : ""}
          ${inner}
        </div>
      `;
      list.appendChild(el);
      scrollToBottom();
      return el;
    }

    function compactProcessStep(stepEl) {
      if (stepEl.classList.contains("compacted")) return;
      stepEl.classList.add("compacted");
      const sections = stepEl.querySelectorAll(".step-section");
      if (sections.length) {
        sections.forEach((section) => section.classList.add("collapsed"));
        return;
      }
      const copy = stepEl.querySelector(".step-copy");
      const summary = document.createElement("div");
      summary.className = "step-summary";
      summary.innerHTML = `${chipIcon("shield")}${escapeHtml(stepEl.dataset.summary || "已完成")}`;
      copy.appendChild(summary);
    }

    function expandProcessStep(stepEl) {
      stepEl.classList.remove("compacted");
      stepEl.querySelector(".step-summary")?.remove();
      stepEl.querySelectorAll(".step-section.collapsed").forEach((section) => section.classList.remove("collapsed"));
    }

    async function revealProcessStep(stepEl, runId, timings) {
      const chips = Array.from(stepEl.querySelectorAll("[data-chip]"));
      for (let i = 0; i < chips.length; i += 1) {
        if (activeRunId !== runId) return false;
        const chip = chips[i];
        chip.classList.remove("queued");
        chip.classList.add("loading");
        if (chip.dataset.searchKey) {
          const searchComplete = await revealSearchResultsForChip(chip.dataset.searchKey, runId);
          if (!searchComplete) return false;
        } else {
          scrollToBottom();
          await sleep(timings.chip[i] || timings.chip[0] || 720);
          if (activeRunId !== runId) return false;
        }
        chip.classList.remove("loading");
        chip.classList.add("done");
        scrollToBottom();
      }
      await sleep(timings.after || 260);
      return true;
    }

    async function showPlannedNodes(card, runId, steps = processSteps) {
      const planning = card.querySelector(".planning-step");
      if (!planning) return false;
      planning.querySelector(".planning-nodes").innerHTML = steps
        .map((step, index) => `<span class="plan-node queued" data-chip><span class="plan-index">${index + 1}</span><span class="plan-title">${escapeHtml(step.title)}</span></span>`)
        .join("");
      card.classList.add("planned");
      card.querySelector("[data-process-summary]").textContent = `已规划 ${steps.length} 个步骤`;
      const keepGoing = await revealProcessStep(planning, runId, {
        chip: [300, 350, 350, 320, 350, 300],
        after: 720
      });
      if (!keepGoing) return false;
      planning.classList.remove("active");
      planning.classList.add("done");
      planning.querySelector(".step-dot").textContent = "✓";
      return true;
    }

    function setProcessState(card, activeIndex, steps = processSteps) {
      card.querySelectorAll(".process-step").forEach((step, index) => {
        step.classList.toggle("active", index === activeIndex);
        step.classList.toggle("done", index < activeIndex);
        if (index < activeIndex) {
          compactProcessStep(step);
        } else if (index === activeIndex) {
          expandProcessStep(step);
        }
        const dot = step.querySelector(".step-dot");
        dot.textContent = index < activeIndex ? "✓" : index + 1;
      });
      if (activeIndex >= steps.length) {
        card.querySelector("[data-process-summary]").textContent = "执行流程已完成";
      }
    }

    function buildQaAnswer(question) {

首先确认问题对应的对象和时间范围，避免把短期扰动误判为长期趋势。其次补充近期公开信息，例如价格、天气、港口、履约、政策或信用风险等信号，判断这些信号是否已经影响到业务执行。最后把判断转换成可操作阈值：什么情况下继续观察，什么情况下需要升级审批，什么情况下应立即调整计划。

    async function runAnalysis(scenarioKey, customQuestion, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(options.toolState || activeToolState);
      const capabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeToolState = toolState;
      activeRunToolState = toolState;
      activeCapabilityState = capabilityState;
      activeRunCapabilityState = capabilityState;
      sidePanelDismissed = false;
      activeAutoSearchKey = "";
      activeAutoSearchCount = 0;
      const baseData = scenarioData[scenarioKey] || scenarioData.custom;
      const data = { ...baseData, question: customQuestion || baseData.question };
      const activeProcessSteps = data.processSteps || processSteps;

      try {
        activeHistoryQuestion = data.question;
        if (options.saveHistory !== false) {
          addHistoryEntry(data.question, scenarioKey, toolState, capabilityState);
        } else {
          renderHistory();
        }
        showChat({ toolState, capabilityState });
        addMessage("user", data.question, options.attachments || [], capabilityState);

        const assistantOutput = createAssistantTurn();
        const processCard = addProcessCard(assistantOutput);
        requestAnimationFrame(forcePageTop);
        await sleep(4200);
        if (activeRunId !== runId) return;
        suppressAutoScroll = false;
        const planned = await showPlannedNodes(processCard, runId, activeProcessSteps);
        if (!planned || activeRunId !== runId) return;
        await sleep(1200);
        if (activeRunId !== runId) return;
        processCard.querySelector(".planning-step")?.remove();
        processCard.classList.remove("planning-card");
        processCard.querySelector("[data-process-summary]").textContent = "执行流程";

        for (let i = 0; i < activeProcessSteps.length; i += 1) {
          if (activeRunId !== runId) return;
          const stepEl = appendProcessStep(processCard, activeProcessSteps[i], i);
          setProcessState(processCard, i);
          const keepGoing = await revealProcessStep(stepEl, runId, processTimings[i] || { chip: [760], after: 420, pause: 220 });
          if (!keepGoing) return;
          setProcessState(processCard, i + 1);
          await sleep((processTimings[i] || { pause: 220 }).pause);
        }

        if (activeRunId !== runId) return;
        setProcessState(processCard, activeProcessSteps.length);
        if (!sidePanelDismissed) {
          closePreview(false);
        }
        await addResultBubble(assistantOutput, data, runId);
        if (activeRunId !== runId) return;
        const reportCard = addReportFileCard(assistantOutput, data);
        if (reportCard) {
          openReportPanel({
            auto: true,
            title: data.fileTitle,
            fileHref: data.fileHref,
            previewHref: data.previewHref
          });
        }
        saveHistorySnapshot(data.question);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    async function runQaAnalysis(question) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(activeToolState);
      const capabilityState = normalizeCapabilityState(activeCapabilityState);
      activeCapabilityState = capabilityState;
      activeRunToolState = toolState;
      activeRunCapabilityState = capabilityState;
      sidePanelDismissed = false;
      activeAutoSearchKey = "";
      activeAutoSearchCount = 0;
      const profile = qaCaseProfiles[question] || {};
      const steps = profile.steps || qaProcessSteps;
      const data = {
        question,
        final: profile.answer || buildQaAnswer(question)
      };

      try {
        activeHistoryQuestion = data.question;
        addHistoryEntry(data.question, "custom", toolState, capabilityState);
        showChat({ toolState, capabilityState });
        addMessage("user", data.question, [], capabilityState);

        const assistantOutput = createAssistantTurn();
        const processCard = addQaProcessCard(assistantOutput);
        suppressAutoScroll = false;
        await sleep(520);
        for (let i = 0; i < steps.length; i += 1) {
          if (activeRunId !== runId) return;
          const stepEl = appendProcessStep(processCard, steps[i], i);
          setProcessState(processCard, i, steps);
          const keepGoing = await revealProcessStep(stepEl, runId, qaProcessTimings[i] || { chip: [520], after: 320, pause: 120 });
          if (!keepGoing) return;
          setProcessState(processCard, i + 1, steps);
          await sleep((qaProcessTimings[i] || { pause: 120 }).pause);
        }

        if (activeRunId !== runId) return;
        setProcessState(processCard, steps.length, steps);
        if (!sidePanelDismissed) {
          closePreview(false);
        }
        await addResultBubble(assistantOutput, data, runId);
        saveHistorySnapshot(data.question);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    async function runFollowUp(question, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      activeToolState = normalizeToolState(options.toolState || activeToolState);
      activeCapabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);

        }
      } finally {

          setGenerating(false);
        }
      }
    }

    async function runUploadDemo(question, attachments, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(options.toolState || activeToolState);
      const capabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeToolState = toolState;
      activeRunToolState = toolState;
      activeCapabilityState = capabilityState;
      activeRunCapabilityState = capabilityState;
      const displayQuestion = question || "请基于上传文件进行分析";
      try {
        if (!options.preserveChat) {
          activeHistoryQuestion = displayQuestion;
          addHistoryEntry(displayQuestion, "custom", toolState, capabilityState);
          showChat({ toolState, capabilityState });
        } else {
          applyToolState(chatForm, toolState);
          applyToolState(questionForm, toolState);
          renderCapabilityControls();
        }
        addMessage("user", displayQuestion, attachments, capabilityState);

        const assistantOutput = createAssistantTurn();
        await sleep(420);
        if (activeRunId !== runId) return;
        const fileNames = attachments.map((file) => `《${file.name}》`).join("、");
        await addAssistantBubble(assistantOutput, `已收到 ${fileNames || "上传文件"}。当前版本暂未接入文件解析能力，因此不会读取文件内容；后续接入 LLM 和解析服务后，会将文件内容作为研判上下文参与分析。`, runId);
        saveHistorySnapshot(options.preserveChat && activeHistoryQuestion ? activeHistoryQuestion : displayQuestion);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    });
    subscriptionCancelBtn.addEventListener("click", closeSubscriptionModal);
    subscriptionModalClose.addEventListener("click", closeSubscriptionModal);
    subscriptionModal.addEventListener("click", (event) => {
      if (event.target === subscriptionModal) closeSubscriptionModal();
    });
    document.addEventListener("click", (event) => {
      if (event.target.closest(".subscription-schedule")) return;
      closeSubscriptionScheduleMenus();
    });
    document.addEventListener("click", (event) => {
      const reportButton = event.target.closest("[data-open-subscription-report]");
      if (!reportButton) return;
      event.preventDefault();
      event.stopPropagation();
      openSubscriptionReport(reportButton.dataset.openSubscriptionReport);
    });
    subscriptionGrid.addEventListener("click", (event) => {
      const actionTrigger = event.target.closest(".subscription-action-trigger");
      if (actionTrigger) {
        event.stopPropagation();
        actionTrigger.blur();
        return;
      }
      const action = event.target.closest("[data-subscription-action]");
      if (action) {
        event.stopPropagation();
        action.blur();
        applySubscriptionAction(action.dataset.subscriptionAction);
        return;
      }
      const skipAction = event.target.closest("[data-subscription-skip]");
      if (skipAction) {
        event.stopPropagation();
        skipAction.blur();
        skipSubscriptionNextRun(skipAction.dataset.subscriptionSkip);
        return;
      }
      const enableAction = event.target.closest("[data-subscription-enable]");
      if (enableAction) {
        event.stopPropagation();
        enableAction.blur();
        enableSubscriptionTask(enableAction.dataset.subscriptionEnable);
        return;
      }
      const deleteAction = event.target.closest("[data-subscription-delete]");
      if (deleteAction) {
        event.stopPropagation();
        deleteAction.blur();
        deleteSubscriptionTask(deleteAction.dataset.subscriptionDelete);
        return;
      }
      if (event.target.closest("[data-open-subscription-report]")) return;
      if (event.target.closest("[data-open-agent]") || event.target.closest("[data-open-skill]")) return;
      const detailTrigger = event.target.closest("[data-subscription-detail]");
      if (!detailTrigger) return;
      detailTrigger.blur();
      const task = subscriptionTasks.find((item) => item.id === detailTrigger.dataset.subscriptionDetail);
      fillSubscriptionEditForm(task);
      renderSubscriptions();
    });
    subscriptionGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const detailTrigger = event.target.closest("[data-subscription-detail]");
      if (!detailTrigger) return;
      event.preventDefault();
      const task = subscriptionTasks.find((item) => item.id === detailTrigger.dataset.subscriptionDetail);
      fillSubscriptionEditForm(task);
      renderSubscriptions();
    });
    subscriptionCalendarGrid.addEventListener("click", (event) => {
      const calendarEvent = event.target.closest("[data-calendar-task]");
      if (!calendarEvent) return;
      calendarEvent.blur();
      const task = subscriptionTasks.find((item) => item.id === calendarEvent.dataset.calendarTask);
      fillSubscriptionEditForm(task);
      renderSubscriptions();
    });
    subscriptionCalendarGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const calendarEvent = event.target.closest("[data-calendar-task]");
      if (!calendarEvent) return;
      event.preventDefault();
      const task = subscriptionTasks.find((item) => item.id === calendarEvent.dataset.calendarTask);
      fillSubscriptionEditForm(task);
      renderSubscriptions();
    });
    agentsGrid.addEventListener("click", (event) => {
      const card = event.target.closest("[data-agent-id]");
      if (!card) return;
      activeAgentId = card.dataset.agentId;
      openDetail(buildAgentDetailHtml(agentCatalog.find((agent) => agent.id === activeAgentId)));
    });
    skillsGrid.addEventListener("click", (event) => {
      const toggle = event.target.closest("[data-skill-toggle]");
      if (toggle) {
        event.stopPropagation();
        toggleSkillEnabled(toggle.dataset.skillToggle);
        return;
      }
      const card = event.target.closest("[data-skill-id]");
      if (!card) return;
      activeSkillId = card.dataset.skillId;
      openDetail(buildSkillDetailHtml(skillCatalog.find((skill) => skill.id === activeSkillId)));
    });
    skillsGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      if (event.target.closest("[data-skill-toggle]")) return;
      const card = event.target.closest("[data-skill-id]");
      if (!card) return;
      event.preventDefault();
      activeSkillId = card.dataset.skillId;
      openDetail(buildSkillDetailHtml(skillCatalog.find((skill) => skill.id === activeSkillId)));
    });
    document.addEventListener("click", (event) => {
      const skillToggle = event.target.closest("[data-skill-toggle]");
      if (skillToggle) {
        toggleSkillEnabled(skillToggle.dataset.skillToggle);
        return;
      }
      const skillLink = event.target.closest("[data-open-skill]");
      if (skillLink) {
        activeSkillId = skillLink.dataset.openSkill;
        activeSkillFilter = "all";
        showSkills();
        openDetail(buildSkillDetailHtml(skillCatalog.find((skill) => skill.id === activeSkillId)));
        return;
      }
      const agentLink = event.target.closest("[data-open-agent]");
      if (agentLink) {
        activeAgentId = agentLink.dataset.openAgent;
        activeAgentFilter = "all";
        showAgents();
        openDetail(buildAgentDetailHtml(agentCatalog.find((agent) => agent.id === activeAgentId)));
      }
    });
    historySearch.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        event.preventDefault();
        closeHistorySearch({ restoreFocus: true });
        return;
      }
      if (event.key === "Enter") {
        const result = historySearchResults.querySelector("[data-history-search-open]");
        if (!result) return;
        event.preventDefault();
        openHistoryRecord(Number(result.dataset.historySearchOpen));
        return;
      }
      if (event.key === "ArrowDown") {
        const firstResult = historySearchResults.querySelector("[data-history-search-open]");
        if (!firstResult) return;
        event.preventDefault();
        firstResult.focus();
      }
    });
    historySearchResults.addEventListener("click", (event) => {
      const result = event.target.closest("[data-history-search-open]");
      if (!result) return;
      openHistoryRecord(Number(result.dataset.historySearchOpen));
    });
    historySearchResults.addEventListener("keydown", (event) => {
      const result = event.target.closest("[data-history-search-open]");
      if (!result) return;
      const results = Array.from(historySearchResults.querySelectorAll("[data-history-search-open]"));
      const currentIndex = results.indexOf(result);
      if (event.key === "Escape") {
        event.preventDefault();
        closeHistorySearch({ restoreFocus: true });
        return;
      }
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openHistoryRecord(Number(result.dataset.historySearchOpen));
        return;
      }
      if (event.key === "ArrowDown") {
        event.preventDefault();
        const nextResult = results[currentIndex + 1] || results[0];
        nextResult?.focus();
        return;
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        if (currentIndex <= 0) {
          historySearch.focus();
        } else {
          const previousResult = results[currentIndex - 1];
          previousResult?.focus();
        }
      }
    });
    historySearchOverlay.addEventListener("click", (event) => {
      if (!event.target.closest("[data-history-search-close]")) return;
      closeHistorySearch({ restoreFocus: true });
    });
    function handleHistoryListKeydown(event) {
      if (event.target.closest("[data-history-title-input]")) return;
      if (event.key !== "Enter" && event.key !== " ") return;
      const main = event.target.closest("[data-history-open]");
      if (!main) return;
      event.preventDefault();
      main.click();
    }

    function handleHistoryListClick(event) {
      const row = event.target.closest("[data-history-index]");
      if (!row) return;
      const index = Number(row.dataset.historyIndex);
      const record = conversationHistory[index];
      if (!record) return;
      const sourceList = row.closest(".history-list") || historyList;
      const menuButton = event.target.closest("[data-history-menu]");
      if (menuButton) {
        const isOpen = row.classList.contains("menu-open");
        closeHistoryMenus();
        row.classList.toggle("menu-open", !isOpen);
        sourceList.classList.toggle("has-open-menu", !isOpen);
        menuButton.setAttribute("aria-expanded", String(!isOpen));
        return;
      }

      const actionButton = event.target.closest("[data-history-action]");
      if (actionButton) {
        const action = actionButton.dataset.historyAction;
        if (action === "rename") {
          startInlineRename(row, index);
        }
        if (action === "favorite") {
          conversationHistory[index] = { ...record, favorite: !record.favorite, updatedAt: Date.now() };
          persistHistory();
          closeHistoryMenus();
          renderHistory();
          return;
        }
        if (action === "delete" && confirm("删除这条历史记录？")) {
          if (record.question === activeHistoryQuestion) {
            activeHistoryQuestion = "";
          }
          conversationHistory.splice(index, 1);
          persistHistory();
          renderHistory();
        }
        return;
      }

      if (event.target.closest("[data-history-open]")) {
        openHistoryRecord(index);
      }
    }

    [favoriteList, historyList].filter(Boolean).forEach((list) => {
      list.addEventListener("keydown", handleHistoryListKeydown);
      list.addEventListener("click", handleHistoryListClick);
    });
    reportsGrid.addEventListener("click", (event) => {
      const expandButton = event.target.closest("[data-report-group-expand]");
      if (expandButton) {
        const groupKey = expandButton.dataset.reportGroupExpand;
        if (expandedReportGroups.has(groupKey)) {
          expandedReportGroups.delete(groupKey);
        } else {
          expandedReportGroups.add(groupKey);
        }
        renderReports();
        return;
      }
      const taskSelect = event.target.closest("[data-report-task-select]");
      if (taskSelect) {
        activeReportTaskExplorerId = taskSelect.dataset.reportTaskSelect;
        renderReports();
        return;
      }
      const sourceButton = event.target.closest("[data-report-source]");
      if (sourceButton) {
        event.stopPropagation();
        openReportSourceConversation(sourceButton.dataset.reportSource);
        return;
      }
      const card = event.target.closest("[data-report-id]");
      if (!card) return;
      openReportsPreviewPanel(card.dataset.reportId);
    });
    reportsGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const sourceButton = event.target.closest("[data-report-source]");
      if (sourceButton) {
        event.preventDefault();
        openReportSourceConversation(sourceButton.dataset.reportSource);
        return;
      }
      const card = event.target.closest("[data-report-id]");
      if (!card) return;
      event.preventDefault();
      openReportsPreviewPanel(card.dataset.reportId);
    });
    detailOverlay.addEventListener("click", (event) => {
      if (event.target.closest("[data-detail-close]")) {
        closeDetail();
      }
    });
    reportsPreviewClose.addEventListener("click", () => closeReportsPreview());
    reportsPanelSource.addEventListener("click", () => {
      if (reportsPanelSource.dataset.reportSource) {
        openReportSourceConversation(reportsPanelSource.dataset.reportSource);
      }
    });
    reportsBoard.addEventListener("scroll", scheduleReportStickyHeadersSync, { passive: true });
    if (reportsBoardInner && "ResizeObserver" in window) {
      const reportBoardResizeObserver = new ResizeObserver(scheduleReportBoardWidthRender);
      reportBoardResizeObserver.observe(reportsBoardInner);
    }
    window.addEventListener("resize", () => {
      if (reportsView.classList.contains("preview-open")) {
        updateReportsPreviewCap();
      }
      syncAdaptiveSearches();
      scheduleReportStickyHeadersSync();
      scheduleTaxonomyOverflowSync();
      syncPluginDirectoryStates();
      if (reportsView.classList.contains("active")) {
        scheduleReportsLayoutRender();
        scheduleReportsLayoutRender(340);
      }
      if (chatView.classList.contains("active")) {
        autosizeTextarea(chatInput);
      }
    });
    document.addEventListener("click", (event) => {
      if (!event.target.closest(".history-row")) {
        closeHistoryMenus();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeSubscriptionModal();
        closeComposerActionMenus();
        closeHistoryMenus();
        closeHistorySearch();
        closeReportsPreview();
        closeDetail();
      }
    });
    previewClose.addEventListener("click", () => closePreview(false, true));

    window.addEventListener("popstate", () => {
      if (location.hash === "#reports") {
        resetPluginModuleState();
        activeRunId += 1;
        closePreview(true);
        closeReportsPreview(true);
        closeDetail();
        chatView.classList.remove("active");
        homeView.classList.remove("active");
        agentsView.classList.remove("active");
        skillsView?.classList.remove("active");
        subscriptionsView.classList.remove("active");
        reportsView.classList.add("active");
        clearHistoryHighlight();
        setSidebarActive("reports");
        renderHistory();
        return;
      }
      if (location.hash === "#agents") {
        activeRunId += 1;
        closePreview(true);
        closeReportsPreview(true);
        closeDetail();
        chatView.classList.remove("active");
        homeView.classList.remove("active");
        reportsView.classList.remove("active");
        skillsView?.classList.remove("active");
        subscriptionsView.classList.remove("active");
        agentsView.classList.add("active");
        clearHistoryHighlight();
        switchPluginContent("agents", { updateHash: false });
        return;
      }
      if (location.hash === "#skills") {
        activeRunId += 1;
        closePreview(true);
        closeReportsPreview(true);
        closeDetail();
        chatView.classList.remove("active");
        homeView.classList.remove("active");
        reportsView.classList.remove("active");
        agentsView.classList.add("active");
        subscriptionsView.classList.remove("active");
        skillsView?.classList.remove("active");
        clearHistoryHighlight();
        switchPluginContent("skills", { updateHash: false });
        return;
      }
      if (location.hash === "#subscriptions") {
        resetPluginModuleState();
        activeRunId += 1;
        closePreview(true);
        closeReportsPreview(true);
        closeDetail();
        chatView.classList.remove("active");
        homeView.classList.remove("active");
        reportsView.classList.remove("active");
        agentsView.classList.remove("active");
        skillsView?.classList.remove("active");
        subscriptionsView.classList.add("active");
        clearHistoryHighlight();
        setSidebarActive("subscriptions");
        resetSubscriptionCalendarToToday();
        setSubscriptionView(activeSubscriptionView, { render: false });
        activeEditingSubscriptionId = "";
        renderSubscriptions();
        return;
      }
      if (location.hash === "#chat") {
        resetPluginModuleState();
        closeReportsPreview(true);
        closeDetail();
        homeView.classList.remove("active");
        reportsView.classList.remove("active");
        agentsView.classList.remove("active");
        skillsView?.classList.remove("active");
        subscriptionsView.classList.remove("active");
        chatView.classList.add("active");
        setSidebarActive("");
        applyToolState(questionForm, activeToolState);
        applyToolState(chatForm, activeToolState);
        renderCapabilityControls();
        requestAnimationFrame(() => {
          messages.scrollTo({ top: messages.scrollHeight, behavior: "auto" });
        });
        return;
      }
      if (location.hash !== "#chat") {
        resetPluginModuleState();
        activeRunId += 1;
        messages.innerHTML = "";
        closePreview(true);
        closeReportsPreview(true);
        closeDetail();
        chatView.classList.remove("active");
        reportsView.classList.remove("active");
        agentsView.classList.remove("active");
        skillsView?.classList.remove("active");
        subscriptionsView.classList.remove("active");
        homeView.classList.add("active");
        setGenerating(false);
        clearHistoryHighlight();
        setSidebarActive("home");
        requestAnimationFrame(() => {
          autosizeTextarea(questionInput);
          updateSendStates();
        });
      }
    });

    window.addEventListener("pageshow", () => {
      updateSendStates();
      autosizeTextarea(questionInput);
      autosizeTextarea(chatInput);
    });

    if (location.hash === "#chat") {
      history.replaceState({ view: "home" }, "", location.pathname);
    }
    syncToolStateFrom(questionForm);
    renderCapabilityControls();
    renderSubscriptionScheduleOptions();
    resetSubscriptionTimeToNow();
    setSubscriptionFrequency("daily");
    loadHistory();
    renderHistory();
    updateSubscriptionUnreadCount();
    if (location.hash === "#reports") {
      homeView.classList.remove("active");
      agentsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.remove("active");
      reportsView.classList.add("active");
      clearHistoryHighlight();
      setSidebarActive("reports");
    } else if (location.hash === "#agents") {
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.remove("active");
      agentsView.classList.add("active");
      clearHistoryHighlight();
      switchPluginContent("agents", { updateHash: false });
    } else if (location.hash === "#skills") {
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.add("active");
      subscriptionsView.classList.remove("active");
      skillsView?.classList.remove("active");
      clearHistoryHighlight();
      switchPluginContent("skills", { updateHash: false });
    } else if (location.hash === "#subscriptions") {
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.add("active");
      clearHistoryHighlight();
      setSidebarActive("subscriptions");
      resetSubscriptionCalendarToToday();
      setSubscriptionView(activeSubscriptionView, { render: false });
      activeEditingSubscriptionId = "";
      renderSubscriptions();
    } else {
      setSidebarActive("home");
    }
    requestAnimationFrame(syncAdaptiveSearches);
  </script>
