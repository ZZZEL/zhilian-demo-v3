<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="智链大模型 Demo">
  <title>智链大模型 · 数智创新</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #fbfcfe;
      --panel: #ffffff;
      --text-primary: #141922;
      --text-secondary: #334155;
      --text-tertiary: #5e6a7d;
      --text-muted: #7d8796;
      --text-faint: #98a3b2;
      --text-disabled: #a4adba;
      --ink: var(--text-primary);
      --muted: var(--text-tertiary);
      --faint: var(--text-faint);
      --line: #dde4ec;
      --soft: #eef3f7;
      --blue: #2f6fed;
      --blue-strong: #245ecb;
      --blue-deep: #1f54b7;
      --blue-soft: #edf4ff;
      --blue-line: #d8e7ff;
      --teal: #0f9b8e;
      --amber: #d88913;
      --red: #d84a3a;
      --surface-hover: #f8fafc;
      --surface-active: #f4f7fb;
      --surface-subtle: #f1f4f8;
      --nav-fg: #4f5b6d;
      --nav-fg-strong: #243043;
      --shadow: 0 18px 48px rgba(19, 28, 44, 0.07);
      --radius: 8px;
      --sidebar-width: 252px;
      --font-micro: 10px;
      --font-caption: 11.5px;
      --font-small: 12.5px;
      --font-ui: 13px;
      --font-meta: 13.5px;
      --font-body: 15px;
      --font-title-sm: 16.5px;
      --weight-regular: 400;
      --weight-medium: 560;
      --weight-semibold: 680;
      --weight-bold: 740;
      --weight-heavy: 800;
      --weight-black: 860;
      --ui-font-size: var(--font-ui);
      --body-font-size: var(--font-body);
      --body-line: 1.68;
      --reading-line: 1.76;
      --composer-input-font-size: var(--body-font-size);
      --composer-input-font-weight: var(--weight-regular);
      --composer-input-line: 1.65;
      --composer-surface: rgba(255, 255, 255, 0.86);
      --composer-border: rgba(221, 228, 236, 0.72);
      --composer-radius: 14px;
      --composer-blur: blur(14px);
      --composer-shadow: var(--shadow);
      --composer-padding: 14px;
      --composer-stack-gap: 3px;
      --composer-tray-padding: 0;
      --composer-footer-gap: 10px;
      --composer-section-pad-top: 4px;
      --composer-footer-pad-top: var(--composer-section-pad-top);
      --turn-gap: 24px;
      --question-answer-gap: 18px;
      --answer-next-gap: 30px;
      --ai-block-gap: 14px;
      --ai-result-gap: 16px;
      --ai-file-gap: 8px;
      --message-track-width: var(--chat-track-width);
      --message-user-width: min(560px, 78%);
      --message-bubble-pad: 15px 18px;
      --message-bubble-radius: 8px;
      --message-attachment-gap: 8px;
      --messages-bottom-pad: clamp(28px, 4vh, 42px);
      --page-gutter: clamp(20px, 1.8vw, 36px);
      --home-max: 940px;
      --home-pad-top: clamp(48px, 7vh, 86px);
      --home-pad-bottom: 48px;
      --home-title-size: clamp(40px, 5.4vw, 64px);
      --home-title-gap: 18px;
      --home-lead-size: clamp(19px, 2vw, 30px);
      --home-lead-gap: clamp(30px, 4vh, 46px);
      --home-input-min: 132px;
      --home-case-gap: clamp(26px, 3.4vh, 38px);
      --trend-card-min: 132px;
      --trend-card-pad: 17px;
      --chat-track-width: 760px;
      --chat-max: var(--chat-track-width);
      --chat-preview-max: var(--chat-track-width);
      --composer-width: var(--chat-track-width);
      --preview-width: clamp(520px, 42vw, 880px);
      --reports-preview-width: 40%;
      --reports-preview-cap: 40%;
      --report-card-min: 220px;
      --report-card-ratio: 1.16 / 1;
      --report-card-min-height: 184px;
      --report-card-max-height: 236px;
      --chat-detail-preview-width: clamp(460px, 36vw, 560px);
      --detail-overlay-pad: 28px;
      --detail-drawer-width: clamp(760px, 58vw, 840px);
      --detail-drawer-max-height: min(720px, calc(100dvh - 64px));
      --detail-drawer-radius: 16px;
      --sidebar-pad: 14px;
      --sidebar-control: 40px;
      --layout-duration: 300ms;
      --layout-ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    body.sidebar-collapsed {
      --sidebar-width: 72px;
    }

    body {
      margin: 0;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #f4f7fb 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
      line-height: 1.5;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .app-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 30;
      width: var(--sidebar-width);
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 74px var(--sidebar-pad) 18px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: 10px 0 32px rgba(19, 28, 44, 0.035);
      transition: width var(--layout-duration) var(--layout-ease), padding var(--layout-duration) var(--layout-ease);
      will-change: width;
    }

    .brand-shell {
      position: fixed;
      top: 18px;
      left: var(--sidebar-pad);
      z-index: 42;
      width: calc(var(--sidebar-width) - var(--sidebar-pad) - var(--sidebar-pad));
      height: 44px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-control);
      align-items: center;
      gap: 8px;
      transition: left var(--layout-duration) var(--layout-ease), width var(--layout-duration) var(--layout-ease);
      will-change: left, width;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      width: 136px;
      min-width: 136px;
      height: 44px;
      overflow: visible;
      border: 0;
      background: transparent;
      border-radius: 10px;
      padding: 0;
      transition: opacity 180ms ease;
    }

    .brand:hover {
      opacity: 0.9;
    }

    .brand-logo {
      width: 136px;
      height: auto;
      display: block;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .brand-mark {
      display: none;
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      object-fit: contain;
      opacity: 1;
      transition: opacity 160ms ease;
    }

    .brand-shell .brand-toggle {
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      min-height: var(--sidebar-control);
      display: grid;
      grid-template-columns: var(--sidebar-control);
      place-items: center;
      padding: 0;
      justify-content: center;
      border: 1px solid transparent;
      color: var(--nav-fg);
      background: transparent;
      justify-self: end;
    }

    .brand-shell .brand-toggle svg {
      width: 21px;
      height: 21px;
      stroke-width: 2;
    }

    .brand-toggle .sidebar-text {
      display: none;
    }

    .sidebar-collapsed .brand-shell {
      left: var(--sidebar-pad);
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      grid-template-columns: var(--sidebar-control);
    }

    .sidebar-collapsed .brand {
      width: var(--sidebar-control);
      min-width: var(--sidebar-control);
      height: var(--sidebar-control);
      justify-content: center;
      border-radius: 10px;
    }

    .sidebar-collapsed .brand:hover {
      opacity: 1;
    }

    .sidebar-collapsed .brand-logo {
      display: none;
    }

    .sidebar-collapsed .brand-mark {
      display: block;
    }

    .sidebar-collapsed .brand-shell .brand-toggle {
      position: absolute;
      inset: 0;
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      min-height: var(--sidebar-control);
      padding: 0;
      opacity: 0;
      pointer-events: none;
      color: var(--nav-fg);
      background: rgba(255, 255, 255, 0.76);
      border-color: transparent;
      border-radius: 10px;
      box-shadow: none;
      backdrop-filter: blur(6px);
      transform: none;
    }

    .sidebar-collapsed .brand-shell .brand-toggle svg {
      width: 22px;
      height: 22px;
    }

    .sidebar-collapsed .brand-shell:hover .brand-mark {
      opacity: 0;
    }

    .sidebar-collapsed .brand-shell:hover .brand-toggle,
    .sidebar-collapsed .brand-toggle:focus-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-collapsed .brand-shell .brand-toggle:hover {
      color: var(--ink);
      background: var(--surface-hover);
      border-color: transparent;
      transform: none;
    }

    .sidebar-icon-button {
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--nav-fg);
      background: transparent;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .sidebar-icon-button:hover,
    .sidebar-action:hover {
      color: var(--ink);
      background: var(--surface-hover);
      border-color: rgba(47, 111, 237, 0.28);
      transform: none;
    }

    .sidebar-action svg,
    .sidebar-search-trigger svg {
      width: 20px;
      height: 20px;
      justify-self: center;
      stroke: currentColor;
      stroke-width: 2;
    }

    .sidebar-icon-button svg,
    .history-main svg,
    .history-menu-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 1.9;
    }

    .sidebar-action,
    .sidebar-search-trigger {
      width: 100%;
      min-height: 40px;
      display: grid;
      grid-template-columns: var(--sidebar-control) minmax(0, 1fr) var(--sidebar-control);
      align-items: center;
      gap: 0;
      padding: 0;
      border-radius: 10px;
      font-size: var(--ui-font-size);
      font-weight: var(--weight-bold);
      line-height: 1;
      text-align: left;
    }

    .sidebar-action {
      border: 1px solid transparent;
      color: var(--nav-fg);
      background: transparent;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .sidebar-action.is-active {
      color: var(--blue-deep);
      background: var(--blue-soft);
      border-color: transparent;
    }

    .sidebar-actions {
      display: grid;
      gap: 0;
      width: 100%;
      justify-items: stretch;
    }

    .sidebar-text {
      min-width: 0;
      padding-right: 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .sidebar-count {
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      display: inline-grid;
      place-items: center;
      justify-self: center;
      padding: 0;
      color: var(--text-tertiary);
      background: transparent;
      font-size: 12px;
      font-weight: var(--weight-heavy);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .sidebar-count[hidden] {
      display: none;
    }

    .sidebar-search-wrap {
      width: 100%;
      display: grid;
      gap: 0;
    }

    .sidebar-search-trigger {
      border: 1px solid transparent;
      color: var(--nav-fg);
      background: transparent;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .sidebar-search-trigger:hover {
      color: var(--ink);
      background: var(--surface-hover);
      border-color: rgba(47, 111, 237, 0.28);
      transform: none;
    }

    .history-search-overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 24px 18px;
    }

    .history-search-overlay[hidden] {
      display: none;
    }

    .history-search-scrim {
      position: absolute;
      inset: 0;
      background: rgba(12, 18, 30, 0.24);
      backdrop-filter: blur(6px);
    }

    .history-search-dialog {
      position: relative;
      z-index: 1;
      width: clamp(320px, 44vw, 680px);
      max-width: calc(100vw - 36px);
      max-height: calc(100dvh - 48px);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(221, 228, 236, 0.94);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 28px 84px rgba(19, 28, 44, 0.22);
      animation: modalIn 180ms ease both;
    }

    .history-search-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px 12px;
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
    }

    .history-search-title {
      display: grid;
      gap: 4px;
    }

    .history-search-title strong {
      color: var(--text-primary);
      font-size: 15px;
      font-weight: var(--weight-heavy);
      line-height: 1.2;
    }

    .history-search-title span {
      color: var(--text-tertiary);
      font-size: 12px;
      font-weight: var(--weight-medium);
      line-height: 1.35;
    }

    .history-search-close {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid transparent;
      border-radius: 9px;
      color: var(--text-tertiary);
      background: transparent;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .history-search-close:hover {
      color: var(--ink);
      background: var(--surface-hover);
      border-color: rgba(47, 111, 237, 0.18);
    }

    .history-search-close svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
    }

    .history-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      margin: 12px 14px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text-tertiary);
      background: rgba(255, 255, 255, 0.82);
      transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .history-search-box:focus-within {
      border-color: rgba(47, 111, 237, 0.38);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.08);
    }

    .history-search-box svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
    }

    .history-search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font: inherit;
      font-size: 13px;
      font-weight: var(--weight-medium);
      line-height: 1;
    }

    .history-search-box input::placeholder {
      color: var(--faint);
    }

    .history-search-body {
      --history-search-results-height: min(322px, calc(100dvh - 182px));
      min-height: 0;
      display: grid;
      grid-template-rows: auto var(--history-search-results-height);
      padding: 0 10px 12px;
    }

    .history-search-status {
      padding: 0 6px 8px;
      color: var(--text-tertiary);
      font-size: 12px;
      font-weight: var(--weight-bold);
      line-height: 1;
    }

    .history-search-results {
      height: 100%;
      min-height: 0;
      grid-row: 2;
      display: grid;
      grid-auto-rows: min-content;
      gap: 3px;
      overflow: hidden;
      padding-right: 0;
    }

    .history-search-results[hidden] {
      display: none;
    }

    .history-search-results.is-scrollable {
      overflow: auto;
      padding-right: 4px;
    }

    .history-search-result {
      width: 100%;
      min-width: 0;
      height: 62px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 10px 10px 10px 12px;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-secondary);
      background: transparent;
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .history-search-result:hover {
      color: var(--ink);
      background: var(--surface-hover);
      border-color: rgba(47, 111, 237, 0.18);
    }

    .history-search-result:focus-visible {
      outline: none;
    }

    .history-search-result-copy {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .history-search-result-title {
      overflow: hidden;
      color: inherit;
      font-size: var(--ui-font-size);
      font-weight: var(--weight-heavy);
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-search-result-question {
      overflow: hidden;
      color: var(--text-tertiary);
      font-size: 12px;
      font-weight: var(--weight-medium);
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-search-result-meta {
      color: var(--text-faint);
      font-size: 11.5px;
      font-weight: var(--weight-bold);
      line-height: 1;
      white-space: nowrap;
    }

    .history-search-empty {
      width: 100%;
      height: 100%;
      min-height: 0;
      grid-row: 2;
      align-self: stretch;
      justify-self: stretch;
      display: grid;
      place-items: center;
      padding: 28px 18px;
      color: var(--text-tertiary);
      text-align: center;
    }

    .history-search-empty[hidden] {
      display: none;
    }

    .history-search-empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: var(--weight-heavy);
      line-height: 1.2;
    }

    .history-search-empty span {
      font-size: 12.5px;
      font-weight: var(--weight-medium);
      line-height: 1.5;
    }

    .sidebar-section {
      display: grid;
      gap: 8px;
      min-height: 0;
    }

    .sidebar-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 22px;
    }

    .history-section {
      flex: 1;
      grid-template-rows: auto minmax(0, 1fr);
      padding-top: 4px;
    }

    .favorite-section {
      flex: 0 0 auto;
      grid-template-rows: auto minmax(0, auto);
      gap: 4px;
      padding-top: 4px;
    }

    .favorite-section[hidden] {
      display: none;
    }

    .history-toggle {
      width: 100%;
      padding: 0;
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
    }

    .history-toggle svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      margin-right: 5px;
      color: var(--faint);
      stroke: currentColor;
      stroke-width: 2;
      transition: transform 160ms ease, color 160ms ease;
    }

    .history-toggle:hover svg {
      color: var(--nav-fg);
    }

    .history-section.is-collapsed {
      flex: 0 0 auto;
      grid-template-rows: auto;
    }

    .history-section.is-collapsed .history-toggle svg {
      transform: rotate(-90deg);
    }

    .history-section.is-collapsed .history-list,
    .history-section.is-collapsed .history-empty {
      display: none;
    }

    .sidebar-label {
      padding: 3px 6px 2px;
      color: var(--faint);
      font-size: var(--font-small);
      font-weight: var(--weight-heavy);
    }

    .report-card {
      width: 100%;
      min-height: 74px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--nav-fg-strong);
      background: var(--surface-hover);
      box-shadow: none;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .report-card:hover {
      transform: none;
      border-color: rgba(47, 111, 237, 0.36);
      background: #ffffff;
      box-shadow: none;
    }

    .report-type {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: var(--font-micro);
      font-weight: var(--weight-black);
      line-height: 1;
    }

    .report-type.is-pdf {
      color: #d92d20;
      background: #fff1f0;
    }

    .report-copy {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .report-title {
      min-width: 0;
      display: -webkit-box;
      overflow: hidden;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: var(--weight-bold);
      line-height: 1.35;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .report-meta {
      color: var(--faint);
      font-size: var(--font-caption);
      font-weight: var(--weight-bold);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .history-list {
      grid-row: 2;
      min-height: 0;
      display: grid;
      grid-auto-rows: min-content;
      align-content: start;
      gap: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .history-list.has-open-menu {
      overflow: visible;
    }

    .history-group-label {
      padding: 10px 6px 5px;
      color: var(--faint);
      font-size: 11px;
      font-weight: var(--weight-heavy);
      line-height: 1;
    }

    .history-group-label:first-child {
      padding-top: 2px;
    }

    .history-section:not(.has-history) .history-list {
      display: none;
    }

    .history-row {
      position: relative;
      width: 100%;
      min-height: 38px;
      display: grid;

    .history-title-input {

      height: 24px;
      padding: 0 6px;
      border: 1px solid #d8e0ea;
      border-radius: 6px;
      outline: 0;
      color: var(--ink);
      background: #ffffff;
      font: inherit;
      font-size: var(--ui-font-size);
      font-weight: var(--weight-bold);
      line-height: 1;
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.08);
    }

    .history-row-tools {

      margin: 0;

    .history-favorite-button {

      place-items: center;
      padding: 0;
      margin: 0;
      border: 0;
      border-radius: 8px;
      color: #f2a900;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      cursor: default;
      transition: opacity 160ms ease;

    .history-row.is-favorite .history-favorite-button {

      pointer-events: auto;
      cursor: pointer;
    }

    .history-favorite-button:hover {
      background: transparent;
    }

    .history-favorite-button svg {
      width: var(--history-tool-icon);
      height: var(--history-tool-icon);
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 1.6;
      transition: color 160ms ease, transform 160ms ease;
    }

    .history-row.is-favorite .history-favorite-button:hover svg {
      color: #d99000;
      transform: scale(1.14);
    }

    .history-menu-button {
      width: var(--history-tool-column);
      height: var(--history-tool-size);
      display: grid;
      place-items: center;
      padding: 0;
      margin: 0;
      border: 0;
      border-radius: 8px;
      color: var(--text-tertiary);
      background: transparent;
      transition: background 160ms ease, color 160ms ease;
    }

    .history-menu-button:hover {
      color: var(--ink);
      background: #e8edf4;
    }

    .history-row-tools .history-menu-button svg {
      width: var(--history-tool-icon);
      height: var(--history-tool-icon);
      stroke-width: 2;
    }

    .history-menu {
      position: absolute;
      top: 38px;
      right: -104px;
      z-index: 20;
      min-width: 116px;
      display: none;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 16px 34px rgba(19, 28, 44, 0.12);
    }

    .history-row.menu-open .history-menu {
      display: grid;
      gap: 2px;
    }

    .history-menu button {
      width: 100%;
      min-height: 30px;
      padding: 6px 9px;
      border: 0;
      border-radius: 7px;
      color: var(--text-secondary);
      background: transparent;
      font-size: var(--ui-font-size);
      line-height: 1.2;
      text-align: left;
    }

    .history-menu button:hover {
      color: var(--ink);
      background: #f4f7fb;
    }

    .history-menu button[data-history-action="delete"] {

    }

    .history-empty {
      grid-row: 2;
      align-self: stretch;
      display: grid;
      place-items: center;
      padding: 8px 7px;
      color: var(--faint);
      font-size: var(--font-small);
      line-height: 1.45;
      text-align: center;
    }

      z-index: 12;
      width: 100%;

      min-height: var(--sidebar-control);

      padding: 0;

      color: var(--nav-fg);
      background: rgba(255, 255, 255, 0.86);
      font-size: var(--ui-font-size);
      font-weight: var(--weight-medium);
      line-height: 1;
      text-align: left;
      cursor: default;
      transition: background 180ms ease, color 180ms ease;

    .account-card:hover {
      background: var(--surface-hover);
    }

    .account-avatar {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      justify-self: center;
      border-radius: 999px;
      color: #ffffff;
      background: linear-gradient(135deg, #2f6fed, #0f9b8e);
      font-size: var(--font-small);
      font-weight: var(--weight-black);
      line-height: 1;

    .account-copy {

    .account-name {

      font-size: var(--ui-font-size);
      font-weight: var(--weight-heavy);
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .account-role {
      overflow: hidden;
      color: var(--faint);
      font-size: var(--font-caption);
      font-weight: var(--weight-semibold);
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-collapsed .app-sidebar {

    }

    .sidebar-collapsed .sidebar-actions {

      gap: 0;
    }

    .sidebar-collapsed .sidebar-search-wrap {

    }

    .sidebar-collapsed .sidebar-icon-button,

      border-color: transparent;

    .sidebar-collapsed .sidebar-action:hover,

      background: var(--surface-hover);
      border-color: rgba(47, 111, 237, 0.28);

    .sidebar-collapsed .sidebar-action.is-active {

      background: var(--blue-soft);

    .sidebar-collapsed .favorite-section,
    .sidebar-collapsed .history-section {
      display: none;

    .sidebar-collapsed .sidebar-text,
    .sidebar-collapsed .sidebar-count,
    .sidebar-collapsed .sidebar-label,
    .sidebar-collapsed .account-copy,
    .sidebar-collapsed .favorite-list,
    .sidebar-collapsed .history-list,
    .sidebar-collapsed .history-empty {
      display: none;
    }

    .sidebar-collapsed .account-card {
      width: var(--sidebar-control);
      height: var(--sidebar-control);
      min-height: var(--sidebar-control);
      grid-template-columns: var(--sidebar-control);
      padding: 0;
      margin-inline: 0;
      border-radius: 10px;
    }

    .sidebar-collapsed .account-avatar {
      width: 32px;
      height: 32px;
      font-size: 12px;
    }

    .view {
      display: none;
      animation: viewIn 240ms ease both;
    }

    .view.active {
      display: block;
    }

    .reports-view,
    .agents-view {
      animation: none;
    }

    .home.view.active {
      display: flex;
    }

    .home {
      position: fixed;
      top: 0;
      right: auto;
      bottom: 0;
      left: var(--sidebar-width);
      width: calc(100vw - var(--sidebar-width));
      margin-left: 0;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background-image: url("assets/page-bg.jpg");
      background-color: #f8fbff;
      background-size: cover;

      padding: var(--home-pad-top) var(--page-gutter) var(--home-pad-bottom);

      justify-content: center;

      will-change: left, width;

    .home-hero {
      width: min(var(--home-max), 100%);
      margin: 0 auto;
      text-align: left;

    .home-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: var(--home-title-gap);
    }

    .eyebrow {
      display: none;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: var(--home-title-size);
      line-height: 1.08;
      letter-spacing: 0;
      color: #0570f7;
      font-weight: var(--weight-black);
    }

    .home-title-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid #cbdcff;
      border-radius: 999px;
      color: #4e7ddc;
      background: rgba(247, 250, 255, 0.92);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      font-size: 14px;
      font-weight: var(--weight-heavy);
      line-height: 1;
      white-space: nowrap;
    }

    .home-title-tag svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
    }

    .lead {
      display: block;
      margin: 0 0 var(--home-lead-gap);
      color: var(--text-primary);
      font-size: var(--home-lead-size);
      font-weight: var(--weight-medium);
      line-height: 1.45;
    }

    .composer {
      width: min(var(--home-max), 100%);
    }

    .composer,
    .chat-composer {
      position: relative;
      z-index: 30;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: var(--composer-stack-gap);
      padding: var(--composer-padding);
      background: var(--composer-surface);
      border: 1px solid var(--composer-border);
      border-radius: var(--composer-radius);
      backdrop-filter: var(--composer-blur);
      box-shadow: var(--composer-shadow);

    .chat-composer textarea {
      width: 100%;
      min-width: 0;
      min-height: var(--home-input-min);
      resize: none;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      padding: var(--composer-section-pad-top) 0 0;
      font-size: var(--composer-input-font-size);
      font-weight: var(--composer-input-font-weight);
      line-height: var(--composer-input-line);
      letter-spacing: 0;
      text-indent: 0;
      margin-top: 0;
      transition: margin-top 180ms ease, padding-top 180ms ease, text-indent 180ms ease;

    .composer-input-row {
      position: relative;
      min-width: 0;
      display: grid;

    .composer-input-row.has-capability textarea {
      text-indent: var(--capability-chip-offset, 0px);

      padding-top: 0;
      text-indent: 0;
    }

    .composer textarea::placeholder,
    .chat-composer textarea::placeholder {
      color: var(--text-faint);
    }

    .attachment-tray {
      display: none;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      padding: var(--composer-tray-padding);
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }

    .attachment-tray::-webkit-scrollbar {
      display: none;
    }

    .attachment-tray.has-files {
      display: flex;
    }

    .attachment-card {
      --attachment-card-radius: 9px;
      --attachment-remove-size: calc(var(--attachment-card-radius) * 2);
      flex: 0 0 164px;
      width: 164px;
      max-width: 164px;
      min-height: 42px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--attachment-remove-size);
      grid-template-rows: var(--attachment-remove-size) minmax(22px, auto);
      align-items: stretch;
      border: 1px solid #e1e7ef;
      border-radius: var(--attachment-card-radius);
      color: var(--text-secondary);
      background: var(--surface-hover);
      overflow: hidden;
      scroll-snap-align: start;
      animation: chipIn 180ms ease both;
      transition: opacity 150ms ease, transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .attachment-card:not(.has-action) {
      grid-template-columns: 1fr;
    }

    .attachment-card.is-removing {
      opacity: 0;
      transform: scale(0.96);
    }

    .attachment-card__content {
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      min-width: 0;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
    }

    .attachment-card__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: var(--font-micro);
      font-weight: var(--weight-black);
      line-height: 1;
      text-transform: uppercase;
    }

    .attachment-card__icon.is-pdf {
      color: #d92d20;
      background: #fff1f0;
    }

    .attachment-card__icon.is-doc {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .attachment-card__icon.is-sheet {
      color: #08875d;
      background: #eaf8f1;
    }

    .attachment-card__icon.is-slide {
      color: #c05621;
      background: #fff4e8;
    }

    .attachment-card__icon.is-image {
      color: #7c3aed;
      background: #f3edff;
    }

    .attachment-card__icon.is-text {
      color: var(--text-tertiary);
      background: #eef2f6;
    }

    .attachment-card__body {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .attachment-card__name {
      overflow: hidden;
      color: var(--text-secondary);
      font-size: var(--font-small);
      font-weight: var(--weight-bold);
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-card__meta {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: var(--weight-semibold);
      line-height: 1;
    }

    .attachment-card__remove {
      grid-column: 2;
      grid-row: 1;
      width: var(--attachment-remove-size);
      height: var(--attachment-remove-size);
      display: grid;
      place-items: center;
      align-self: start;
      justify-self: end;
      border: 0;
      border-radius: 999px;
      color: var(--text-tertiary);
      background: transparent;
      box-shadow: none;
      opacity: 0;
      padding: 0;
      cursor: pointer;
      line-height: 1;
      pointer-events: none;
      transition: opacity 150ms ease, background 150ms ease, color 150ms ease;
    }

    .attachment-card__remove svg {
      width: calc(var(--attachment-remove-size) - 8px);
      height: calc(var(--attachment-remove-size) - 8px);
      display: block;
      stroke: currentColor;
      stroke-width: 2.2;

      background: rgba(17, 24, 39, 0.06);
      opacity: 1;
      pointer-events: auto;
    }

    .attachment-card__remove:hover {
      color: var(--ink);
      background: rgba(17, 24, 39, 0.1);
    }

    .attachment-card__remove:focus-visible {
      outline: 2px solid rgba(0, 113, 227, 0.24);
      outline-offset: 2px;
    }

    .message-attachments {
      max-width: min(var(--message-track-width), 100%);

      flex-wrap: wrap;
      gap: var(--message-attachment-gap);
      margin: 0;

    .user .message-attachments {

    .composer-footer,

      min-width: 0;

    .composer-tools.left {
      justify-content: flex-start;
    }

    .composer-tools.right {
      justify-content: flex-end;
      margin-left: auto;
    }

    .composer-tools.right {
      gap: 8px;
    }

    .tool-button {
      --control-size: 38px;
      min-width: var(--control-size);
      height: var(--control-size);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 0 0 auto;
      padding: 0 10px;
      border: 1px solid rgba(216, 224, 235, 0.74);
      border-radius: 10px;
      color: var(--text-tertiary);
      background: rgba(255, 255, 255, 0.7);
      font-size: var(--font-small);
      font-weight: var(--weight-bold);
      line-height: 1;
      transition: background 170ms ease, border-color 170ms ease, color 170ms ease;

    .tool-button:hover {
      color: var(--blue-deep);
      background: #f4f8ff;
      border-color: #dce8ff;
    }

    .tool-button.is-on,
    .tool-button[aria-pressed="true"] {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: var(--blue-line);
    }

    .tool-button svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.9;
    }

    .tool-button.icon-only,
    .composer-tools.right .tool-button {
      width: var(--control-size);
      padding: 0;
    }

    .tool-label {
      white-space: nowrap;
    }

    .composer-action-wrap {

      position: absolute;
      left: 0;
      top: 100%;
      width: 100%;
      height: var(--composer-menu-bridge);

    .composer-action-trigger {
      border-color: rgba(216, 224, 235, 0.8);
      background: #ffffff;
    }

    .composer-action-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      z-index: 35;
      width: 192px;
      display: grid;
      gap: 0;
      padding: 6px;
      border: 1px solid rgba(221, 228, 236, 0.94);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 18px 44px rgba(19, 28, 44, 0.14);

      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity 140ms ease, transform 140ms ease, visibility 140ms ease;

    .composer-action-wrap:hover .composer-action-menu,

    .composer-action-item {

      padding: 7px 8px;

      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;

    .composer-action-item:hover,

      color: var(--blue-deep);
      background: #f4f8ff;
      border-color: #dce8ff;

    .composer-action-item svg {

      height: 17px;
      stroke: currentColor;
      stroke-width: 1.9;

      gap: 2px;

    .composer-action-copy strong {
      overflow: hidden;
      color: inherit;
      font-size: 12.8px;
      line-height: 1.2;

    .agent-prompt-markdown p {
      margin: 0 0 8px;
    }

    .agent-prompt-markdown ul {
      display: grid;
      gap: 5px;
      margin: 0 0 10px;
      padding-left: 18px;
    }

    .agent-prompt-markdown code {
      padding: 1px 5px;
      border-radius: 5px;
      color: var(--text-primary);
      background: rgba(226, 232, 240, 0.74);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .skill-trigger-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .skill-trigger-list li {
      min-width: 0;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 7px;
      align-items: start;
      color: var(--text-secondary);
      font-size: 12.8px;
      line-height: 1.5;
      font-weight: var(--weight-medium);
    }

    .skill-trigger-mark {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
      font-weight: var(--weight-heavy);
      transform: translateY(1px);
    }

    .skill-trigger-list li.is-positive .skill-trigger-mark {
      color: #17803a;
      background: rgba(34, 197, 94, 0.12);
    }

    .skill-trigger-list li.is-negative .skill-trigger-mark {
      color: #b42318;
      background: rgba(239, 68, 68, 0.12);
    }

    .agent-detail-extra {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .agent-detail-extra .skill-schema-item {
      min-height: 0;
    }

    .subscription-create-btn,
    .subscription-save-btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 13px;
      border: 1px solid rgba(47, 111, 237, 0.22);
      border-radius: 10px;
      color: #ffffff;
      background: var(--blue);
      font-size: 13px;
      font-weight: var(--weight-heavy);
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .subscription-create-btn:hover,
    .subscription-save-btn:hover {
      background: var(--blue-strong);
      border-color: rgba(47, 111, 237, 0.34);
      box-shadow: 0 8px 18px rgba(47, 111, 237, 0.18);
    }

    .subscription-create-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .subscription-workbench {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      overflow: hidden;
    }

    .subscriptions-view .agents-head {
      align-items: center;
    }

    .subscriptions-view .agents-title {
      gap: 0;
    }

    .subscription-list-view {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
    }

    .subscription-list-view[hidden],
    .subscription-calendar-view[hidden] {
      display: none;
    }

    .subscription-calendar-view {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .subscription-calendar-toolbar {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .subscription-calendar-toolbar[hidden] {
      display: none;
    }

    .subscription-calendar-toolbar strong {
      min-width: 96px;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1;
      font-weight: var(--weight-heavy);
      text-align: center;
    }

    .subscription-calendar-nav {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      border-radius: 8px;
      color: var(--text-tertiary);
      background: transparent;
      transition: color 160ms ease, background 160ms ease;
    }

    .subscription-calendar-nav:hover,
    .subscription-calendar-nav:focus-visible {
      color: var(--text-primary);
      background: #f2f5f9;
      outline: 0;
    }

    .subscription-calendar-nav svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .subscription-calendar-grid {
      --calendar-weekday-size: clamp(10.5px, 0.62vw, 13px);
      --calendar-date-size: clamp(12px, 0.78vw, 16px);
      --calendar-date-size-box: clamp(22px, 1.55vw, 30px);
      --calendar-event-time-size: clamp(9.5px, 0.58vw, 12px);
      --calendar-event-title-size: clamp(10.5px, 0.7vw, 13.5px);
      --calendar-event-height: clamp(24px, 1.7vw, 32px);
      --calendar-cell-padding: clamp(6px, 0.62vw, 12px);
      --calendar-cell-gap: clamp(4px, 0.44vw, 8px);
      --calendar-event-gap: clamp(4px, 0.42vw, 8px);
      min-height: 0;
      display: grid;
      height: 100%;
      width: 100%;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-template-rows: clamp(28px, 2vw, 38px) repeat(var(--subscription-calendar-weeks, 6), minmax(0, 1fr));
      gap: 0;
      overflow: hidden;
      padding: 0;
      border: 1px solid rgba(221, 228, 236, 0.86);
      border-radius: 14px;
      background: transparent;
    }

    .subscription-calendar-weekday {
      min-width: 0;
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(221, 228, 236, 0.72);
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
      color: var(--text-tertiary);
      background: #fafbfc;
      font-size: var(--calendar-weekday-size);
      line-height: 1;
      font-weight: var(--weight-heavy);
      user-select: none;
    }

    .subscription-calendar-weekday:nth-child(7) {
      border-right: 0;
    }

    .subscription-calendar-day {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: var(--calendar-cell-gap);
      padding: var(--calendar-cell-padding);
      border: 0;
      border-right: 1px solid rgba(221, 228, 236, 0.72);
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
      border-radius: 0;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: none;
    }

    .subscription-calendar-day.is-week-end {
      border-right: 0;
    }

    .subscription-calendar-day.is-month-last-row {
      border-bottom: 0;
    }

    .subscription-calendar-spacer {
      min-width: 0;
      min-height: 0;
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
      background: transparent;
      box-shadow: none;
    }

    .subscription-calendar-spacer.is-before-day {
      border-right: 1px solid rgba(221, 228, 236, 0.72);
    }

    .subscription-calendar-spacer.is-month-last-row {
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
      background: transparent;
    }

    .subscription-calendar-day-head {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: clamp(4px, 0.42vw, 8px);
    }

    .subscription-calendar-date {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: clamp(4px, 0.38vw, 7px);
    }

    .subscription-calendar-date strong {
      width: var(--calendar-date-size-box);
      height: var(--calendar-date-size-box);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--text-primary);
      font-size: var(--calendar-date-size);
      line-height: 1;
      font-weight: var(--weight-heavy);
    }

    .subscription-calendar-day.is-today .subscription-calendar-date strong {
      color: #ffffff;
      background: var(--blue);
    }

    .subscription-calendar-events {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: var(--calendar-event-gap);
      overflow: auto;
      padding-right: 0;
    }

    .subscription-calendar-event {
      width: 100%;
      min-width: 0;
      min-height: var(--calendar-event-height);
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.42vw, 8px);
      padding: 0 clamp(5px, 0.52vw, 10px);
      border: 1px solid rgba(221, 228, 236, 0.58);
      border-radius: 7px;
      color: var(--text-secondary);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(248, 251, 255, 0.72));
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .subscription-calendar-event:hover,
    .subscription-calendar-event:focus-visible {
      border-color: rgba(47, 111, 237, 0.36);
      background: #ffffff;
      box-shadow: 0 6px 14px rgba(19, 28, 44, 0.045);
      outline: 0;
    }

    .subscription-calendar-time {
      flex: 0 0 auto;
      color: var(--text-tertiary);
      font-size: var(--calendar-event-time-size);
      line-height: 1;
      font-weight: var(--weight-heavy);
      white-space: nowrap;
    }

    .subscription-calendar-event-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text-primary);
      font-size: var(--calendar-event-title-size);
      line-height: 1;
      font-weight: var(--weight-heavy);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subscription-calendar-day-empty {
      display: none;
      place-items: center;
      border: 1px dashed rgba(221, 228, 236, 0.86);
      border-radius: 10px;
      color: var(--text-faint);
      background: rgba(248, 250, 252, 0.62);
      font-size: 11.5px;
      font-weight: var(--weight-medium);
    }

    .subscription-overview {
      min-width: 0;
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid rgba(221, 228, 236, 0.92);
      border-radius: 14px;
      border-color: rgba(47, 111, 237, 0.16);
    }

    .subscription-field>span,
    .subscription-field-head>span,
    .subscription-form label>span {
      color: var(--text-primary);
      font-size: 12px;
      font-weight: var(--weight-black);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .subscription-overview-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.25;
      font-weight: var(--weight-heavy);
    }

    .subscription-overview {
      color: var(--text-primary);
    }

    .subscription-templates {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .subscription-template {
      min-width: 0;
      position: relative;
      overflow: hidden;
      min-height: var(--trend-card-min);
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      gap: 12px;
      align-content: start;
      align-items: start;
      padding: var(--trend-card-pad);
      text-align: left;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(248, 251, 255, 0.74));
      border: 1px solid rgba(221, 228, 236, 0.58);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      color: var(--text-secondary);
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .subscription-template-main {
      min-width: 0;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .subscription-template strong {
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.35;
      font-weight: var(--weight-heavy);
      letter-spacing: 0.01em;
    }

    .subscription-template span {
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1.6;
      font-weight: var(--weight-medium);
    }

    .subscription-template-frequency {
      color: var(--text-secondary);
      font-size: 11.5px;
      line-height: 1.2;
      font-weight: var(--weight-heavy);
      white-space: nowrap;
    }

    .subscription-template-side {
      min-width: 72px;
      display: grid;
      justify-items: end;
      align-content: start;
      text-align: right;
    }

    .subscription-template-action {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--text-tertiary);
      background: transparent;
      font-size: 12px;
      line-height: 1;
      font-weight: var(--weight-heavy);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .subscription-template:hover .subscription-template-action,
    .subscription-template:focus-visible .subscription-template-action,
    .subscription-template.is-active .subscription-template-action {
      opacity: 1;
    }

    .subscription-template:hover,
    .subscription-template:focus-visible,
    .subscription-template.is-active {
      transform: none;
      border-color: rgba(47, 111, 237, 0.45);
      background: #ffffff;
      box-shadow: 0 18px 38px rgba(19, 28, 44, 0.08);
      outline: none;
    }

    .subscription-template::before {
      content: none;
    }

    .subscription-template:hover::before {
      opacity: 0;
    }

    .subscription-directory {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }

    .subscription-list-head {
      position: sticky;
      top: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      padding: 8px 0 6px;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.94) 72%, rgba(255, 255, 255, 0) 100%);
      backdrop-filter: blur(8px);
    }

    .subscription-list-head h3 {
      margin: 0;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.2;
      font-weight: var(--weight-heavy);
    }

    .subscription-task-section {
      display: contents;
    }

    .subscription-task-section-head {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
      padding-top: 2px;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.2;
      font-weight: var(--weight-heavy);
    }

    .subscription-task-section-head span {
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1;
      font-weight: var(--weight-heavy);
    }

    .subscription-card.is-disabled-task .subscription-card-status {
      display: none;
    }

    .subscription-card.is-disabled-task .subscription-status-group {
      width: auto;
    }

    .subscription-total-inline {
      color: var(--text-tertiary);
      font-size: 12px;
      line-height: 1;
      font-weight: var(--weight-heavy);
    }

    .subscription-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      gap: 12px;
      height: 100%;
      overflow: auto;
      padding: 2px 4px 14px 2px;
      scroll-padding-bottom: 10px;
      box-sizing: border-box;
    }

    .subscription-card {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(138px, auto);
      grid-template-rows: auto auto;
      gap: 14px;
      padding: 15px;
      border: 1px solid rgba(221, 228, 236, 0.9);
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .subscription-card:has(.subscription-card-main:hover),
    .subscription-card:has(.subscription-card-main:focus-visible),
    .subscription-card.is-source-highlight {
      border-color: rgba(47, 111, 237, 0.38);
      background: #f8fbff;
      box-shadow: 0 10px 24px rgba(19, 28, 44, 0.055);
    }

    .subscription-card.is-source-highlight {
      scroll-margin: 96px;
      animation: subscriptionSourcePulse 1800ms ease both;
    }

    @keyframes subscriptionSourcePulse {
      0% {
        border-color: rgba(47, 111, 237, 0.72);
        box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.14), 0 12px 28px rgba(19, 28, 44, 0.08);
      }

      58% {
        border-color: rgba(47, 111, 237, 0.48);
        box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.08), 0 10px 24px rgba(19, 28, 44, 0.055);
      }

      100% {
        border-color: rgba(47, 111, 237, 0.38);
        box-shadow: 0 10px 24px rgba(19, 28, 44, 0.055);
      }
    }

    .subscription-card:focus {
      outline: 0;
    }

    .subscription-card-main {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 8px;
      border-radius: 8px;
      cursor: pointer;
      outline: 0;
    }

    .subscription-card-main:focus-visible {
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.1);
    }

    .subscription-card-main strong {
      overflow: hidden;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.28;
      font-weight: var(--weight-heavy);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subscription-card p {
      color: var(--text-tertiary);
      font-size: 12.5px;
      line-height: 1.5;
      font-weight: var(--weight-medium);
    }

    .subscription-card p {
      margin: 0;
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .subscription-card-side {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      display: grid;
      justify-items: end;
      align-content: start;
      gap: 6px;
      text-align: right;
    }

    .subscription-status-group {
      --subscription-status-action-width: 86px;
      min-width: 0;
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      position: relative;
      width: var(--subscription-status-action-width);
    }

    .subscription-card-footer {
      grid-column: 1 / -1;
      grid-row: 2;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 2px;
    }

    .subscription-card-footer[hidden] {
      display: none;
    }

    .subscription-card-footer .subscription-time-group {
      flex: 1 1 auto;
    }

    .subscription-card-status,
    .subscription-time-group,
    .subscription-card-cadence,
    .subscription-card-next {
      color: var(--text-tertiary);
      font-size: 11.5px;
      line-height: 1.2;
      font-weight: var(--weight-heavy);
    }

    .subscription-time-group {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      cursor: default;
      user-select: none;
    }

    .subscription-time-group * {
      cursor: default;
      user-select: none;
    }

    .subscription-time-group[hidden] {
      display: none;
    }

    .subscription-document-group {
      --subscription-status-action-width: 86px;
      width: var(--subscription-status-action-width);
      flex: 0 0 var(--subscription-status-action-width);
      margin-left: auto;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 0;
      min-width: 0;
    }

    .subscription-card-status {
      min-width: 54px;
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 9px;
      border-radius: 999px;
      color: var(--text-tertiary);
      background: #f2f5f9;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }

    .subscription-card-status.is-running {
      color: var(--blue-deep);
      background: var(--blue-soft);
    }

    .subscription-card-status.is-pending {
      color: var(--text-tertiary);
      background: #f2f5f9;
    }


    .subscription-card-status.is-error {
      color: #a13232;
      background: #fff0ee;
    }

    .subscription-card-status.is-done {
      color: #087a6f;
      background: #e8f8f6;
    }

    .subscription-card-status.is-disabled {
      color: var(--text-faint);
      background: #eef1f5;
    }

    .subscription-card-cadence {
      flex: 0 0 auto;
      color: var(--text-secondary);
    }

    .subscription-time-separator {
      flex: 0 0 auto;
      color: rgba(148, 163, 184, 0.72);
      font-weight: var(--weight-medium);
    }

    .subscription-card-next {
      min-width: 0;
      max-width: 150px;
      overflow: hidden;
      color: var(--text-faint);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subscription-report-link {
      width: 100%;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 9px;
      border: 1px solid rgba(221, 228, 236, 0.92);
      border-radius: 8px;
      color: var(--text-tertiary);
      background: #ffffff;
      font-size: 12px;
      font-weight: var(--weight-heavy);
      line-height: 1;
    }

    .subscription-report-link:hover {
      color: var(--blue-deep);
      border-color: var(--blue-line);
      background: var(--blue-soft);
    }

    .subscription-run-panel {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(221, 228, 236, 0.86);
      border-radius: 12px;
      background: #ffffff;
    }

    .subscription-run-status {
      display: grid;
      gap: 6px;
    }

    .subscription-run-status strong {

      font-weight: var(--weight-heavy);

    .chat-view {
      position: fixed;
      top: 0;
      right: auto;
      bottom: 0;

      height: 100dvh;
      margin-left: 0;
      width: calc(100vw - var(--sidebar-width));

      will-change: left, width;

      grid-template-columns: minmax(0, 1fr) var(--active-preview-width, 0px);
      transition:
        left var(--layout-duration) var(--layout-ease),
        width var(--layout-duration) var(--layout-ease),

    .chat-view.preview-closing {

    }

      border-right: 1px solid var(--line);

      grid-template-rows: minmax(0, 1fr) auto;

      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      overscroll-behavior: contain;

      width: 0;
      height: 0;

      font-weight: var(--weight-regular);

以下是核心合作条款与机制的设计框架：

---

## 一、核心思路：从“物理库存”到“合成库存”

传统建库面临流动性锁死和仓储成本高昂的痛点。引入场外期权思维，核心在于将部分物理库存转化为**“合成库存”（Synthetic Inventory）**，或通过**“资产货币化 + 期权衍生品”**释放资金。

## 二、合作条款与关键机制设计

### 1. 资金安排条款：资金融通与权利金优化

为解决贸易商大批量建库的资金压力，条款设计应着重于降低初期资本占用，并优化资金成本。

* **方案 A：现货回购 + 看涨期权（库存变现模式）**
* **条款设计**：贸易商以当前低价采购现货，并将其“销售”给我司（或合作金融机构），释放 80%–90% 的流动资金。同时，贸易商支付少量权利金向我司买入一笔**场外看涨期权（Call Option）**。
* **效果**：贸易商既锁定了未来以低价“赎回”现货的权利（保留安全垫），又释放了大量现金流。

* **方案 B：预付货款 + 累计购入结构（Accumulator 条款）**
* **条款设计**：若贸易商判断当前处于价格底部震荡期，可嵌入“累计点价”条款。约定在未来 3–6 个月内，只要市价未跌破某一底线（Knock-out Price），贸易商可以**低于当前市价的固定折扣价**，定期定量购入现货。
* **效果**：平摊建仓成本，极其适合“左侧交易”建库。

### 2. 仓储物流与交割条款：期现转换（EFP）与弹性流向

“安全垫”的核心在于发生供应中断时能切切实实拿到现货。因此，物流条款必须具备高度的弹性和物理控制力。

* **静态仓单与动态置换条款**：
* 质押在我司指定交割库（或大型第三方物流枢纽）的粮食，其所有权在期权存续期内受法律保护。
* 允许贸易商进行“品质/库区动态置换”（在总价值或总量不变的前提下，允许因周转需要更换库容或粮食批次），保证粮食作为战略库存的鲜度。

* **弹性行权与实物交割（Physical Delivery Options）**：
* 场外期权到期时，条款应赋予贸易商“现金结算”或“实物交割”的双重选择权。
* 若市价暴涨或供应中断触发，贸易商选择**实物行权**，我司配合快速释放仓单，转为物理实体库存，直接投入其加工或贸易链条。

### 3. 风险控制机制：双向安全边界设置

场外期权模式在极端行情下同样面临风险（如价格继续击穿底部，或暴涨导致对手方履约风险）。风险控制条款是合作的基石。

* **设置价差保护带（Collar 领口结构）**：
* 为防止权利金过高，可设计买入看涨期权的同时，卖出一个远端看跌期权（Put）。
* **条款约定**：将价格波动限制在 $[P_{min}, P_{max}]$ 区间内。当价格极度下跌触及 $P_{min}$ 时，贸易商必须履行现货接货义务（由于其本意就是低点建库，这符合其战略意图）；当价格暴涨触及 $P_{max}$ 时，贸易商锁定了最高采购成本。

* **动态履约保障与追保机制（Margin Mechanism）**：
* 针对嵌入了“卖出隐含期权”的结构化条款，建立基于期现货联动（Mark-to-Market）的动态保证金/授信评估机制。
* **设置安全垫阈值**：当现货价格上涨时，贸易商持有的看涨期权增值，可部分抵消其在其他渠道的现货采购成本；若价格下跌，则通过其现货底补仓，避免单边爆仓风险。

| **价格暴涨 / 供应中断** | 享有库存升值，但初期建库规模受资金限制，安全垫可能不足。 | 触发看涨期权行权，以极低锁定价获得大批量现货，安全垫充分发挥作用。 | **收益最大化**：成功锁定了低价，获取了暴涨红利与供应安全。 |

该问题应按“UBO 穿透与制裁合规决策”处理，而不是简单判断是否发货。当前已经出现受制裁主体相似名称，且 UBO 材料尚未闭环，因此建议先暂停签约、放货和发运等高风险动作，进入合规升级复核。待名称相似风险可排除、UBO 链条闭环、审批留痕完整后，再判断是否可以有条件推进。

### 1. 梳理制裁名单与法律框架
第一步需要确认交易链条中最终买方、付款方、收货方、中间贸易商、承运相关主体分别适用哪些制裁规则。至少应覆盖联合国、OFAC、欧盟、英国等常用名单，并结合本地监管要求和公司内部制裁合规政策。

这一步的关键不是只查“合同相对方”，而是把合同签署、付款、放货、发运四类动作拆开看。只要任一关键主体存在无法排除的名单关联，就不应因客户催促而继续推进高风险动作。

### 2. 列出 UBO 红旗与名称相似判定标准
UBO 穿透的核心红旗包括：股权层级过长、关键层级资料缺失、最终受益人声明无法覆盖实际控制关系、付款方和收货方不一致、临时更换合同主体或提单抬头、交易链条中出现无明确商业目的的中间公司。

名称相似不能只靠肉眼判断。建议同时比对英文拼写、音译、缩写、注册地址、注册号、董事高管、实控人、历史交易对手和收款账户。若无法证明只是同名或低风险相似，应按疑似命中处理并升级复核。

### 3. 确定材料阈值与 KYC/EDD 清单
在恢复推进前，至少需要补齐以下材料：最终买方和关键中间主体的注册文件、股权穿透图、UBO 声明、董事高管名单、授权文件、制裁名单筛查记录、相似名称解释说明，以及货权流、资金流、票据流一致性证明。

如果相似名称涉及高风险辖区、复杂中间层或实际控制关系不清，应启动增强尽调 EDD，必要时引入第三方数据库核验或外部律师意见。缺少关键证据时，不应以业务说明替代合规证明。

### 4. 制定审批升级与暂停发运决策树
建议采用三档决策：

1. 高风险：无法排除制裁关联、UBO 链条断裂、付款或货权路径异常。处理方式是暂停签约、放货和发运，并提交合规负责人复核。
2. 中风险：主体可解释但材料未闭环，或存在局部红旗。处理方式是允许业务准备非承诺性材料，但不得执行发运和付款指令，待法务与合规审批。
3. 低风险：名称相似已排除，UBO 与交易链条材料闭环，审批留痕完整。处理方式是有条件推进，并设置后续监控。

### 5. 操作建议与合规话术
对内建议是先冻结高风险动作，同步要求客户补齐 UBO 和制裁核验材料；业务团队可以准备替代履约方案、船期沟通和内部审批材料，但不能绕过合规结论直接发运。

对客户的话术可以保持克制：由于交易链条涉及最终买方穿透和制裁名单相似名称核验，公司需要完成必要的 UBO 与制裁合规复核后才能进入签约或发运环节。该流程是为了保护双方交易安全，并非否定交易本身。

最终判断是：当前不宜直接放行。只有在相似名称可排除、UBO 链条闭环、KYC/EDD 材料满足阈值、审批升级记录完整后，才可以恢复推进。`

    function getChatComposerMaxHeight() {
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      if (window.matchMedia("(max-height: 740px)").matches) {
        return Math.min(viewportHeight * 0.38, 220);
      }
      return Math.min(viewportHeight * 0.42, 280);
    }

    function getChatTextareaAvailableHeight(textarea) {
      const composer = textarea.closest(".chat-composer");
      if (!composer) return null;
      const styles = getComputedStyle(composer);
      const maxHeight = getChatComposerMaxHeight();
      if (!Number.isFinite(maxHeight)) return null;
      const paddingY = Number.parseFloat(styles.paddingTop) + Number.parseFloat(styles.paddingBottom);
      const rowGap = Number.parseFloat(styles.rowGap || styles.gap) || 0;
      const attachmentTray = composer.querySelector(".attachment-tray.has-files");
      const inputRow = textarea.closest(".composer-input-row");
      const footer = composer.querySelector(".chat-composer-bar");
      const visibleRows = [attachmentTray, inputRow, footer].filter(Boolean);
      const gapTotal = Math.max(0, visibleRows.length - 1) * rowGap;
      const occupiedHeight = [
        attachmentTray?.offsetHeight || 0,
        footer?.offsetHeight || 0
      ].reduce((sum, value) => sum + value, 0);
      const textareaMarginTop = Number.parseFloat(getComputedStyle(textarea).marginTop) || 0;
      return maxHeight - paddingY - gapTotal - occupiedHeight - textareaMarginTop;
    }

    function autosizeTextarea(textarea) {
      textarea.style.height = "auto";
      const maxHeight = Number.parseFloat(getComputedStyle(textarea).maxHeight);
      const composerAvailableHeight = textarea === chatInput ? getChatTextareaAvailableHeight(textarea) : null;
      const cssMaxHeight = Number.isFinite(maxHeight) ? maxHeight : 160;
      const effectiveMaxHeight = Number.isFinite(composerAvailableHeight)
        ? Math.min(cssMaxHeight, Math.max(36, composerAvailableHeight))
        : cssMaxHeight;
      textarea.style.height = `${Math.min(textarea.scrollHeight, effectiveMaxHeight)}px`;
    }

    function scheduleTaxonomyOverflowSync(root = document) {
      requestAnimationFrame(() => requestAnimationFrame(() => syncTaxonomyOverflow(root)));

    function syncTaxonomyOverflow(root = document) {
      root.querySelectorAll(".skill-taxonomy-tags").forEach((tagList) => {
        const more = tagList.querySelector("[data-taxonomy-more]");
        if (!more) return;
        const tags = Array.from(tagList.children).filter((item) => item !== more);
        tags.forEach((tag) => {
          tag.hidden = false;
          tag.style.display = "";
        });
        more.hidden = true;
        more.textContent = "";
        more.removeAttribute("title");
        if (!tags.length || tagList.clientWidth <= 0) return;

        const taxonomy = tagList.closest(".skill-detail-taxonomy") || tagList;
        const tagListRect = tagList.getBoundingClientRect();
        const taxonomyRect = taxonomy.getBoundingClientRect();
        const visibleRight = Math.min(tagListRect.right, taxonomyRect.right);
        const tolerance = 1;
        let visibleCount = tags.findIndex((tag) => tag.getBoundingClientRect().right > visibleRight + tolerance);
        if (visibleCount === -1) return;

        while (visibleCount >= 0) {
          const hiddenCount = tags.length - visibleCount;
          tags.forEach((tag, index) => {
            tag.hidden = index >= visibleCount;
          });
          more.textContent = `+${hiddenCount}`;
          more.hidden = false;
          if (more.getBoundingClientRect().right <= visibleRight + tolerance || visibleCount === 0) {
            break;
          }
          visibleCount -= 1;
        }

        const hiddenCount = tags.length - visibleCount;
        if (hiddenCount <= 0) {
          more.hidden = true;
          more.textContent = "";
          more.removeAttribute("title");
          return;
        }
        more.textContent = `+${hiddenCount}`;
        more.setAttribute("title", tags.slice(visibleCount).map((tag) => tag.textContent.trim()).filter(Boolean).join("、"));
        tags.forEach((tag, index) => {
          tag.hidden = index >= visibleCount;
        });
      });
    }

    const subscriptionWeekdayLabels = {

    const subscriptionWeekdayOrder = ["1", "2", "3", "4", "5", "6", "0"];
    const subscriptionHourOptions = Array.from({ length: 24 }, (_, index) => String(index).padStart(2, "0"));
    const subscriptionMinuteOptions = Array.from({ length: 60 }, (_, index) => String(index).padStart(2, "0"));
    const defaultSubscriptionMinuteStep = 15;

    function renderSubscriptionScheduleOptions() {
      subscriptionMonthdays.innerHTML = Array.from({ length: 31 }, (_, index) => {
        const value = String(index + 1);
        return `<button type="button" data-monthday="${value}">${value} 日</button>`;

        .join("");

    function getCurrentSubscriptionTime() {
      const now = new Date();
      const parsedHour = now.getHours();
      const parsedMinute = now.getMinutes();
      const snappedMinute = Math.round(parsedMinute / defaultSubscriptionMinuteStep) * defaultSubscriptionMinuteStep;
      const roundedHour = snappedMinute >= 60 ? (parsedHour + 1) % 24 : parsedHour;
      const hour = String(roundedHour).padStart(2, "0");
      const minute = String((snappedMinute % 60)).padStart(2, "0");
      return `${hour}:${minute}`;
    }


    function resetSubscriptionTimeToNow() {
      setSubscriptionTimeValue(getCurrentSubscriptionTime());

    function setSubscriptionMonthdayValue(value) {
      const day = Math.min(31, Math.max(1, Number(value) || 1));
      subscriptionMonthday.value = String(day);
      subscriptionMonthdays.querySelectorAll("[data-monthday]").forEach((button) => {

    function setSubscriptionTimePart(part, value) {
      const [currentHour = "09", currentMinute = "00"] = (subscriptionTime.value || "09:00").split(":");
      const hour = part === "hour" ? value : currentHour;
      const minute = part === "minute" ? value : currentMinute;

    function getSelectedSubscriptionWeekdays() {
      const selected = Array.from(subscriptionWeekdays.querySelectorAll("[data-weekday][aria-pressed='true']"))

    function setSelectedSubscriptionWeekdays(values = ["1"]) {
      const normalized = new Set((values.length ? values : ["1"]).map(String));
      subscriptionWeekdays.querySelectorAll("[data-weekday]").forEach((button) => {
        button.setAttribute("aria-pressed", String(normalized.has(button.dataset.weekday)));
      });
      if (!subscriptionWeekdays.querySelector("[data-weekday][aria-pressed='true']")) {
        subscriptionWeekdays.querySelector("[data-weekday='1']")?.setAttribute("aria-pressed", "true");

    function subscriptionWeekdayText(values = getSelectedSubscriptionWeekdays()) {
      return subscriptionWeekdayOrder
        .filter((key) => values.includes(key))
        .map((key) => subscriptionWeekdayLabels[key])

    function getSubscriptionDraftText() {
      return [
        subscriptionDraftName.value,
        subscriptionDraftDescription.value,
        subscriptionDraftPrompt.value
      ].join(" ").toLowerCase();
    }

    function inferSubscriptionProfilePreset() {
      const text = getSubscriptionDraftText();
      return subscriptionProfilePresets.find((preset) => preset.pattern.test(text)) || subscriptionProfilePresets.at(-1);
    }

    function inferSubscriptionModelAbilities() {
      const text = getSubscriptionDraftText();
      const abilities = ["联网检索"];
      if (/报告|摘要|复盘|输出|生成|交付|文档|归纳|提炼|资源|知识/.test(text)) abilities.push("报告生成");
      if (/对比|多源|库存|利润|汇率|船期|天气|阈值|风险|异常|情报|信息|来源|证据/.test(text)) abilities.push("多源数据比对");
      if (/分析|研判|建议|预测|归因|判断|提炼|归纳|管理/.test(text)) abilities.push("深度分析");
      return [...new Set(abilities)];
    }

    function subscriptionModelSummary() {
      return inferSubscriptionModelAbilities().join("、");
    }

    function defaultSubscriptionPrompt(task = null) {
      if (task?.prompt) return task.prompt;
      if (!task) return "";
      return `请持续跟踪「${task.name}」。\n关注重点：${task.summary}\n输出要求：当达到触发条件时，生成结论、证据和建议动作。`;
    }

    function hasSubscriptionReport(task) {
      return Boolean((task?.documents || []).length || (task?.delivery && task.delivery !== "等待首次推送"));
    }

    function canOpenSubscriptionResult(task) {
      return task && hasSubscriptionReport(task);
    }

    function getSubscriptionEnabled(task) {
      return task?.enabled !== false;
    }

    function getSubscriptionExecutionStatus(task) {
      return task?.executionStatus || "待执行";
    }

    const viewedCompletedSubscriptionIds = new Set();

    function isCompletedSubscriptionUnread(task) {
      return getSubscriptionExecutionStatus(task) === "已完成"
        && hasSubscriptionReport(task)
        && !viewedCompletedSubscriptionIds.has(task.id);
    }

    function getCompletedSubscriptionUnreadCount() {
      return subscriptionTasks.filter(isCompletedSubscriptionUnread).length;

    function updateSubscriptionUnreadCount() {
      const count = getCompletedSubscriptionUnreadCount();
      subscriptionsBtn.classList.toggle("has-count", count > 0);
      subscriptionsBtn.title = count > 0 ? `任务：${count} 个完成任务未查看` : "任务";
      subscriptionsBtn.setAttribute("aria-label", count > 0 ? `任务，${count} 个完成任务未查看` : "任务");
      if (!subscriptionsUnreadCount) return;
      subscriptionsUnreadCount.textContent = count > 99 ? "99+" : String(count);
      subscriptionsUnreadCount.hidden = count === 0;
    }

    function markSubscriptionViewed(taskId) {
      if (!taskId) return;
      viewedCompletedSubscriptionIds.add(taskId);
