      font-family: inherit;
      font-size: 13px;
      font-weight: var(--weight-regular);
      line-height: 1.45;
      outline: 0;
    }

    .subscription-form input::placeholder,
    .subscription-form textarea::placeholder {
      color: var(--text-faint);
      font-family: inherit;
      font-size: 13px;
      font-weight: var(--weight-regular);
      opacity: 1;
    }

    .subscription-form input[type="text"],
    .subscription-form input[type="time"],
    .subscription-form input[type="number"],
    .subscription-form select {
      min-height: 38px;
      padding: 0 11px;
    }

    .subscription-form textarea {
      padding: 10px 11px;
      line-height: 1.55;
      resize: none;
    }

    .subscription-description-input {
      height: 84px;
    }

    .subscription-prompt-input {
      height: 138px;
      overflow: auto;
    }

    .subscription-form input[type="text"]:focus,
    .subscription-form input[type="time"]:focus,
    .subscription-form input[type="number"]:focus,
    .subscription-form select:focus,
    .subscription-form textarea:focus {
      border-color: rgba(47, 111, 237, 0.36);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.08);
    }

    .subscription-schedule {
      --schedule-columns: 2;
      display: grid;
      gap: 7px;
      position: relative;
    }

    .subscription-schedule-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(var(--schedule-columns), minmax(0, 1fr));
      gap: 8px;
      align-items: start;
    }

    .subscription-schedule[data-active-frequency="hourly"] {
      --schedule-columns: 2;
    }

    .subscription-schedule[data-active-frequency="weekly"],
    .subscription-schedule[data-active-frequency="monthly"] {
      --schedule-columns: 3;
    }

    .subscription-schedule-slot {
      position: relative;
      min-width: 0;
    }

    .subscription-schedule-slot[hidden] {
      display: none;
    }

    .subscription-schedule-select {
      width: 100%;
      height: 46px;
      min-height: 42px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text-primary);
      background: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: var(--weight-regular);
      text-align: left;
    }

    .subscription-schedule-select {
      cursor: pointer;
    }

    .subscription-schedule-select:hover {
      border-color: rgba(47, 111, 237, 0.28);
      background: #fbfcff;
    }

    .subscription-schedule-select:focus-visible {
      border-color: rgba(47, 111, 237, 0.36);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.08);
      outline: 0;
    }

    .subscription-schedule-select strong {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.15;
      font-weight: var(--weight-regular);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subscription-schedule-select svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.16s ease;
    }

    .subscription-schedule-slot.is-open .subscription-schedule-select svg {
      transform: rotate(180deg);
    }

    .subscription-schedule-popover {
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      z-index: 3;
      width: 100%;
      min-width: 100%;
      max-height: min(232px, calc(100vh - 280px));
      display: grid;
      gap: 8px;
      overflow: hidden;
      overscroll-behavior: contain;
      padding: 8px;
      border: 1px solid rgba(221, 228, 236, 0.82);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 16px 36px rgba(19, 28, 44, 0.12);
    }

    #subscription-time-menu.subscription-schedule-popover {
      max-height: none;
      overflow: visible;
    }

    .subscription-schedule-popover[hidden] {
      display: none;
    }

    .subscription-schedule-summary-line {
      margin: 0;
      color: var(--text-faint);
      font-size: 11.5px;
      line-height: 1.2;
      font-weight: var(--weight-regular);
      text-align: right;
      white-space: nowrap;
    }

    .subscription-option-list {
      display: grid;
      gap: 4px;
    }

    .subscription-option-list button,
    .subscription-weekday-options button,
    .subscription-time-column button {
      width: 100%;
      min-width: 0;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-tertiary);
      background: transparent;
      font-size: 12px;
      font-weight: var(--weight-regular);
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .subscription-option-list button:hover,
    .subscription-option-list button.is-active,
    .subscription-weekday-options button:hover,
    .subscription-weekday-options button[aria-pressed="true"],
    .subscription-time-column button:hover,
    .subscription-time-column button.is-active {
      color: var(--blue-deep);
      border-color: rgba(47, 111, 237, 0.16);
      background: var(--blue-soft);
    }

    .subscription-weekday-options {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
      max-height: 210px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .subscription-weekday-options button {
      line-height: 1;
    }

    #subscription-time-menu {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      align-items: start;
    }

    .subscription-schedule[data-active-frequency="hourly"] #subscription-time-menu {
      grid-template-columns: minmax(0, 1fr);
    }

    .subscription-schedule[data-active-frequency="hourly"] #subscription-times-hour {
      display: none;
    }

    .subscription-monthday-options {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      max-height: 210px;
      min-height: 210px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .subscription-time-column {
      min-width: 0;
      display: grid;
      gap: 4px;
      height: 210px;
      max-height: 210px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    #subscription-monthday-menu.subscription-schedule-popover {
      max-height: none;
      overflow: visible;
    }

    #subscription-time-menu .subscription-time-column button,
    #subscription-time-menu .subscription-time-column button[data-time-hour],
    #subscription-time-menu .subscription-time-column button[data-time-minute] {
      min-height: 32px;
      height: 32px;
      line-height: 1;
      border-radius: 8px;
    }

    .subscription-checks,
    .subscription-linked {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .subscription-checks label,
    .subscription-linked button {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 9px;
      border: 1px solid rgba(221, 228, 236, 0.9);
      border-radius: 999px;
      color: var(--text-tertiary);
      background: #ffffff;
      font-size: 12px;
      font-weight: var(--weight-bold);
      line-height: 1;
    }

    .subscription-checks input {
      width: 13px;
      height: 13px;
      accent-color: var(--blue);
    }

    .subscription-linked button:hover {
      color: var(--blue-deep);
      border-color: var(--blue-line);
      background: var(--blue-soft);
    }

    .subscription-form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 2px;
    }

    .subscription-cancel-btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid rgba(221, 228, 236, 0.92);
      border-radius: 10px;
      color: var(--text-tertiary);
      background: #ffffff;
      font-size: 13px;
      font-weight: var(--weight-heavy);
      line-height: 1;
    }

    .subscription-cancel-btn:hover {
      color: var(--blue-deep);
      border-color: var(--blue-line);
      background: var(--blue-soft);
    }

    .subscription-save-btn {
      min-width: 96px;
    }

    .subscription-empty {
      display: none;
      margin: 2px;
      min-height: 220px;
    }

    .subscription-directory.is-empty .subscription-grid {
      display: none;
    }

    .subscription-directory.is-empty .subscription-empty {
      display: grid;
    }

    .chat-view {
      position: fixed;
      top: 0;
      right: auto;
      bottom: 0;
      left: var(--sidebar-width);
      min-height: 100dvh;
      height: 100dvh;
      margin-left: 0;
      width: calc(100vw - var(--sidebar-width));
      overflow: hidden;
      transition: left var(--layout-duration) var(--layout-ease), width var(--layout-duration) var(--layout-ease);
      will-change: left, width;
    }

    .chat-view.active {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--active-preview-width, 0px);
      transition:
        left var(--layout-duration) var(--layout-ease),
        width var(--layout-duration) var(--layout-ease),
        grid-template-columns 300ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .chat-view.preview-open,
    .chat-view.preview-closing {
      gap: 0;
    }

    .chat-view.preview-open {
      --active-preview-width: var(--chat-detail-preview-width);
    }

    .chat-view.preview-closing {
      --active-preview-width: 0px;
    }

    .chat-view.preview-open .chat-shell,
    .chat-view.preview-closing .chat-shell {
      padding-left: 0;
      border-right: 1px solid var(--line);
    }

    .chat-view.preview-open .messages,
    .chat-view.preview-closing .messages {
      width: 100%;
    }

    .chat-view.preview-open .chat-composer,
    .chat-view.preview-closing .chat-composer {
      width: min(var(--chat-track-width), calc(100% - var(--page-gutter) - var(--page-gutter)));
    }

    .chat-shell {
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .messages {
      width: 100%;
      margin: 0;
      padding: clamp(28px, 4vh, 44px) var(--page-gutter) var(--messages-bottom-pad);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .messages:not(.is-scrolling) {
      scrollbar-width: none;
    }

    .messages:not(.is-scrolling)::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .message {
      width: min(var(--message-track-width), 100%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--message-attachment-gap);
      margin: 0 auto;
      animation: rise 320ms ease both;
    }

    .message+.message {
      margin-top: var(--turn-gap);
    }

    .message.user+.message.assistant {
      margin-top: var(--question-answer-gap);
    }

    .message.assistant+.message.user {
      margin-top: var(--answer-next-gap);
    }

    .message.user {
      align-items: flex-end;
    }

    .message.assistant {
      align-items: stretch;
    }

    .assistant-output {
      width: 100%;
      max-width: 100%;
      display: grid;
      gap: 0;
    }

    .assistant-output>* {
      margin: 0;
    }

    .assistant-output>*+* {
      margin-top: var(--ai-block-gap);
    }

    .assistant-output>.process-card+.result-bubble {
      margin-top: var(--ai-result-gap);
    }

    .assistant-output>.result-bubble+.file-card.output-file {
      margin-top: var(--ai-file-gap);
    }

    .bubble {
      max-width: min(var(--message-track-width), 100%);
      padding: var(--message-bubble-pad);
      border-radius: var(--message-bubble-radius);
      line-height: var(--body-line);
      font-size: var(--body-font-size);
      font-weight: var(--weight-regular);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .user .bubble {
      max-width: var(--message-user-width);
      color: #ffffff;
      background: var(--blue);
    }

    .assistant .bubble {
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(19, 28, 44, 0.04);
    }

    .result-bubble {
      width: 100%;
      display: grid;
      gap: 0;
      padding: 16px 19px;
    }

    .result-text {
      display: grid;
      gap: 17px;
      white-space: normal;
    }

    .result-text p {
      margin: 0;
      color: var(--text-primary);
      font-size: var(--body-font-size);
      line-height: var(--reading-line);
      font-weight: var(--weight-regular);
    }

    .result-text p:first-child {
      color: var(--text-primary);
      font-weight: var(--weight-regular);
    }

    .result-text h2,
    .result-text h3 {
      margin: 0;
      color: var(--text-primary);
      letter-spacing: 0;
    }

    .result-text h2 {
      padding-top: 2px;
      font-size: var(--font-title-sm);
      line-height: 1.45;
      font-weight: var(--weight-bold);
    }

    .result-text h3 {
      font-size: 15.2px;
      line-height: 1.45;
      font-weight: var(--weight-bold);
    }

    .result-text strong {
      font-weight: var(--weight-bold);
    }

    .result-text em {
      font-style: italic;
    }

    .result-text code {
      padding: 2px 5px;
      border-radius: 5px;
      color: var(--text-secondary);
      background: var(--surface-subtle);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .result-text a {
      color: var(--blue);
      text-decoration: none;
      font-weight: var(--weight-bold);
    }

    .result-text a:hover {
      text-decoration: underline;
    }

    .result-text ul {
      display: grid;
      gap: 8px;
      margin: 0;
      padding-left: 20px;
    }

    .result-text li {
      color: var(--text-primary);
      font-size: 14.5px;
      line-height: 1.72;
      font-weight: var(--weight-regular);
    }

    .result-text hr {
      width: 100%;
      height: 1px;
      margin: 2px 0;
      border: 0;
      background: #edf1f5;
    }

    .result-table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      background: #ffffff;
    }

    .result-text table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.62;
    }

    .result-text th,
    .result-text td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf1f5;
      text-align: left;
      vertical-align: top;
    }

    .result-text th {
      color: var(--text-secondary);
      background: var(--surface-hover);
      font-size: var(--font-small);
      font-weight: var(--weight-bold);
      white-space: nowrap;
    }

    .result-text tr:last-child td {
      border-bottom: 0;
    }

    .process-card {
      width: 100%;
      max-width: 100%;
      min-height: 0;
      padding: 16px 18px 4px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      animation: rise 320ms ease both;
    }

    .file-card {
      width: fit-content;
      max-width: min(520px, 100%);
      overflow: hidden;
      padding: 0;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: none;
      color: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 180ms ease, background 180ms ease;
    }

    .file-card:hover {
      background: #ffffff;
      border-color: rgba(47, 111, 237, 0.36);
      transform: none;
    }

    .process-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 14px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: var(--weight-heavy);
      font-size: var(--font-meta);
      text-align: left;
      cursor: pointer;
    }

    .chevron {
      width: 16px;
      height: 16px;
      display: inline-grid;
      place-items: center;
      color: var(--faint);
      font-size: 0;
      line-height: 0;
      transition: transform 180ms ease;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .chevron::before {
      content: "";
      width: 6px;
      height: 6px;
      border-right: 1.7px solid currentColor;
      border-bottom: 1.7px solid currentColor;
      transform: rotate(45deg);
      transform-origin: 50% 50%;
    }

    .process-card.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .process-list {
      position: relative;
      padding: 0 0 2px 34px;
      display: grid;
      gap: 0;
    }

    .process-card.collapsed .process-list {
      display: none;
    }

    .process-card:not(.planned):not(.qa-process-card) {
      padding-bottom: 16px;
    }

    .process-card:not(.planned):not(.qa-process-card) .process-toggle {
      padding-bottom: 0;
    }

    .process-card:not(.planned):not(.qa-process-card) .process-list {
      display: none;
    }

    .process-card.planning-card .process-list {
      padding-left: 0;
    }

    .process-card.planning-card .process-list::before {
      display: none;
    }

    .process-list::before {
      content: "";
      position: absolute;
      top: 13px;
      bottom: 13px;
      left: 11px;
      width: 1px;
      background: repeating-linear-gradient(to bottom,
          #d8dee7 0,
          #d8dee7 5px,
          transparent 5px,
          transparent 10px);
    }

    .process-step {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 0 22px;
      opacity: 1;
      transition: opacity 200ms ease;
      animation: stepIn 260ms ease both;
    }

    .process-step.active {
      opacity: 1;
    }

    .process-step.done {
      opacity: 1;
    }

    .planning-step {
      padding: 0 0 16px;
    }

    .planning-step .step-dot {
      display: none;
    }

    .planning-step .step-copy {
      display: grid;
      gap: 10px;
    }

    .planning-spinner {
      width: 9px;
      height: 9px;
      border: 1.5px solid var(--blue);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 900ms linear infinite;
    }

    .process-card.planned .process-toggle .planning-spinner {
      border-color: var(--teal);
      background: var(--teal);
      animation: none;
      box-shadow: inset 0 0 0 2px #ffffff;
    }

    .planning-nodes {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-width: 520px;
      padding-left: 30px;
    }

    .planning-nodes::before {
      content: "";
      position: absolute;
      top: 9px;
      bottom: 9px;
      left: 9px;
      width: 1px;
      background: #d8dee7;
    }

    .plan-node {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--text-tertiary);
      font-size: 12.3px;
      line-height: 1.35;
      opacity: 1;
      transform: translateY(0);
      transition: color 180ms ease, opacity 180ms ease, transform 180ms ease;
    }

    .plan-node.queued {
      opacity: 0;
      transform: translateY(4px);
    }

    .plan-node.loading {
      color: var(--blue-strong);
    }

    .plan-node.done {
      color: var(--text-secondary);
    }

    .plan-index {
      position: absolute;
      left: -30px;
      top: -1px;
      width: 19px;
      height: 19px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: var(--text-tertiary);
      background: #ffffff;
      border: 1px solid #d8dee7;
      font-size: var(--font-micro);
      font-weight: var(--weight-heavy);
    }

    .plan-node.loading .plan-index,
    .plan-node.done .plan-index {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .plan-node.done .plan-index {
      background: var(--teal);
      border-color: var(--teal);
    }

    .plan-title {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-dot {
      position: absolute;
      left: -32px;
      top: 2px;
      width: 19px;
      height: 19px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--muted);
      background: #ffffff;
      border: 1px solid #d8dee7;
      font-size: var(--font-micro);
      font-weight: var(--weight-heavy);
    }

    .active .step-dot {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .done .step-dot {
      color: #ffffff;
      background: var(--teal);
      border-color: var(--teal);
      animation: none;
    }

    .step-copy strong {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      color: var(--text-primary);
      font-size: 14.5px;
      line-height: 1.42;
    }

    .step-title-icon,
    .chip-icon {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      color: currentColor;
    }

    .step-title-icon {
      width: 15px;
      height: 15px;
      color: var(--blue);
    }

    .chip-icon {
      width: 13px;
      height: 13px;
    }

    .step-title-icon svg,
    .chip-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
    }

    .step-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 12.8px;
      line-height: 1.58;
    }

    .step-copy p:empty {
      display: none;
    }

    .step-chips {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      align-items: start;
      padding-top: 1px;
    }

    .step-sections {
      display: grid;
      gap: 8px;
      padding-top: 5px;
    }

    .step-section {
      display: grid;
      gap: 6px;
      padding: 7px 0 9px;
      border: 0;
      border-top: 1px solid #edf1f5;
      background: transparent;
      transition: opacity 180ms ease;
    }

    .step-section:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .step-section.agent-section {
      background: transparent;
    }

    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: var(--weight-bold);
      line-height: 1.36;
      text-align: left;
      cursor: pointer;
    }

    .section-title {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .section-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      flex: 0 0 auto;
    }

    .section-chevron {
      width: 14px;
      height: 14px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--faint);
      font-size: 12px;
      transition: transform 160ms ease;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .section-chevron {
      font-size: 0;
      line-height: 0;
    }

    .section-chevron::before {
      content: "";
      width: 5.5px;
      height: 5.5px;
      border-right: 1.6px solid currentColor;
      border-bottom: 1.6px solid currentColor;
      transform: rotate(45deg);
      transform-origin: 50% 50%;
    }

    .step-section.collapsed .section-chevron {
      transform: rotate(-90deg);
    }

    .agent-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 230px;
      min-width: 0;
      padding: 4px 7px;
      border: 1px solid #dce8ff;
      border-radius: 7px;
      color: var(--blue-strong);
      background: #f4f8ff;
    }

    .agent-tag .agent-mark {
      width: 16px;
      height: 16px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--blue);
    }

    .agent-tag .agent-mark svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    .agent-tag .agent-name {
      color: var(--blue-deep);
      font-size: var(--font-caption);
      font-weight: var(--weight-heavy);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-tag-link {
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .skill-tag-link:hover,
    .skill-tag-link:focus-visible {
      background: #edf4ff;
      border-color: rgba(47, 111, 237, 0.32);
      outline: 0;
    }

    .section-desc {
      margin: 0;
      color: var(--muted);
      font-size: 12.8px;
      line-height: 1.58;
    }

    .step-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px;
      color: var(--text-tertiary);
      background: var(--surface-subtle);
      border-radius: 999px;
      font-size: var(--font-small);
      line-height: 1.32;
      animation: chipIn 220ms ease both;
    }

    .step-chip.queued {
      display: none;
    }

    .step-chip.loading {
      color: var(--blue-strong);
      background: var(--blue-soft);
    }

    .step-chip.loading::before {
      content: "";
      width: 8px;
      height: 8px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 900ms linear infinite;
    }

    .step-chip.done {
      color: var(--text-secondary);
      background: var(--surface-subtle);
    }

    .section-summary {
      display: none;
      align-items: center;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
      padding: 5px 8px;
      color: var(--text-tertiary);
      background: #f7f9fb;
      border: 1px solid #edf1f5;
      border-radius: 7px;
      font-size: 12.3px;
      line-height: 1.35;
      animation: chipIn 180ms ease both;
    }

    .step-section.collapsed .section-desc,
    .step-section.collapsed .step-chips {
      display: none;
    }

    .step-section.collapsed .section-summary {
      display: inline-flex;
    }

    .process-step.compacted .step-copy>p,
    .process-step.compacted>.step-copy>.step-chips {
      display: none;
    }

    .file-card.pending {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .file-card.ready {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 260ms ease, transform 260ms ease, border-color 180ms ease, background 180ms ease;
    }

    .output-file {
      justify-self: start;
      margin: 0;
    }

    .file-card {
      margin-top: 0;
      display: inline-block;
      vertical-align: top;
      white-space: normal;
      line-height: normal;
      animation: rise 320ms ease both;
    }

    .file-card.output-file {
      margin: 0;
    }

    .file-body {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      width: min(292px, 100%);
      padding: 9px;
    }

    .file-icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--blue);
      background: #edf4ff;
      font-weight: 900;
      font-size: 10px;
    }

    .file-main strong {
      display: block;
      margin-bottom: 2px;
      font-size: 13.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-main p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-composer-wrap {
      position: relative;
      bottom: 0;
      padding: 10px 0 18px;
      background: linear-gradient(180deg, rgba(247, 248, 251, 0), var(--bg) 32%);
    }

    .preview-panel {
      display: none;
      position: sticky;
      top: 0;
      min-width: 0;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.92);
      border: 0;
      border-radius: 0;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .chat-view.preview-open .preview-panel,
    .chat-view.preview-closing .preview-panel,
    .reports-view.preview-open .preview-panel,
    .reports-view.preview-closing .preview-panel {
      display: flex;
      flex-direction: column;
      will-change: transform, opacity;
    }

    .chat-view.preview-open .preview-panel,
    .reports-view.preview-open .preview-panel {
      animation: previewIn 280ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .chat-view.preview-closing .preview-panel,
    .reports-view.preview-closing .preview-panel {
      animation: previewOut 300ms cubic-bezier(0.4, 0, 0.2, 1) both;
      pointer-events: none;
    }

    .preview-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--soft);
    }

    .preview-kicker {
      display: block;
      margin-bottom: 5px;
      color: var(--faint);
      font-size: 12px;
      font-weight: 800;
    }

    .preview-head strong {
      display: block;
      font-size: 15px;
      line-height: 1.45;
    }

    .preview-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #ffffff;
      font-size: 18px;
      line-height: 1;
      text-decoration: none;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-btn:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .preview-body {
      flex: 1;
      overflow: auto;
      background: #ffffff;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .search-results-body {
      padding: 0;
      overflow: auto;
      background: #fbfcfe;
    }

    .search-status {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      margin: 0;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(221, 228, 236, 0.86);
      color: #4f5b6d;
      background: #fbfcfe;
      backdrop-filter: blur(14px);
      font-size: 12px;
      line-height: 1.3;
    }

    .search-status-main {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 8px;
      font-weight: 750;
    }

    .search-status-main::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: #2f6fed;
      box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
      animation: pulseDot 880ms ease-in-out infinite;
    }

    .search-status.is-complete .search-status-main::before {
      background: #25a36f;
      box-shadow: 0 0 0 4px rgba(37, 163, 111, 0.12);
      animation: none;
    }

    .search-results {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 0;
      border-top: 0;
    }

    .search-result-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: start;
      gap: 8px;
      min-height: 58px;
      padding: 9px 16px;
      border: 0;
      border-bottom: 1px solid rgba(221, 228, 236, 0.72);
      border-radius: 0;
      color: inherit;
      background: transparent;
      box-shadow: none;
      text-decoration: none;
      transition: background 180ms ease;
      animation: resultIn 260ms ease both;
    }

    .search-result-card::before {
      display: none;
    }

    .search-result-card:hover {
      background: #f7faff;
    }

    .search-result-favicon {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      margin-top: 1px;
      border-radius: 4px;
      object-fit: contain;
      background: #ffffff;
    }

    .search-result-fallback {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      display: grid;
      place-items: center;
      margin-top: 1px;
      border-radius: 4px;
      color: #245ecb;
      background: rgba(47, 111, 237, 0.09);
      font-size: 9px;
      font-weight: 900;
    }

    .search-result-main {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .search-result-card strong {
      color: #18202d;
      font-size: 13.2px;
      line-height: 1.34;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12.2px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes pulseDot {

      0%,
      100% {
        transform: scale(0.92);
        opacity: 0.65;
      }

      50% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .step-chip.search-link {
      cursor: pointer;
    }

    .step-chip.search-link:hover {
      color: #245ecb;
      background: #e8f1ff;
    }

    .chat-composer {
      width: min(var(--chat-track-width), calc(100% - var(--page-gutter) - var(--page-gutter)));
    }

    .chat-composer textarea {
      min-height: 44px;
      max-height: 160px;
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      min-height: 23px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--faint);
      animation: typing 1.1s ease-in-out infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 150ms;
    }

    .typing span:nth-child(3) {
      animation-delay: 300ms;
    }

    @keyframes viewIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes typing {

      0%,
      100% {
        opacity: 0.35;
        transform: translateY(0);
      }

      50% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(47, 111, 237, 0.34);
      }

      50% {
        box-shadow: 0 0 0 9px rgba(47, 111, 237, 0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes stepIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes previewIn {
      from {
        opacity: 0.98;
        transform: translate3d(28px, 0, 0);
      }

      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes previewOut {
      from {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      to {
        opacity: 1;
        transform: translate3d(28px, 0, 0);
      }
    }

    @keyframes resultIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes chipIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {

        gap: 10px;
      }

        min-height: 38px;
        padding: 0 14px;
        font-size: 12px;
      }

      .page-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .page-head-tools {
        width: 100%;
        justify-content: flex-start;
      }

      .plugin-tools.is-active {
        width: 100%;
        flex-wrap: wrap;
      }

      .reports-search,
      .agents-search {
        width: 100%;
        flex: 1 1 100%;
      }

      .composer-action-menu {
        width: min(192px, calc(100vw - 28px));
      }

      .capability-submenu {
        left: 0;
        top: calc(100% + 4px);
        width: min(282px, calc(100vw - 28px));
      }

      .chat-composer .capability-submenu {
        top: auto;
        bottom: calc(100% + 4px);
      }

      .detail-overlay {
        padding: 12px;
      }

      .detail-drawer {
        width: calc(100vw - 24px);
        max-height: calc(100dvh - 24px);
        border-radius: 10px;
      }

      .detail-drawer.is-skill-detail {
        width: calc(100vw - 24px);
        height: calc(100dvh - 24px);
        max-height: calc(100dvh - 24px);
      }

      .agent-detail-top {
        min-height: 58px;
        padding: 14px 52px 14px 16px;
      }

      .skill-detail-control {
        padding-inline: 0;
      }

      .detail-split {
        grid-template-columns: minmax(0, 1fr);
        margin: 10px 14px 16px;
      }

      .skill-detail-shell {
        display: grid;
      }

      .skill-detail-hero {
        padding: 16px 18px 22px;
      }

      .skill-detail-title-row {
        align-items: flex-start;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      .skill-detail-title {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .detail-action-group {
        grid-column: 1;
        grid-row: 1;
        justify-self: start;
      }

      .detail-drawer.is-skill-detail .detail-close {
        grid-column: auto;
        grid-row: auto;
        justify-self: auto;
      }

      .skill-detail-body {
        gap: 14px;
        padding: 16px 18px 18px;
      }

      .skill-detail-title strong {
        font-size: 19px;
      }

      .skill-detail-description {
        font-size: 13.2px;
      }

      .skill-detail-taxonomy {
        gap: 10px;
      }

      .skill-detail-schema {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: none;
        gap: 12px;
      }

      .skill-schema-item {
        padding: 14px;
        border-left: 1px solid #e2e8f0;
        border-radius: 10px;
      }

      .skill-schema-item.is-scenario {
        grid-row: auto;
      }

      .skill-schema-item.is-prompt {
        grid-column: auto;
      }

      .skill-schema-head {
        align-items: flex-start;
      }

      .agent-prompt-markdown {
        min-height: 188px;
        max-height: 340px;
      }

      .agent-detail-extra {
        grid-template-columns: minmax(0, 1fr);
      }

      .subscriptions-shell {
        padding-top: 28px;
      }

      .subscription-workbench {
        grid-template-columns: minmax(0, 1fr);
        overflow: auto;
      }

      .subscription-calendar-grid {
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .subscription-templates {
        grid-template-columns: minmax(0, 1fr);
      }

      .subscription-task-modal {
        width: min(100%, 720px);
      }

      .subscription-form {
        min-height: 560px;
      }

      .subscription-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .reports-grid.is-task-assets {
        grid-template-columns: minmax(0, 1fr);
      }

      .subscription-form-grid,
      .subscription-schedule-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .subscription-weekday-options {
        grid-template-columns: repeat(4, 32px);
      }

      .subscription-card {
        grid-template-columns: minmax(0, 1fr);
      }

      .subscription-card-side {
        grid-column: 1;
        justify-items: start;
        text-align: left;
      }

      .subscription-card-footer {
        align-items: flex-start;
      }

      .subscription-status-group {
        justify-content: flex-start;
      }

    }

    @media (max-height: 860px) {
      :root {
        --home-pad-top: clamp(28px, 4.6vh, 44px);
        --home-pad-bottom: 26px;
        --home-title-size: clamp(34px, 4.6vw, 52px);
        --home-title-gap: 12px;
        --home-lead-size: clamp(17px, 1.8vw, 24px);
        --home-lead-gap: 22px;
        --home-input-min: 104px;
        --home-case-gap: 20px;
        --trend-card-min: 116px;
        --trend-card-pad: 14px;
        --composer-padding: 13px;

      }

    }

    @media (max-height: 740px) {

        --home-pad-top: 22px;
        --home-pad-bottom: 18px;
        --home-title-size: clamp(30px, 4vw, 44px);
        --home-title-gap: 9px;
        --home-lead-size: clamp(15px, 1.6vw, 20px);

        --home-input-min: 84px;
        --home-case-gap: 14px;

        gap: 8px;
      }

      .trend-card {
        gap: 8px;
      }

      .trend-card h3 {
        font-size: 14px;
        line-height: 1.36;
      }

      .trend-card p {
        display: none;
      }

      .case-kicker {
        font-size: 11.5px;
      }

    }

  </style>
</head>

## 一、核心思路：从“物理库存”到“合成库存”

传统建库面临流动性锁死和仓储成本高昂的痛点。引入场外期权思维，核心在于将部分物理库存转化为**“合成库存”（Synthetic Inventory）**，或通过**“资产货币化 + 期权衍生品”**释放资金。

## 二、合作条款与关键机制设计

### 1. 资金安排条款：资金融通与权利金优化

为解决贸易商大批量建库的资金压力，条款设计应着重于降低初期资本占用，并优化资金成本。

* **方案 A：现货回购 + 看涨期权（库存变现模式）**
* **条款设计**：贸易商以当前低价采购现货，并将其“销售”给我司（或合作金融机构），释放 80%–90% 的流动资金。同时，贸易商支付少量权利金向我司买入一笔**场外看涨期权（Call Option）**。
* **效果**：贸易商既锁定了未来以低价“赎回”现货的权利（保留安全垫），又释放了大量现金流。

* **方案 B：预付货款 + 累计购入结构（Accumulator 条款）**
* **条款设计**：若贸易商判断当前处于价格底部震荡期，可嵌入“累计点价”条款。约定在未来 3–6 个月内，只要市价未跌破某一底线（Knock-out Price），贸易商可以**低于当前市价的固定折扣价**，定期定量购入现货。
* **效果**：平摊建仓成本，极其适合“左侧交易”建库。

### 2. 仓储物流与交割条款：期现转换（EFP）与弹性流向

“安全垫”的核心在于发生供应中断时能切切实实拿到现货。因此，物流条款必须具备高度的弹性和物理控制力。

* **静态仓单与动态置换条款**：
* 质押在我司指定交割库（或大型第三方物流枢纽）的粮食，其所有权在期权存续期内受法律保护。
* 允许贸易商进行“品质/库区动态置换”（在总价值或总量不变的前提下，允许因周转需要更换库容或粮食批次），保证粮食作为战略库存的鲜度。

* **弹性行权与实物交割（Physical Delivery Options）**：
* 场外期权到期时，条款应赋予贸易商“现金结算”或“实物交割”的双重选择权。
* 若市价暴涨或供应中断触发，贸易商选择**实物行权**，我司配合快速释放仓单，转为物理实体库存，直接投入其加工或贸易链条。

### 3. 风险控制机制：双向安全边界设置

场外期权模式在极端行情下同样面临风险（如价格继续击穿底部，或暴涨导致对手方履约风险）。风险控制条款是合作的基石。

* **设置价差保护带（Collar 领口结构）**：
* 为防止权利金过高，可设计买入看涨期权的同时，卖出一个远端看跌期权（Put）。
* **条款约定**：将价格波动限制在 $[P_{min}, P_{max}]$ 区间内。当价格极度下跌触及 $P_{min}$ 时，贸易商必须履行现货接货义务（由于其本意就是低点建库，这符合其战略意图）；当价格暴涨触及 $P_{max}$ 时，贸易商锁定了最高采购成本。

* **动态履约保障与追保机制（Margin Mechanism）**：
* 针对嵌入了“卖出隐含期权”的结构化条款，建立基于期现货联动（Mark-to-Market）的动态保证金/授信评估机制。
* **设置安全垫阈值**：当现货价格上涨时，贸易商持有的看涨期权增值，可部分抵消其在其他渠道的现货采购成本；若价格下跌，则通过其现货底补仓，避免单边爆仓风险。

        answer: `### 可选替代路径
巴西到港延迟时，华东压榨厂通常有三类替代方案：国内港口调货、切换其他进口来源、短期压缩开机。

1. 国内港口调货：执行最快，但容易推高短期到厂成本。
2. 切换其他进口来源：总成本未必最高，但需要重新核对蛋白、油分和到港窗口。
3. 压缩开机与延后采购：能保现金流，但会把履约压力转移到下游。

### 比较框架
建议按“到货确定性、单位成本、品质偏差、下游履约影响、现金占用”五个维度打分。若缺口只覆盖 7 到 10 天，优先本地调货；若缺口已经进入两周以上，应该同步评估替代进口和开机调整，而不是单押一种方案。`

        answer: `### 影响拆解
连续三周压港，本质上会同时拉长货权周转、延迟回款确认，并放大授信占用时间。

- 账期端：如果回款节点绑定提货或放货，压港会直接推迟应收回笼。
- 授信端：同一额度下，单笔业务占用时长变长，等于隐性压缩了新增交易空间。
- 保证金端：若滞期费、堆存费和改单费用持续累积，保证金安全边际会被快速侵蚀。

### 处置建议
建议把该客户改成“周度滚动复核”名单，单独看三项指标：平均压港天数、在途未结金额、追加费用增速。若任一指标连续两周恶化，应触发额度冻结或补保机制。`

- 钢厂：优先保证高炉连续性，库存目标以安全天数为主，不要追求绝对低价。

建议条款至少覆盖四块：
- 检测节点：装港、到港、卸货后三个节点谁为主、谁为复核。
- 第三方机构：哪些机构有效，复检触发条件是什么。
- 偏差容忍区间：水分、金属含量、杂质分别怎么设容差。
- 结算与索赔：是直接调价、补货还是现金赔付，时点和上限怎么定。

      node.textContent = text || "";
      return node.getBoundingClientRect().width;
    }

    function shouldStackCapabilityText(textarea, chipWidth, chipGap) {
      const value = textarea.value || "";
      if (!value.trim()) return false;
      if (value.includes("\n")) return true;
      const firstLineAvailable = Math.max(0, textarea.clientWidth - chipWidth - chipGap);
      if (firstLineAvailable < 80) return true;
      return measureComposerTextWidth(textarea, value) > firstLineAvailable;
    }

    function syncCapabilityChipLayout() {
      document.querySelectorAll("[data-composer-input-row]").forEach((inputRow) => {
        const chip = inputRow.querySelector("[data-capability-chip]");
        const textarea = inputRow.querySelector("textarea");
        const hasChip = Boolean(chip && !chip.hidden);
        inputRow.classList.toggle("has-capability", hasChip);
        inputRow.classList.remove("capability-stacked");
        if (hasChip && textarea) {
          const chipWidth = Math.ceil(chip.getBoundingClientRect().width || chip.scrollWidth || 180);
          const chipHeight = Math.ceil(chip.getBoundingClientRect().height || chip.scrollHeight || 30);
          const chipGap = 10;
          inputRow.style.setProperty("--capability-chip-offset", `${chipWidth + chipGap}px`);
          inputRow.style.setProperty("--capability-chip-height", `${chipHeight}px`);
          inputRow.classList.toggle("capability-stacked", shouldStackCapabilityText(textarea, chipWidth, chipGap));
        } else {
          inputRow.style.removeProperty("--capability-chip-offset");
          inputRow.style.removeProperty("--capability-chip-height");
        }
      });
    }

      const hour = String(roundedHour).padStart(2, "0");
      const minute = String((snappedMinute % 60)).padStart(2, "0");
      return `${hour}:${minute}`;

    function subscriptionWeekdayName(date) {
      return ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][date.getDay()];

    function parseSubscriptionTime(text = "", fallback = "09:00") {
      return String(text).match(/(\d{1,2}):(\d{2})/) || String(fallback).match(/(\d{1,2}):(\d{2})/);
    }

    function dateFromSubscriptionLabel(label, fallbackTime = "09:00") {
      const now = new Date();
      const timeMatch = parseSubscriptionTime(label, fallbackTime);
      const hour = Number(timeMatch?.[1] || 9);
      const minute = Number(timeMatch?.[2] || 0);
      const date = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0, 0);
      const text = String(label || "");
      const weekdayMap = { 日: 0, 天: 0, 一: 1, 二: 2, 三: 3, 四: 4, 五: 5, 六: 6 };
      if (text.startsWith("今天")) {
        date.setDate(date.getDate());
      } else if (text.startsWith("明天")) date.setDate(date.getDate() + 1);
      else if (text.startsWith("后天")) date.setDate(date.getDate() + 2);
      else if (text.startsWith("大后天")) date.setDate(date.getDate() + 3);
      else {
        const monthDay = text.match(/(\d{1,2})月(\d{1,2})日/);
        if (monthDay) {
          date.setMonth(Number(monthDay[1]) - 1, Number(monthDay[2]));
          if (date < now) date.setFullYear(date.getFullYear() + 1);
        } else {
          const weekday = text.match(/(?:(本周|下周)(?:周)?([一二三四五六日天])|周([一二三四五六日天]))/);
          if (weekday) {
            const target = weekdayMap[weekday[2] || weekday[3]];
            const weekOffset = weekday[1] === "下周" ? 7 : 0;
            const diff = (target - now.getDay() + 7) % 7;
            date.setDate(date.getDate() + diff + weekOffset);
          }
        }
      }
      return date;
    }

    function formatSubscriptionRunDate(date) {
      const today = new Date();
      const startToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const startTarget = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diffDays = Math.round((startTarget - startToday) / 86400000);
      const time = `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      if (diffDays === 0) return `今天 ${time}`;
      if (diffDays === 1) return `明天 ${time}`;
      if (diffDays === 2) return `后天 ${time}`;
      const startOfThisWeek = new Date(startToday);
      startOfThisWeek.setDate(startToday.getDate() - ((startToday.getDay() + 6) % 7));
      const startOfNextWeek = new Date(startOfThisWeek);
      startOfNextWeek.setDate(startOfThisWeek.getDate() + 7);
      const startOfWeekAfterNext = new Date(startOfThisWeek);
      startOfWeekAfterNext.setDate(startOfThisWeek.getDate() + 14);
      if (startTarget < startOfNextWeek) return `${subscriptionWeekdayName(date)} ${time}`;
      if (startTarget < startOfWeekAfterNext) return `下${subscriptionWeekdayName(date)} ${time}`;
      return `${date.getMonth() + 1}月${date.getDate()}日 ${time}`;
    }

    function getSkippedNextRunText(task) {
      const cadence = String(task?.cadence || "");
      const nextRun = String(task?.nextRun || "");
      const time = nextRun.match(/(\d{2}:\d{2})/)?.[1] || cadence.match(/(\d{2}:\d{2})/)?.[1] || "";
      const date = dateFromSubscriptionLabel(nextRun, time);
      if (cadence.includes("小时")) {
        date.setHours(date.getHours() + 1);
        return formatSubscriptionRunDate(date);
      }
      if (cadence.includes("每天")) {
        date.setDate(date.getDate() + 1);
        return formatSubscriptionRunDate(date);
      }
      if (cadence.includes("每周")) {
        date.setDate(date.getDate() + 7);
        return formatSubscriptionRunDate(date);
      }
      if (cadence.includes("每月")) {
        date.setMonth(date.getMonth() + 1);
        return formatSubscriptionRunDate(date);
      }
      return nextRun || "等待下次调度";
    }

    function getNextRunFromCadence(cadence = "") {
      const now = new Date();
      const text = String(cadence || "");
      const timeMatch = parseSubscriptionTime(text);
      const hour = Number(timeMatch?.[1] || 9);
      const minute = Number(timeMatch?.[2] || 0);
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0, 0);
      if (text.includes("小时")) {
        const minuteMatch = text.match(/(\d{1,2})\s*分/);
        next.setMinutes(Number(minuteMatch?.[1] || minute), 0, 0);
        if (next <= now) next.setHours(next.getHours() + 1);
        return formatSubscriptionRunDate(next);
      }
      if (text.includes("每天")) {
        if (next <= now) next.setDate(next.getDate() + 1);
        return formatSubscriptionRunDate(next);
      }
      if (text.includes("每周")) {
        const weekdayMap = { 日: 0, 天: 0, 一: 1, 二: 2, 三: 3, 四: 4, 五: 5, 六: 6 };
        const weekday = text.match(/周([一二三四五六日天])/);
        const target = weekdayMap[weekday?.[1] || "一"];
        const diff = (target - now.getDay() + 7) % 7;
        next.setDate(next.getDate() + diff);
        if (next <= now) next.setDate(next.getDate() + 7);
        return formatSubscriptionRunDate(next);
      }
      if (text.includes("每月")) {
        const day = Math.min(31, Math.max(1, Number(text.match(/每月\s*(\d{1,2})\s*日/)?.[1] || 1)));
        next.setDate(day);
        if (next <= now) next.setMonth(next.getMonth() + 1);
        return formatSubscriptionRunDate(next);
      }
      return formatSubscriptionRunDate(next);
    }

    function startOfSubscriptionDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function subscriptionCalendarKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function formatSubscriptionCalendarDate(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatSubscriptionCalendarTime(date) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function getSubscriptionCalendarDate(task) {
      if (!task || !getSubscriptionEnabled(task)) return null;
      const cadence = String(task.cadence || "");
      let label = String(getSubscriptionNextRunText(task) || "");
      if (!label || /待开启|等待/.test(label)) label = getNextRunFromCadence(cadence);
      const timeText = label.match(/(\d{1,2}:\d{2})/)?.[1] || cadence.match(/(\d{1,2}:\d{2})/)?.[1] || "09:00";
      if (label.includes("下小时")) {
        const now = new Date();
        const minute = Number(label.match(/(\d{1,2})\s*分/)?.[1] || timeText.split(":")[1] || 0);
        const date = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours() + 1, minute, 0, 0);
        if (date <= now) date.setHours(date.getHours() + 1);
        return date;
      }
      if (label.includes("下月")) {
        const [hour = "09", minute = "00"] = timeText.split(":");
        const day = Number(label.match(/下月\s*(\d{1,2})\s*日/)?.[1] || 1);
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth() + 1, day, Number(hour), Number(minute), 0, 0);
      }
      const date = dateFromSubscriptionLabel(label, timeText);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getSubscriptionCadenceTime(cadence = "") {
      const timeMatch = String(cadence || "").match(/(\d{1,2}):(\d{2})/);
      return {
        hour: Number(timeMatch?.[1] || 9),
        minute: Number(timeMatch?.[2] || 0)
      };
    }

    function getSubscriptionCadenceWeekdays(cadence = "") {
      const weekdayMap = { 日: 0, 天: 0, 一: 1, 二: 2, 三: 3, 四: 4, 五: 5, 六: 6 };
      const matches = Array.from(String(cadence || "").matchAll(/周([一二三四五六日天])/g))
        .map((match) => weekdayMap[match[1]])
        .filter((value) => Number.isInteger(value));
      return [...new Set(matches)];
    }

    function getSubscriptionCalendarEventsForMonth(task, monthStart, monthEnd) {
      const targetYear = 2026;
      if (!task || monthStart.getFullYear() !== targetYear) return [];
      const cadence = String(task.cadence || "");
      const { hour, minute } = getSubscriptionCadenceTime(cadence);
      const buildEvent = (date) => ({
        task,
        date: new Date(date.getFullYear(), date.getMonth(), date.getDate(), hour, minute, 0, 0)
      });
      if (cadence.includes("每月")) {
        const day = Number(cadence.match(/每月\s*(\d{1,2})\s*日/)?.[1] || 1);
        if (day < 1 || day > monthEnd.getDate()) return [];
        return [buildEvent(new Date(monthStart.getFullYear(), monthStart.getMonth(), day))];
      }
      if (cadence.includes("每周")) {
        const weekdays = getSubscriptionCadenceWeekdays(cadence);
        if (!weekdays.length) return [];
        const events = [];
        for (let day = 1; day <= monthEnd.getDate(); day += 1) {
          const date = new Date(monthStart.getFullYear(), monthStart.getMonth(), day);
          if (weekdays.includes(date.getDay())) events.push(buildEvent(date));
        }
        return events;
      }
      if (cadence.includes("每天") || cadence.includes("小时")) {
        return Array.from({ length: monthEnd.getDate() }, (_, index) => buildEvent(new Date(monthStart.getFullYear(), monthStart.getMonth(), index + 1)));
      }
      const nextDate = getSubscriptionCalendarDate(task);
      return nextDate && nextDate >= monthStart && nextDate <= monthEnd ? [{ task, date: nextDate }] : [];
    }

    function getSubscriptionSearchText(task) {
      return [
        task.name, task.cadence, getSubscriptionStatusMeta(task).label, task.channel, task.summary, task.prompt, task.lastRun, task.nextRun, task.delivery,

    function subscriptionActionButtonHtml(task) {
      if (!getSubscriptionEnabled(task)) {
