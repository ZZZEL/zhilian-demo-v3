              ${iconSvg("more")}
            </button>
            <span class="subscription-action-popover" role="menu">
              <button type="button" data-subscription-enable="${escapeHtml(task.id)}">
                ${iconSvg("play")}
                <span>启用</span>
              </button>
              <button type="button" data-subscription-delete="${escapeHtml(task.id)}">
                ${iconSvg("trash")}
                <span>删除</span>
              </button>
            </span>
          </span>
        `;
      }
      const action = getSubscriptionActionMeta(task);
      const skippedNextRun = Boolean(task?.skipNextRun);
      const primaryAction = action ? `
          <button type="button" data-subscription-action="${escapeHtml(task.id)}">
            ${iconSvg(action.icon)}
            <span>${escapeHtml(action.title)}</span>
          </button>
        ` : "";
      return `
        <span class="subscription-action-menu">
          <button class="subscription-action-trigger" type="button" aria-label="任务操作" title="任务操作">
            ${iconSvg("more")}
          </button>
          <span class="subscription-action-popover" role="menu">
            ${primaryAction}
            <button type="button" data-subscription-skip="${escapeHtml(task.id)}"${skippedNextRun ? " disabled" : ""}>
              ${iconSvg("skip")}
              <span>${skippedNextRun ? "已跳过下次执行" : "跳过下次执行"}</span>
            </button>
            <button type="button" data-subscription-delete="${escapeHtml(task.id)}">
              ${iconSvg("trash")}
              <span>删除</span>
            </button>
          </span>
        </span>
      `;
    }

    function subscriptionDocumentButtonHtml(task) {
      if (!canOpenSubscriptionResult(task)) return "";
      return `
        <button class="subscription-report-link" type="button" data-open-subscription-report="${escapeHtml(task.id)}" title="查看任务结果">
          查看结果
        </button>
      `;
    }

    function getSubscriptionReportId(taskId) {
      return `subscription-report-${taskId}`;
    }

    function getSubscriptionStatusLabel(task) {
      if (!task) return "待配置";
      if (!getSubscriptionEnabled(task)) return "已关闭";
      if (getSubscriptionExecutionStatus(task) === "执行中") return "执行中";
      if (task.lastRun && task.lastRun !== "刚刚创建") return "已运行";
      return getSubscriptionExecutionStatus(task) || "待配置";
    }

    function closeSubscriptionScheduleMenus(except = "") {
      subscriptionSchedule.querySelectorAll("[data-schedule-menu]").forEach((menu) => {
        const key = menu.dataset.scheduleMenu || "";
        const shouldKeepOpen = except && key === except;
        menu.hidden = !shouldKeepOpen;
        const slot = menu.closest(".subscription-schedule-slot");
        slot?.classList.toggle("is-open", shouldKeepOpen);
        slot?.querySelector("[data-schedule-menu-trigger]")?.setAttribute("aria-expanded", String(shouldKeepOpen));
      });
    }

    function setSubscriptionScheduleMenuOpen(key, open) {
      closeSubscriptionScheduleMenus(open ? key : "");
    }

    function updateSubscriptionScheduleSummary() {
      const frequencyLabels = {
        hourly: "每小时",
        daily: "每天",
        weekly: "每周",
        monthly: "每月"
      };
      subscriptionFrequencyLabel.textContent = frequencyLabels[activeSubscriptionFrequency] || "每天";
      subscriptionWeekdayLabel.textContent = subscriptionWeekdayText();
      const day = Math.min(31, Math.max(1, Number(subscriptionMonthday.value) || 1));
      subscriptionMonthday.value = String(day);
      subscriptionMonthdayLabel.textContent = `${day} 日`;
      const time = subscriptionTime.value || "09:00";
      const [, minute = "00"] = time.split(":");
      subscriptionTimeLabel.textContent = activeSubscriptionFrequency === "hourly" ? `${minute} 分` : time;
      subscriptionMonthdays.querySelectorAll("[data-monthday]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.monthday === String(day));
      });
      subscriptionTimes.querySelectorAll("[data-time-value]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.timeValue === (subscriptionTime.value || "09:00"));
      });
      subscriptionScheduleSummary.textContent = buildSubscriptionCadence();
    }

    function setSubscriptionFrequency(value) {
      activeSubscriptionFrequency = value;
      subscriptionSchedule.dataset.activeFrequency = value;
      subscriptionFrequency.querySelectorAll("[data-frequency]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.frequency === value);
      });
      document.querySelectorAll("[data-schedule-control]").forEach((control) => {
        const isActive = control.dataset.scheduleControl === value;
        control.hidden = !isActive;
      });
      document.querySelectorAll("[data-schedule-time]").forEach((control) => {
        control.hidden = false;
      });
      closeSubscriptionScheduleMenus();
      updateSubscriptionScheduleSummary();
    }

    function buildSubscriptionCadence() {
      const time = subscriptionTime.value || "09:00";
      const [, minute = "00"] = time.split(":");
      if (activeSubscriptionFrequency === "hourly") {
        return `每小时 ${minute} 分`;
      }
      if (activeSubscriptionFrequency === "weekly") {
        return `每${subscriptionWeekdayText()} ${time}`;
      }
      if (activeSubscriptionFrequency === "monthly") {
        const day = Math.min(31, Math.max(1, Number(subscriptionMonthday.value) || 1));
        subscriptionMonthday.value = String(day);
        return `每月 ${day} 日 ${time}`;
      }
      return `每天 ${time}`;
    }

    function nextRunLabel() {
      if (activeSubscriptionFrequency === "hourly") {
        const [, minute = "00"] = (subscriptionTime.value || "09:00").split(":");
        return `下小时 ${minute} 分`;
      }
      if (activeSubscriptionFrequency === "weekly") return `下${subscriptionWeekdayText()} ${subscriptionTime.value || "09:00"}`;
      if (activeSubscriptionFrequency === "monthly") return `下月 ${subscriptionMonthday.value || "1"} 日 ${subscriptionTime.value || "09:00"}`;
      return `明天 ${subscriptionTime.value || "09:00"}`;
    }

    function applyCadenceToForm(cadence = "") {
      const value = String(cadence);
      const timeMatch = value.match(/(\d{2}:\d{2})/);
      if (timeMatch) setSubscriptionTimeValue(timeMatch[1]);
      if (value.includes("小时")) {
        setSubscriptionFrequency("hourly");
        return;
      }
      if (value.includes("每周")) {
        const weekdays = Object.entries(subscriptionWeekdayLabels)
          .filter(([, label]) => value.includes(label))
          .map(([key]) => key);
        setSelectedSubscriptionWeekdays(weekdays);
        setSubscriptionFrequency("weekly");
        return;
      }
	      if (value.includes("每月")) {
	        const dayMatch = value.match(/每月\s*(\d{1,2})\s*日/);
	        if (dayMatch) setSubscriptionMonthdayValue(dayMatch[1]);
	        setSubscriptionFrequency("monthly");
	        return;
	      }
      setSubscriptionFrequency("daily");
    }

    function applySubscriptionTemplate(task) {
      if (task) {
        activeSubscriptionTemplateId = task.id;
        subscriptionDraftName.value = task.name;
        subscriptionDraftDescription.value = task.summary;
        subscriptionDraftPrompt.value = defaultSubscriptionPrompt(task);
        applyCadenceToForm(task.cadence);
        return;
      }
      activeSubscriptionTemplateId = "";
      subscriptionDraftName.value = "";
      subscriptionDraftDescription.value = "";
      subscriptionDraftPrompt.value = "";
      resetSubscriptionTimeToNow();
      setSelectedSubscriptionWeekdays(["1"]);
      setSubscriptionFrequency("daily");
    }

    function findSubscriptionTemplateTask(id) {
      return subscriptionTemplateTasks.find((task) => task.id === id)
        || subscriptionTasks.find((task) => task.id === id)
        || null;
    }

    function getDraftSubscriptionProfile() {
      const template = activeSubscriptionTemplateId ? findSubscriptionTemplateTask(activeSubscriptionTemplateId) : null;
      const preset = template || inferSubscriptionProfilePreset();
      return {
        summary: subscriptionDraftDescription.value.trim() || preset.summary,
        agents: [...(preset.agents || [])],
        skills: [...(preset.skills || [])],
        channel: preset.channel || "智链收件箱"
      };
    }

    function setSubscriptionDraftEnabled(enabled) {
      subscriptionDraftEnabled.setAttribute("aria-checked", String(enabled));
      subscriptionStateText.textContent = enabled ? "已启用" : "已停用";
    }

    function openSubscriptionModal(mode = "create") {
      const isEdit = mode === "edit";
      subscriptionModal.hidden = false;
      subscriptionModalTitle.textContent = isEdit ? "编辑任务" : "创建任务";
      subscriptionSaveBtn.textContent = isEdit ? "保存修改" : "创建";
      closeSubscriptionScheduleMenus();
      updateSubscriptionScheduleSummary();
      requestAnimationFrame(() => subscriptionDraftName.focus());
    }

    function closeSubscriptionModal() {
      if (subscriptionModal.hidden) return;
      subscriptionModal.hidden = true;
      activeEditingSubscriptionId = "";
      if (!activeSubscriptionId) activeSubscriptionTemplateId = "";
      document.querySelectorAll("[data-template-task]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.templateTask === activeSubscriptionTemplateId);
      });
    }

    function fillSubscriptionCreateForm(task, options = {}) {
      activeEditingSubscriptionId = "";
      applySubscriptionTemplate(task || null);
      if (options.name) subscriptionDraftName.value = options.name;
      if (options.description) subscriptionDraftDescription.value = options.description;
      if (options.prompt) subscriptionDraftPrompt.value = options.prompt;
      if (options.frequency) setSubscriptionFrequency(options.frequency);
      setSubscriptionDraftEnabled(true);
      document.querySelectorAll("[data-template-task]").forEach((button) => {
        button.classList.toggle("is-active", task && button.dataset.templateTask === task.id);
      });
      openSubscriptionModal("create");
    }

    function fillSubscriptionEditForm(task) {
      if (!task) return;
      activeSubscriptionId = task.id;
      activeEditingSubscriptionId = task.id;
      activeSubscriptionTemplateId = "";
      subscriptionDraftName.value = task.name;
      subscriptionDraftDescription.value = task.summary || "";
      subscriptionDraftPrompt.value = defaultSubscriptionPrompt(task);
      setSubscriptionDraftEnabled(getSubscriptionEnabled(task));
      applyCadenceToForm(task.cadence);
      openSubscriptionModal("edit");
    }

    function renderSubscriptionCalendar(visibleTasks = getVisibleSubscriptionTasks()) {
      const today = startOfSubscriptionDay(new Date());
      const monthStart = new Date(activeSubscriptionCalendarMonth.getFullYear(), activeSubscriptionCalendarMonth.getMonth(), 1);
      const monthEnd = new Date(activeSubscriptionCalendarMonth.getFullYear(), activeSubscriptionCalendarMonth.getMonth() + 1, 0);
      const leadingBlankCount = monthStart.getDay();
      const monthDayCount = monthEnd.getDate();
      const totalCells = Math.ceil((leadingBlankCount + monthDayCount) / 7) * 7;
      const trailingBlankCount = totalCells - leadingBlankCount - monthDayCount;
      subscriptionCalendarGrid.style.setProperty("--subscription-calendar-weeks", String(totalCells / 7));
      subscriptionCalendarMonth.textContent = `${activeSubscriptionCalendarMonth.getFullYear()}年${activeSubscriptionCalendarMonth.getMonth() + 1}月`;
      const days = Array.from({ length: monthDayCount }, (_, index) => {
        const date = new Date(monthStart);
        date.setDate(index + 1);
        return date;
      });
      const events = visibleTasks
        .flatMap((task) => getSubscriptionCalendarEventsForMonth(task, monthStart, monthEnd))
        .sort((a, b) => a.date - b.date || a.task.name.localeCompare(b.task.name, "zh-CN"));
      const eventsByDay = events.reduce((map, item) => {
        const key = subscriptionCalendarKey(item.date);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
        return map;
      }, new Map());
      const weekdayHeader = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"]
        .map((label) => `<div class="subscription-calendar-weekday">${label}</div>`)
        .join("");
      const leadingSpacers = Array.from({ length: leadingBlankCount }, (_, index) => {
        const cellIndex = index;
        const isBeforeDay = index === leadingBlankCount - 1;
        const isMonthLastRow = cellIndex >= totalCells - 7;
        return `<span class="subscription-calendar-spacer${isBeforeDay ? " is-before-day" : ""}${isMonthLastRow ? " is-month-last-row" : ""}" aria-hidden="true"></span>`;
      }).join("");
      const trailingSpacers = Array.from({ length: trailingBlankCount }, (_, index) => {
        const cellIndex = leadingBlankCount + monthDayCount + index;
        const isMonthLastRow = cellIndex >= totalCells - 7;
        return `<span class="subscription-calendar-spacer${isMonthLastRow ? " is-month-last-row" : ""}" aria-hidden="true"></span>`;
      }).join("");
      const dayHtml = days.map((date, index) => {
        const key = subscriptionCalendarKey(date);
        const dayEvents = eventsByDay.get(key) || [];
        const isToday = subscriptionCalendarKey(date) === subscriptionCalendarKey(today);
        const relativeLabel = isToday ? "今天" : subscriptionWeekdayName(date);
        const cellIndex = leadingBlankCount + index;
        const isWeekEnd = cellIndex % 7 === 6;
        const isMonthLastRow = cellIndex >= totalCells - 7;
        return `
          <section class="subscription-calendar-day${isToday ? " is-today" : ""}${isWeekEnd ? " is-week-end" : ""}${isMonthLastRow ? " is-month-last-row" : ""}" aria-label="${escapeHtml(formatSubscriptionCalendarDate(date))} ${escapeHtml(relativeLabel)}">
            <div class="subscription-calendar-day-head">
              <span class="subscription-calendar-date">
                <strong>${escapeHtml(String(date.getDate()))}</strong>
              </span>
            </div>
            <div class="subscription-calendar-events">
              ${dayEvents.length ? dayEvents.map(({ task, date: eventDate }) => {
                return `
                  <button class="subscription-calendar-event" type="button" data-calendar-task="${escapeHtml(task.id)}" title="编辑任务：${escapeHtml(task.name)}">
                    <span class="subscription-calendar-time">${escapeHtml(formatSubscriptionCalendarTime(eventDate))}</span>
                    <strong class="subscription-calendar-event-title">${escapeHtml(task.name)}</strong>
                  </button>
                `;
              }).join("") : `<span class="subscription-calendar-day-empty">暂无安排</span>`}
            </div>
          </section>
        `;
      }).join("");
      subscriptionCalendarGrid.innerHTML = weekdayHeader + leadingSpacers + dayHtml + trailingSpacers;
    }

    function changeSubscriptionCalendarMonth(offset) {
      activeSubscriptionCalendarMonth = new Date(activeSubscriptionCalendarMonth.getFullYear(), activeSubscriptionCalendarMonth.getMonth() + offset, 1);
      renderSubscriptions();
    }

    function resetSubscriptionCalendarToToday() {
      const now = new Date();
      activeSubscriptionCalendarMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      if (subscriptionCalendarMonth) {
        subscriptionCalendarMonth.textContent = `${activeSubscriptionCalendarMonth.getFullYear()}年${activeSubscriptionCalendarMonth.getMonth() + 1}月`;
      }
    }

    function renderSubscriptions() {
      const query = subscriptionsSearch.value.trim().toLowerCase();
      const visibleTasks = getVisibleSubscriptionTasks();
      subscriptionTotalCount.textContent = `共 ${subscriptionTasks.length} 个任务`;
      subscriptionDirectory.classList.toggle("is-empty", visibleTasks.length === 0);
      subscriptionEmpty.textContent = query ? "没有匹配的任务" : "暂无任务";
      if (activeSubscriptionId && !visibleTasks.some((task) => task.id === activeSubscriptionId)) {
        activeSubscriptionId = "";
      }
      subscriptionGrid.innerHTML = visibleTasks.map((task) => {
        const statusMeta = getSubscriptionStatusMeta(task);
        const nextRunText = getSubscriptionNextRunText(task);
        return `
          <article class="subscription-card${subscriptionHighlightId === task.id ? " is-source-highlight" : ""}" data-subscription-id="${escapeHtml(task.id)}">
            <div class="subscription-card-main" role="button" tabindex="0" data-subscription-detail="${escapeHtml(task.id)}" title="编辑任务">
              <strong>${escapeHtml(task.name)}</strong>
              <p>${escapeHtml(task.summary)}</p>
            </div>
            <aside class="subscription-card-side">
              <span class="subscription-status-group">
                <span class="subscription-card-status ${escapeHtml(statusMeta.className)}">${escapeHtml(statusMeta.label)}</span>
                ${subscriptionActionButtonHtml(task)}
              </span>
            </aside>
            <span class="subscription-card-footer">
              <span class="subscription-time-group">
                <span class="subscription-card-cadence">${escapeHtml(task.cadence)}</span>
                <span class="subscription-time-separator" aria-hidden="true">|</span>
                <span class="subscription-card-next" title="${escapeHtml(nextRunText)}">下次触发：${escapeHtml(nextRunText)}</span>
              </span>
              <span class="subscription-document-group">
                ${subscriptionDocumentButtonHtml(task)}
              </span>
            </span>
          </article>
        `;
      }).join("");
      renderSubscriptionCalendar(visibleTasks);
    }

    function applySubscriptionAction(taskId) {
      const task = subscriptionTasks.find((item) => item.id === taskId);
      if (!task) return;
      const action = getSubscriptionActionMeta(task);
      if (!action) return;
      task.executionStatus = action.nextStatus;
      renderSubscriptions();
    }

    function skipSubscriptionNextRun(taskId) {
      const task = subscriptionTasks.find((item) => item.id === taskId);
      if (!task) return;
      if (task.skipNextRun) return;
      task.nextRun = getSkippedNextRunText(task);
      task.skipNextRun = true;
      renderSubscriptions();
    }

    function enableSubscriptionTask(taskId) {
      const task = subscriptionTasks.find((item) => item.id === taskId);
      if (!task) return;
      task.enabled = true;
      task.nextRun = getNextRunFromCadence(task.cadence);
      delete task.skipNextRun;
      renderSubscriptions();
    }

    function deleteSubscriptionTask(taskId) {
      const index = subscriptionTasks.findIndex((item) => item.id === taskId);
      if (index < 0) return;
      if (!confirm(`确认删除「${subscriptionTasks[index].name}」？`)) return;
      subscriptionTasks.splice(index, 1);
      if (activeSubscriptionId === taskId) activeSubscriptionId = "";
      renderSubscriptions();
    }

    function saveSubscriptionDraft() {
      const name = subscriptionDraftName.value.trim() || "新任务";
      const profile = getDraftSubscriptionProfile();
      const modelSummary = subscriptionModelSummary();
      const cadence = buildSubscriptionCadence();
      const channel = profile.channel;
      const prompt = subscriptionDraftPrompt.value.trim();
      const nextRun = nextRunLabel();
      const draftEnabled = subscriptionDraftEnabled.getAttribute("aria-checked") === "true";
      const editingTask = activeEditingSubscriptionId ? subscriptionTasks.find((item) => item.id === activeEditingSubscriptionId) : null;
      if (editingTask) {
        editingTask.name = name;
        editingTask.enabled = draftEnabled;
        editingTask.executionStatus = getSubscriptionExecutionStatus(editingTask);
        editingTask.cadence = cadence;
        editingTask.channel = channel;
        editingTask.summary = profile.summary;
        editingTask.prompt = prompt;
        editingTask.modelAbilities = modelSummary;
        editingTask.agents = profile.agents;
        editingTask.skills = profile.skills;
        editingTask.nextRun = draftEnabled ? nextRun : "待开启";
        activeSubscriptionId = editingTask.id;
        activeEditingSubscriptionId = "";
        subscriptionsSearch.value = "";
        closeSubscriptionModal();
        setSubscriptionView(activeSubscriptionView, { render: false });
        renderSubscriptions();
        return;
      }
      const id = `draft-${Date.now()}`;
      subscriptionTasks.unshift({
        id,
        name,
        enabled: draftEnabled,
        executionStatus: "待执行",
        cadence,
        channel,
        summary: profile.summary,
        prompt,
        modelAbilities: modelSummary,
        agents: profile.agents,
        skills: profile.skills,
        lastRun: "刚刚创建",
        nextRun: draftEnabled ? nextRun : "待开启",
        delivery: "等待首次推送",
        pushesToday: 0
      });
      activeSubscriptionId = id;
      subscriptionsSearch.value = "";
      activeSubscriptionTemplateId = "";
      closeSubscriptionModal();
      setSubscriptionView(activeSubscriptionView, { render: false });
      renderSubscriptions();
    }

    function toggleSkillEnabled(skillId) {
      const skill = skillCatalog.find((item) => item.id === skillId);
      if (!skill) return;
      skill.enabled = !getSkillEnabled(skill);
      if (!getSkillEnabled(skill) && activeCapabilityState?.type === "skill" && activeCapabilityState.id === skillId) {
        clearActiveCapability();
      } else {
        renderCapabilityControls();
      }
      renderSkills();
      if (!detailOverlay.hidden && activeSkillId === skillId) {
        detailDrawer.innerHTML = buildSkillDetailHtml(skill);
      }
    }

    function setVoiceButtonState(button, listening) {
      button.classList.toggle("is-listening", listening);
      button.setAttribute("aria-pressed", String(listening));
      button.setAttribute("title", listening ? "正在听写" : "语音输入");
      button.setAttribute("aria-label", listening ? "正在听写" : "语音输入");
    }

    function insertVoiceText(target, text) {
      const value = target.value || "";
      const separator = value && !/[\s，。！？；、]$/.test(value) ? "，" : "";
      target.value = `${value}${separator}${text}`;
      target.dispatchEvent(new Event("input", { bubbles: true }));
      target.focus();
    }

    function startVoiceInput(button) {
      const target = document.getElementById(button.dataset.voiceTarget || "");
      if (!target) return;
      if (activeRecognition) {
        activeRecognition.stop();
        activeRecognition = null;
        document.querySelectorAll(".voice-button.is-listening").forEach((item) => setVoiceButtonState(item, false));
        return;
      }
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Recognition) {
        button.setAttribute("title", "当前浏览器暂不支持语音输入");
        button.setAttribute("aria-label", "当前浏览器暂不支持语音输入");
        target.focus();
        return;
      }
      const recognition = new Recognition();
      activeRecognition = recognition;
      recognition.lang = "zh-CN";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      setVoiceButtonState(button, true);
      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map((result) => result[0]?.transcript || "")
          .join("")
          .trim();
        if (transcript) insertVoiceText(target, transcript);
      };
      recognition.onend = () => {
        activeRecognition = null;
        setVoiceButtonState(button, false);
      };
      recognition.onerror = () => {
        activeRecognition = null;
        setVoiceButtonState(button, false);
        target.focus();
      };
      recognition.start();
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function getFileExt(name) {
      const ext = String(name || "").split(".").pop();
      return ext && ext !== name ? ext.toLowerCase() : "";
    }

    function getFileBaseName(name) {
      return String(name || "未命名文件").replace(/\.[^/.]+$/, "") || "未命名文件";
    }

    function isSupportedUpload(file) {
      const ext = getFileExt(file.name || "");
      return SUPPORTED_UPLOAD_EXTENSIONS.has(ext) || String(file.type || "").startsWith("image/");
    }

    function getFileIconLabel(file) {
      const ext = getFileExt(file.name || "");
      if (["jpg", "jpeg"].includes(ext)) return "JPG";
      if (["png", "webp", "gif", "bmp", "heic", "heif"].includes(ext)) return ext.toUpperCase().slice(0, 4);
      if (["doc", "docx"].includes(ext)) return "DOC";
      if (["xls", "xlsx", "csv"].includes(ext)) return "XLS";
      if (["ppt", "pptx"].includes(ext)) return "PPT";
      if (["txt", "md", "rtf"].includes(ext)) return "TXT";
      return ext ? ext.toUpperCase().slice(0, 4) : "FILE";
    }

    function getFileIconClass(file) {
      const ext = getFileExt(file.name || "");
      if (ext === "pdf") return "is-pdf";
      if (["doc", "docx"].includes(ext)) return "is-doc";
      if (["xls", "xlsx", "csv"].includes(ext)) return "is-sheet";
      if (["ppt", "pptx"].includes(ext)) return "is-slide";
      if (["png", "jpg", "jpeg", "webp", "gif", "bmp", "heic", "heif"].includes(ext) || String(file.type || "").startsWith("image/")) return "is-image";
      if (["txt", "md", "rtf"].includes(ext)) return "is-text";
      return "is-text";
    }

    function normalizeFile(file) {
      return {
        id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
        name: file.name || "未命名文件",
        displayName: getFileBaseName(file.name || "未命名文件"),
        size: file.size || 0,
        type: file.type || "",
        ext: getFileIconLabel(file),
        iconClass: getFileIconClass(file)
      };
    }

    function attachmentHtml(file, options = {}) {

    function renderInlineMarkdown(value) {
      return escapeHtml(value)

        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
        .replace(/\*\*([\s\S]+?)\*\*/g, "<strong>$1</strong>")
        .replace(/(^|[^\*])\*([^\*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
    }

    function renderMarkdownTable(rows) {
      const cleanRows = rows
        .map((row) => row.trim())
        .filter((row) => row && !/^\|\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(row))
        .map((row) => row.replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim()));
      if (!cleanRows.length) return "";
      const [head, ...body] = cleanRows;
      return `
        <div class="result-table-wrap">
          <table>
            <thead>
              <tr>${head.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${body.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function markdownToBlocks(content) {
      const lines = content.split("\n");
      const blocks = [];
      let listItems = [];
      let tableRows = [];
      let paragraphLines = [];

      const flushList = () => {
        if (!listItems.length) return;
        blocks.push(`<ul>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
        listItems = [];
      };

      const flushTable = () => {
        if (!tableRows.length) return;
        blocks.push(renderMarkdownTable(tableRows));
        tableRows = [];
      };

      const flushParagraph = () => {
        if (!paragraphLines.length) return;
        blocks.push(`<p>${renderInlineMarkdown(paragraphLines.join(" "))}</p>`);
        paragraphLines = [];
      };

      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) {
          flushParagraph();
          flushList();
          flushTable();
          return;
        }
        if (/^\|.*\|$/.test(trimmed)) {
          flushParagraph();
          flushList();
          tableRows.push(trimmed);
          return;
        }
        flushTable();
        if (/^-{3,}$/.test(trimmed)) {
          flushParagraph();
          flushList();
          blocks.push("<hr>");
          return;
        }
        if (trimmed.startsWith("### ")) {
          flushParagraph();
          flushList();
          blocks.push(`<h3>${renderInlineMarkdown(trimmed.slice(4))}</h3>`);
          return;
        }
        if (trimmed.startsWith("## ")) {
          flushParagraph();
          flushList();
          blocks.push(`<h2>${renderInlineMarkdown(trimmed.slice(3))}</h2>`);
          return;
        }
        if (trimmed.startsWith("# ")) {
          flushParagraph();
          flushList();
          blocks.push(`<h2>${renderInlineMarkdown(trimmed.slice(2))}</h2>`);
          return;
        }
        const bulletMatch = trimmed.match(/^[-*]\s+(.+)$/);
        const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
        if (bulletMatch || orderedMatch) {
          flushParagraph();
          listItems.push((bulletMatch || orderedMatch)[1]);
          return;
        }
        flushList();
        paragraphLines.push(trimmed);
      });
      flushParagraph();
      flushList();
      flushTable();
      return blocks;
    }

    function markdownToHtml(content) {
      return markdownToBlocks(content).join("");
    }

    async function streamMarkdownText(target, content, runId) {
      target.innerHTML = "";
      target.classList.add("is-streaming");
      let index = 0;
      while (index < content.length) {
        if (activeRunId !== runId) return false;
        const char = content[index] || "";
        const chunkSize = /[。！？；\n]/.test(char) ? 1 : content.length > 2400 ? 5 : 3;
        index = Math.min(content.length, index + chunkSize);
        target.innerHTML = markdownToHtml(content.slice(0, index));
        scrollToBottom();
        const pause = /[。！？]/.test(char) ? 95 : /[，、；]/.test(char) ? 44 : char === "\n" ? 58 : 11;
        await sleep(pause);
      }
      target.innerHTML = markdownToHtml(content);
      target.classList.remove("is-streaming");
      scrollToBottom();
      return true;
    }

    function finishInlineRename(row, index, shouldSave = true) {
      const input = row.querySelector("[data-history-title-input]");
      if (!input) return;
      const record = conversationHistory[index];
      if (record && shouldSave) {
        const nextTitle = input.value.trim();
        if (nextTitle) {
          conversationHistory[index] = { ...record, title: nextTitle, updatedAt: Date.now() };
          persistHistory();
        }
      }
      renderHistory();

    function startInlineRename(row, index) {
      const record = conversationHistory[index];
      const title = row.querySelector(".history-title");
      if (!record || !title || title.querySelector("[data-history-title-input]")) return;
      closeHistoryMenus();
      title.innerHTML = `<input class="history-title-input" data-history-title-input type="text" value="${escapeHtml(getHistoryTitle(record))}" aria-label="重命名对话">`;
      const input = title.querySelector("[data-history-title-input]");
      input.focus();
      input.select();
      input.addEventListener("click", (event) => event.stopPropagation());
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          finishInlineRename(row, index, true);
        }
        if (event.key === "Escape") {
          event.preventDefault();
          finishInlineRename(row, index, false);
        }
      });
      input.addEventListener("blur", () => finishInlineRename(row, index, true));
    }

    function getHistoryTimestamp(item) {
      const value = Number(item?.updatedAt || item?.createdAt || 0);
      return Number.isFinite(value) && value > 0 ? value : 0;

    function getHistoryGroupLabel(item) {
      const timestamp = getHistoryTimestamp(item) || Date.now();
      const now = Date.now();
      const age = now - timestamp;
      const dayMs = 24 * 60 * 60 * 1000;
      if (age <= 7 * dayMs) return "";
      if (age <= 30 * dayMs) return "30天内";
      const date = new Date(timestamp);
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${date.getFullYear()}-${month}`;
    }

    function renderHistory() {
      const query = historySearch.value.trim().toLowerCase();
      const visibleHistory = conversationHistory
        .map((item, index) => ({ ...item, index }))
        .filter((item) => {
          const searchable = `${item.question} ${getHistoryTitle(item)}`.toLowerCase();
          return !query || searchable.includes(query);
        })
        .sort((a, b) => getHistoryTimestamp(b) - getHistoryTimestamp(a));
      const groups = visibleHistory.reduce((acc, item) => {
        const label = getHistoryGroupLabel(item);
        const group = acc.find((entry) => entry.label === label);
        if (group) {
          group.items.push(item);
        } else {
          acc.push({ label, items: [item] });
        }
        return acc;
      }, []);
      historyList.innerHTML = groups.map((group) => `
        ${group.label ? `<div class="history-group-label">${escapeHtml(group.label)}</div>` : ""}
        ${group.items.map(renderHistoryRow).join("")}

        return;
      }
      const sourceQuestion = report.sourceQuestion || report.project || report.title;
      const existing = conversationHistory.find((item) => item.question === sourceQuestion);
      closeReportsPreview(true);
      if (existing?.messagesHtml) {
        showHistoryRecord(existing);
        return;
      }
      if (report.sourceScenarioKey && report.sourceScenarioKey !== "custom") {
        runAnalysis(report.sourceScenarioKey, sourceQuestion);

    function closeReportsPreview(immediate = false, renderList = true) {
      activeReportIndex = "";
      if (immediate) {
        reportsView.classList.remove("preview-open", "preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");
        if (renderList && reportsView.classList.contains("active")) {
          renderReports();
        }
        return;
      }
      if (!reportsView.classList.contains("preview-open")) {
        reportsView.classList.remove("preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");
        if (renderList && reportsView.classList.contains("active")) {
          renderReports();
        }
        return;
      }
      reportsView.classList.remove("preview-open");
      reportsView.classList.add("preview-closing");
      if (renderList && reportsView.classList.contains("active")) {
        renderReports();
      }
      setTimeout(() => {
        reportsView.classList.remove("preview-closing");
        reportsPreview.setAttribute("aria-hidden", "true");

    function addHistoryEntry(question, scenarioKey, toolState = activeToolState, capabilityState = activeCapabilityState) {
      const existing = conversationHistory.find((item) => item.question === question);
      const now = Date.now();
      conversationHistory = conversationHistory.filter((item) => item.question !== question);
      conversationHistory.unshift({
        question,
        scenarioKey,
        title: existing?.title || "",
        favorite: Boolean(existing?.favorite),
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        toolState: normalizeToolState(toolState),
        capabilityState: normalizeCapabilityState(capabilityState),
        messagesHtml: stripReportArtifacts(existing?.messagesHtml || ""),
        reportTitle: "",
        reportMeta: "",
        reportTime: "",
        seedKey: existing?.seedKey || "",
        seedVersion: Number(existing?.seedVersion || 0)
      });
      conversationHistory = conversationHistory.slice(0, 40);
      persistHistory();
      renderHistory();
    }

    function saveHistorySnapshot(question) {
      const index = conversationHistory.findIndex((item) => item.question === question);
      if (index < 0) return;
      const snapshot = messages.cloneNode(true);
      snapshot.querySelectorAll("[data-live-process]").forEach((node) => node.removeAttribute("data-live-process"));
      snapshot.querySelectorAll("[data-live-file]").forEach((node) => node.remove());
      conversationHistory[index] = {
        ...conversationHistory[index],
        updatedAt: Date.now(),
        toolState: normalizeToolState(activeRunToolState),
        capabilityState: normalizeCapabilityState(activeRunCapabilityState),
        messagesHtml: snapshot.innerHTML,
        reportTitle: "",
        reportMeta: "",
        reportTime: ""
      };
      persistHistory();
      renderHistory();
    }

    async function typeText(target, content, runId, speed = 15) {
      target.textContent = "";
      for (let i = 0; i < content.length; i += 1) {
        if (activeRunId !== runId) return false;
        target.textContent += content[i];
        if (i % 3 === 0) scrollToBottom();
        const char = content[i];
        await sleep(char === "\n" ? 180 : /[。；，、]/.test(char) ? speed * 4 : speed);
      }
      scrollToBottom();
      return true;
    }

    async function typeParagraphs(target, content, runId, speed = 12) {
      target.innerHTML = "";
      const paragraphs = content.split("\n").filter(Boolean);
      for (let i = 0; i < paragraphs.length; i += 1) {
        if (activeRunId !== runId) return false;
        const paragraph = document.createElement("p");
        target.appendChild(paragraph);
        const complete = await typeText(paragraph, paragraphs[i], runId, speed);
        if (!complete) return false;
        if (i < paragraphs.length - 1) await sleep(210);
      }
      return true;
    }

    async function addAssistantBubble(output, content, runId) {
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      output.appendChild(bubble);
      scrollToBottom();
      await typeText(bubble, content, runId, 13);
      return bubble;
    }

    async function addResultBubble(output, data, runId) {
      const bubble = document.createElement("div");

      if (!complete) return bubble;
      scrollToBottom();
      return bubble;
    }

    function getSourceInitial(source) {
      const normalized = String(source || "").trim();
      if (!normalized) return "S";
      const firstAscii = normalized.match(/[A-Za-z]/);
      return firstAscii ? firstAscii[0].toUpperCase() : normalized.slice(0, 1);
    }

    function getHostname(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return "";
      }
    }

    function getFaviconUrl(url) {
      const hostname = getHostname(url);
      return hostname ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostname)}&sz=32` : "";
    }

    function renderSearchResultCard(item, index) {
      const faviconUrl = getFaviconUrl(item.url);
      return `
        <a class="search-result-card" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">
          ${faviconUrl
          ? `<img class="search-result-favicon" src="${escapeHtml(faviconUrl)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('span'), { className: 'search-result-fallback', textContent: '${escapeHtml(getSourceInitial(item.source))}' }))">`
          : `<span class="search-result-fallback" aria-hidden="true">${escapeHtml(getSourceInitial(item.source))}</span>`}
          <span class="search-result-main">
            <strong>${escapeHtml(item.title)}</strong>
            <p>${escapeHtml(item.summary)}</p>
          </span>
        </a>
      `;
    }

    function renderSearchStatus(group, revealCount) {
      const isComplete = revealCount >= group.results.length;
      return `
        <div class="search-status${isComplete ? " is-complete" : ""}" data-search-status>
          <span class="search-status-main">已识别到 ${Math.min(revealCount, group.results.length)} 个相关结果</span>
        </div>
      `;
    }

    function renderSearchResults(group, revealCount) {
      const visibleResults = group.results.slice(0, revealCount);
      return `
        ${renderSearchStatus(group, revealCount)}
        <div class="search-results" data-search-results>
          ${visibleResults.map((item, index) => renderSearchResultCard(item, index)).join("")}
        </div>
      `;
    }

    function openSearchPanel(searchKey, query, options = {}) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (options.auto && sidePanelDismissed) return;
      const revealCount = typeof options.revealCount === "number" ? options.revealCount : group.results.length;
      panelKicker.textContent = "检索结果";
      panelTitle.textContent = query || group.title;
      panelDownload.style.display = "none";
      panelBody.className = "preview-body search-results-body";
      panelBody.innerHTML = renderSearchResults(group, Math.min(revealCount, group.results.length));
      renderedSearchKey = searchKey;
      renderedSearchCount = Math.min(revealCount, group.results.length);
      openSidePanel(options);
    }

    function appendSearchResults(searchKey, query, revealCount, options = {}) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (options.auto && sidePanelDismissed) return;
      const nextCount = Math.min(revealCount, group.results.length);
      if (renderedSearchKey !== searchKey || panelBody.className !== "preview-body search-results-body") {
        openSearchPanel(searchKey, query || group.title, { ...options, revealCount: nextCount });
        return;
      }
      panelKicker.textContent = "检索结果";
      panelTitle.textContent = query || group.title;
      panelDownload.style.display = "none";
      openSidePanel(options);
      const list = panelBody.querySelector("[data-search-results]");
      if (!list) {
        openSearchPanel(searchKey, query || group.title, { ...options, revealCount: nextCount });
        return;
      }
      const status = panelBody.querySelector("[data-search-status]");
      if (status) {
        status.outerHTML = renderSearchStatus(group, nextCount);
      }
      for (let i = renderedSearchCount; i < nextCount; i += 1) {
        list.insertAdjacentHTML("beforeend", renderSearchResultCard(group.results[i], i));
      }
      renderedSearchCount = nextCount;
      panelBody.scrollTo({ top: panelBody.scrollHeight, behavior: "smooth" });
    }

    function startAutoSearchPanel(searchKey) {
      if (sidePanelDismissed) return;
      if (activeAutoSearchKey !== searchKey) {
        activeAutoSearchKey = searchKey;
        activeAutoSearchCount = 0;
      }
      const group = searchResultGroups[searchKey];
      openSearchPanel(searchKey, group?.title, { auto: true, revealCount: activeAutoSearchCount });
    }

    function revealAutoSearchResult(searchKey) {
      if (sidePanelDismissed) return;
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (activeAutoSearchKey !== searchKey) {
        activeAutoSearchKey = searchKey;
        activeAutoSearchCount = 0;
      }
      activeAutoSearchCount = Math.min(activeAutoSearchCount + 1, group.results.length);
      appendSearchResults(searchKey, group.title, activeAutoSearchCount, { auto: true });
    }

    function searchRevealDelay(index, total) {
      const cadence = [190, 250, 220, 300, 210, 270, 240];
      const densityAdjustment = total > 10 ? -45 : total < 5 ? 55 : 0;
      return Math.max(170, cadence[index % cadence.length] + densityAdjustment);
    }

    async function revealSearchResultsForChip(searchKey, runId) {
      const group = searchResultGroups[searchKey];
      if (!group) return;
      if (sidePanelDismissed) {
        await sleep(900);
        return true;
      }
      startAutoSearchPanel(searchKey);
      await sleep(280);
      for (let i = activeAutoSearchCount; i < group.results.length; i += 1) {
        if (activeRunId !== runId) return false;
        if (sidePanelDismissed) return true;
        revealAutoSearchResult(searchKey);
        await sleep(searchRevealDelay(i, group.results.length));
        if ((i + 1) % 5 === 0 && i + 1 < group.results.length) {
          await sleep(260);
        }
      }
      await sleep(group.results.length >= 10 ? 1650 : group.results.length <= 4 ? 1150 : 1400);
      return true;
    }

    function closePreview(immediate = false, userInitiated = false) {
      clearTimeout(previewCloseTimer);
      if (userInitiated) sidePanelDismissed = true;
      if (immediate) {
        chatView.classList.remove("preview-open", "preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
        return;
      }
      if (!chatView.classList.contains("preview-open")) {
        chatView.classList.remove("preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
        return;
      }
      chatView.classList.remove("preview-open");
      chatView.classList.add("preview-closing");
      previewCloseTimer = setTimeout(() => {
        chatView.classList.remove("preview-closing");
        reportPreview.setAttribute("aria-hidden", "true");
      }, 320);
    }

    function addProcessCard(output) {
      const card = document.createElement("div");
      card.className = "process-card planning-card";
      card.dataset.liveProcess = "";
      card.innerHTML = `
        <button class="process-toggle" type="button" aria-expanded="true">
          <span class="chevron">⌄</span>
          <span class="planning-spinner"></span>
          <span data-process-summary>正在规划</span>
        </button>
        <div class="process-list">
          <div class="process-step active planning-step">
            <div class="step-dot">1</div>
            <div class="step-copy">
              <div class="planning-nodes"></div>
            </div>
          </div>
        </div>
      `;
      card.querySelector(".process-toggle").addEventListener("click", () => {
        const collapsed = card.classList.toggle("collapsed");
        card.querySelector(".process-toggle").setAttribute("aria-expanded", String(!collapsed));
      });
      card.addEventListener("click", (event) => {
        const skillLink = event.target.closest("[data-open-skill]");
        if (skillLink) {
          event.stopPropagation();
          activeSkillId = skillLink.dataset.openSkill;
          activeSkillFilter = "all";
          showSkills();
          openDetail(buildSkillDetailHtml(skillCatalog.find((skill) => skill.id === activeSkillId)));
          return;
        }
        const searchChip = event.target.closest("[data-search-key]");
        if (searchChip) {
          openSearchPanel(searchChip.dataset.searchKey, searchChip.dataset.searchQuery);
          return;
        }
        const toggle = event.target.closest("[data-section-toggle]");
        if (!toggle) return;
        toggle.closest(".step-section")?.classList.toggle("collapsed");
      });
      card.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const skillLink = event.target.closest("[data-open-skill]");
        if (skillLink) {
          event.preventDefault();
          activeSkillId = skillLink.dataset.openSkill;
          activeSkillFilter = "all";
          showSkills();
          openDetail(buildSkillDetailHtml(skillCatalog.find((skill) => skill.id === activeSkillId)));
          return;
        }
        const searchChip = event.target.closest("[data-search-key]");
        if (!searchChip) return;
        event.preventDefault();
        openSearchPanel(searchChip.dataset.searchKey, searchChip.dataset.searchQuery);
      });
      output.appendChild(card);
      scrollToBottom();
      return card;
    }

    function renderActionChip(chip, searchKey = "") {
      const chipSearchKey = chip.searchKey || searchKey;
      const canOpenSearch = chipSearchKey && chip.icon === "search";
      const attrs = canOpenSearch
        ? ` data-search-key="${escapeHtml(chipSearchKey)}" data-search-query="${escapeHtml(chip.label)}" role="button" tabindex="0" title="查看检索结果"`
        : "";
      return `<span class="step-chip queued${canOpenSearch ? " search-link" : ""}" data-chip${attrs}>${chipIcon(chip.icon)}${escapeHtml(chip.label)}</span>`;
    }

    function renderSection(section) {
      const isAgent = Boolean(section.agentName);
      const skill = section.skillId ? skillCatalog.find((item) => item.id === section.skillId) : null;
      return `
        <div class="step-section${isAgent ? " agent-section" : ""}">
          <button class="section-toggle" type="button" data-section-toggle>
            <span class="section-title">
              ${stepTitleIcon(section.icon)}
              ${escapeHtml(section.title)}
            </span>
            <span class="section-actions">
              ${isAgent ? `
                <span class="agent-tag">
                  <span class="agent-mark">${iconSvg("agent")}</span>
                  <span class="agent-name">${escapeHtml(section.agentName)}</span>
                </span>
              ` : ""}
              ${skill ? `
                <span class="agent-tag skill-tag-link" role="button" tabindex="0" data-open-skill="${escapeHtml(skill.id)}">
                  <span class="agent-mark">${iconSvg("plan")}</span>
                  <span class="agent-name">${escapeHtml(skill.name)}</span>
                </span>
              ` : ""}
              <span class="section-chevron">⌄</span>
            </span>
          </button>
          <p class="section-desc">${escapeHtml(section.text)}</p>
          <div class="step-chips">
            ${section.chips.map((chip) => renderActionChip(chip, section.searchKey)).join("")}
          </div>
          <div class="section-summary">${chipIcon(isAgent ? "agent" : "shield")}${escapeHtml(section.summary || "已完成")}</div>
        </div>
      `;
    }

    function appendProcessStep(card, step, index) {
      const list = card.querySelector(".process-list");
      const el = document.createElement("div");
      el.className = "process-step active";
      el.dataset.step = index;
      el.dataset.summary = step.summary || `${step.title}已完成`;
      const sections = step.sections || [{
        title: step.title,
        icon: step.icon,
        text: step.text,
        summary: step.summary,
        chips: step.chips || []
      }];
      const inner = `<div class="step-sections">${sections.map(renderSection).join("")}</div>`;
      el.innerHTML = `
        <div class="step-dot">${index + 1}</div>
        <div class="step-copy">
          ${step.sections ? `<strong>${stepTitleIcon(step.icon)}${step.title}</strong><p>${step.text}</p>` : ""}
          ${inner}
        </div>
      `;
      list.appendChild(el);
      scrollToBottom();
      return el;
    }

    function compactProcessStep(stepEl) {
      if (stepEl.classList.contains("compacted")) return;
      stepEl.classList.add("compacted");
      const sections = stepEl.querySelectorAll(".step-section");
      if (sections.length) {
        sections.forEach((section) => section.classList.add("collapsed"));
        return;
      }
      const copy = stepEl.querySelector(".step-copy");
      const summary = document.createElement("div");
      summary.className = "step-summary";
      summary.innerHTML = `${chipIcon("shield")}${escapeHtml(stepEl.dataset.summary || "已完成")}`;
      copy.appendChild(summary);
    }

    function expandProcessStep(stepEl) {
      stepEl.classList.remove("compacted");
      stepEl.querySelector(".step-summary")?.remove();
      stepEl.querySelectorAll(".step-section.collapsed").forEach((section) => section.classList.remove("collapsed"));
    }

    async function revealProcessStep(stepEl, runId, timings) {
      const chips = Array.from(stepEl.querySelectorAll("[data-chip]"));
      for (let i = 0; i < chips.length; i += 1) {
        if (activeRunId !== runId) return false;
        const chip = chips[i];
        chip.classList.remove("queued");
        chip.classList.add("loading");
        if (chip.dataset.searchKey) {
          const searchComplete = await revealSearchResultsForChip(chip.dataset.searchKey, runId);
          if (!searchComplete) return false;
        } else {
          scrollToBottom();
          await sleep(timings.chip[i] || timings.chip[0] || 720);
          if (activeRunId !== runId) return false;
        }
        chip.classList.remove("loading");
        chip.classList.add("done");
        scrollToBottom();
      }
      await sleep(timings.after || 260);
      return true;
    }

    async function showPlannedNodes(card, runId) {
      const planning = card.querySelector(".planning-step");
      if (!planning) return false;
      planning.querySelector(".planning-nodes").innerHTML = processSteps
        .map((step, index) => `<span class="plan-node queued" data-chip><span class="plan-index">${index + 1}</span><span class="plan-title">${escapeHtml(step.title)}</span></span>`)
        .join("");
      card.classList.add("planned");
      card.querySelector("[data-process-summary]").textContent = `已规划 ${processSteps.length} 个步骤`;
      const keepGoing = await revealProcessStep(planning, runId, {
        chip: [300, 350, 350, 320, 350, 300],
        after: 720
      });
      if (!keepGoing) return false;
      planning.classList.remove("active");
      planning.classList.add("done");
      planning.querySelector(".step-dot").textContent = "✓";
      return true;
    }

    function setProcessState(card, activeIndex, steps = processSteps) {
      card.querySelectorAll(".process-step").forEach((step, index) => {
        step.classList.toggle("active", index === activeIndex);
        step.classList.toggle("done", index < activeIndex);
        if (index < activeIndex) {
          compactProcessStep(step);
        } else if (index === activeIndex) {
          expandProcessStep(step);
        }
        const dot = step.querySelector(".step-dot");
        dot.textContent = index < activeIndex ? "✓" : index + 1;
      });
      if (activeIndex >= steps.length) {
        card.querySelector("[data-process-summary]").textContent = "执行流程已完成";
      }
    }

      const card = document.createElement("div");
      card.className = "process-card qa-process-card";
      card.dataset.liveProcess = "";
      card.innerHTML = `
        <button class="process-toggle" type="button" aria-expanded="true">
          <span class="chevron">⌄</span>
          <span data-process-summary>处理过程</span>
        </button>

      `;
      card.querySelector(".process-toggle").addEventListener("click", () => {

        card.querySelector(".process-toggle").setAttribute("aria-expanded", String(!collapsed));

      card.addEventListener("click", (event) => {
        const skillLink = event.target.closest("[data-open-skill]");
        if (skillLink) {

    function buildQaAnswer(question) {
      const topic = question || "这个问题";
      return `针对“${topic}”，可以先按“事实信号、约束条件、行动阈值”三个层面做判断。

首先确认问题对应的对象和时间范围，避免把短期扰动误判为长期趋势。其次补充近期公开信息，例如价格、天气、港口、履约、政策或信用风险等信号，判断这些信号是否已经影响到业务执行。最后把判断转换成可操作阈值：什么情况下继续观察，什么情况下需要升级审批，什么情况下应立即调整计划。

如果用于实际业务决策，建议进一步补齐实时数据和内部约束条件，再输出最终口径。当前可以先作为初步判断框架使用。`;
    }

    function scrollToBottom() {
      if (suppressAutoScroll) return;
      isAutoScrolling = true;
      clearTimeout(autoScrollTimer);
      requestAnimationFrame(() => {
        messages.scrollTo({ top: messages.scrollHeight, behavior: "smooth" });
        autoScrollTimer = setTimeout(() => {
          isAutoScrolling = false;
        }, 360);
      });
    }

    function markMessagesScrolling() {
      if (isAutoScrolling) {
        messages.classList.remove("is-scrolling");
        return;
      }
      messages.classList.add("is-scrolling");
      clearTimeout(scrollHideTimer);
      scrollHideTimer = setTimeout(() => {
        messages.classList.remove("is-scrolling");
      }, 720);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function runAnalysis(scenarioKey, customQuestion, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(options.toolState || activeToolState);
      const capabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeToolState = toolState;
      activeRunToolState = toolState;
      activeCapabilityState = capabilityState;
      activeRunCapabilityState = capabilityState;
      sidePanelDismissed = false;
      activeAutoSearchKey = "";
      activeAutoSearchCount = 0;
      const baseData = scenarioData[scenarioKey] || scenarioData.custom;
      const data = { ...baseData, question: customQuestion || baseData.question };

      try {
        activeHistoryQuestion = data.question;
        if (options.saveHistory !== false) {
          addHistoryEntry(data.question, scenarioKey, toolState, capabilityState);
        } else {
          renderHistory();
        }
        showChat({ toolState, capabilityState });
        addMessage("user", data.question, options.attachments || [], capabilityState);

        const assistantOutput = createAssistantTurn();
        const processCard = addProcessCard(assistantOutput);
        requestAnimationFrame(forcePageTop);
        await sleep(4200);
        if (activeRunId !== runId) return;
        suppressAutoScroll = false;
        const planned = await showPlannedNodes(processCard, runId);
        if (!planned || activeRunId !== runId) return;
        await sleep(1200);
        if (activeRunId !== runId) return;
        processCard.querySelector(".planning-step")?.remove();
        processCard.classList.remove("planning-card");
        processCard.querySelector("[data-process-summary]").textContent = "执行流程";

        for (let i = 0; i < processSteps.length; i += 1) {
          if (activeRunId !== runId) return;
          const stepEl = appendProcessStep(processCard, processSteps[i], i);
          setProcessState(processCard, i);
          const keepGoing = await revealProcessStep(stepEl, runId, processTimings[i] || { chip: [760], after: 420, pause: 220 });
          if (!keepGoing) return;
          setProcessState(processCard, i + 1);
          await sleep((processTimings[i] || { pause: 220 }).pause);
        }

        if (activeRunId !== runId) return;
        setProcessState(processCard, processSteps.length);
        if (!sidePanelDismissed) {
          closePreview(false);
        }
        await addResultBubble(assistantOutput, data, runId);
        if (activeRunId !== runId) return;
        const reportCard = addReportFileCard(assistantOutput, data);
        if (reportCard) {
          openReportPanel({
            auto: true,
            title: data.fileTitle,
            fileHref: data.fileHref,
            previewHref: data.previewHref
          });
        }
        saveHistorySnapshot(data.question);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    async function runQaAnalysis(question) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(activeToolState);
      const capabilityState = normalizeCapabilityState(activeCapabilityState);
      activeCapabilityState = capabilityState;
      activeRunToolState = toolState;
      activeRunCapabilityState = capabilityState;
      sidePanelDismissed = false;
      activeAutoSearchKey = "";
      activeAutoSearchCount = 0;
      const profile = qaCaseProfiles[question] || {};
      const steps = profile.steps || qaProcessSteps;
      const data = {
        question,
        final: profile.answer || buildQaAnswer(question)
      };

      try {
        activeHistoryQuestion = data.question;
        addHistoryEntry(data.question, "custom", toolState, capabilityState);
        showChat({ toolState, capabilityState });
        addMessage("user", data.question, [], capabilityState);

        const assistantOutput = createAssistantTurn();
        const processCard = addQaProcessCard(assistantOutput);
        suppressAutoScroll = false;
        await sleep(520);
        for (let i = 0; i < steps.length; i += 1) {
          if (activeRunId !== runId) return;
          const stepEl = appendProcessStep(processCard, steps[i], i);
          setProcessState(processCard, i, steps);
          const keepGoing = await revealProcessStep(stepEl, runId, qaProcessTimings[i] || { chip: [520], after: 320, pause: 120 });
          if (!keepGoing) return;
          setProcessState(processCard, i + 1, steps);
          await sleep((qaProcessTimings[i] || { pause: 120 }).pause);
        }

        if (activeRunId !== runId) return;
        setProcessState(processCard, steps.length, steps);
        if (!sidePanelDismissed) {
          closePreview(false);
        }
        await addResultBubble(assistantOutput, data, runId);
        saveHistorySnapshot(data.question);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    async function runFollowUp(question, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      activeToolState = normalizeToolState(options.toolState || activeToolState);
      activeCapabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeRunToolState = activeToolState;
      activeRunCapabilityState = activeCapabilityState;
      applyToolState(questionForm, activeToolState);
      applyToolState(chatForm, activeToolState);
      renderCapabilityControls();
      try {
        addMessage("user", question, [], activeRunCapabilityState);

        const assistantOutput = createAssistantTurn();
        await sleep(360);
        if (activeRunId !== runId) return;
        const capabilityText = capabilityDisplayLabel(activeRunCapabilityState);
        await addAssistantBubble(assistantOutput, `${capabilityText ? `已指定${capabilityText}。` : ""}当前为演示内容，暂不支持追问。`, runId);
        if (activeHistoryQuestion) {
          saveHistorySnapshot(activeHistoryQuestion);
        }
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    async function runUploadDemo(question, attachments, options = {}) {
      const runId = activeRunId + 1;
      activeRunId = runId;
      setGenerating(true);
      const toolState = normalizeToolState(options.toolState || activeToolState);
      const capabilityState = normalizeCapabilityState(options.capabilityState ?? activeCapabilityState);
      activeToolState = toolState;
      activeRunToolState = toolState;
      activeCapabilityState = capabilityState;
      activeRunCapabilityState = capabilityState;
      const displayQuestion = question || "请基于上传文件进行分析";
      try {
        if (!options.preserveChat) {
          activeHistoryQuestion = displayQuestion;
          addHistoryEntry(displayQuestion, "custom", toolState, capabilityState);
          showChat({ toolState, capabilityState });
        } else {
          applyToolState(chatForm, toolState);
          applyToolState(questionForm, toolState);
          renderCapabilityControls();
        }
        addMessage("user", displayQuestion, attachments, capabilityState);

        const assistantOutput = createAssistantTurn();
        await sleep(420);
        if (activeRunId !== runId) return;
        const fileNames = attachments.map((file) => `《${file.name}》`).join("、");
        await addAssistantBubble(assistantOutput, `已收到 ${fileNames || "上传文件"}。当前版本暂未接入文件解析能力，因此不会读取文件内容；后续接入 LLM 和解析服务后，会将文件内容作为研判上下文参与分析。`, runId);
        saveHistorySnapshot(options.preserveChat && activeHistoryQuestion ? activeHistoryQuestion : displayQuestion);
      } finally {
        if (activeRunId === runId) {
          setGenerating(false);
        }
      }
    }

    questionInput.addEventListener("input", () => {
      selectedScenarioKey = null;
      updateSendStates();
    });
    bindTextareaSubmit(questionInput, questionForm);

    questionForm.addEventListener("submit", (event) => {
      event.preventDefault();
      event.submitter?.blur();
      const question = questionInput.value.trim();
      if ((!question && pendingAttachments.home.length === 0) || isGenerating) return;
      const toolState = syncToolStateFrom(questionForm);
      const capabilityState = normalizeCapabilityState(activeCapabilityState);
      const attachments = takeAttachments("home");
      questionInput.value = "";
      const scenarioKey = selectedScenarioKey || resolveScenarioKeyFromQuestion(question);
      if (attachments.length && !scenarioKey) {
        selectedScenarioKey = null;
        updateSendStates();
        runUploadDemo(question, attachments, { toolState, capabilityState });
        return;
      }
      if (scenarioKey && scenarioKey !== "custom") {
        runAnalysis(scenarioKey, question || "请基于上传文件进行分析", { attachments, toolState, capabilityState });
        return;
      }
      activeToolState = toolState;
      activeCapabilityState = capabilityState;
      runQaAnalysis(question || "请基于这个问题给出简要判断");
    });

    document.querySelectorAll(".trend-card").forEach((card) => {
      card.addEventListener("click", () => {
        const scenario = scenarioData[card.dataset.scenario];
        if (!scenario) return;
        selectedScenarioKey = card.dataset.scenario;
        questionInput.value = scenario.question;
        updateSendStates();
        questionInput.focus();
      });
    });

    chatInput.addEventListener("input", () => {
      updateSendStates();
      chatInput.style.height = "auto";
      chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
      syncCapabilityChipLayout();
    });
    bindTextareaSubmit(chatInput, chatForm);

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const question = chatInput.value.trim();
      if ((!question && pendingAttachments.chat.length === 0) || isGenerating) return;
      const toolState = syncToolStateFrom(chatForm);
      const capabilityState = normalizeCapabilityState(activeCapabilityState);
      const attachments = takeAttachments("chat");
      chatInput.value = "";
      chatInput.style.height = "auto";
      updateSendStates();
      if (attachments.length) {
        runUploadDemo(question, attachments, { preserveChat: true, toolState, capabilityState });
        return;
      }
      runFollowUp(question, { toolState, capabilityState });
    });

    messages.addEventListener("scroll", markMessagesScrolling, { passive: true });

    document.addEventListener("click", (event) => {
      const toggle = event.target.closest("[data-tool-toggle]");
      if (!toggle) return;
      if (toggle.getAttribute("aria-disabled") === "true") return;
      const next = toggle.getAttribute("aria-pressed") !== "true";
      setToolButtonState(toggle, next);
      syncToolStateFrom(toggle.closest("form") || document);
    });

    document.addEventListener("click", (event) => {
      const start = event.target.closest("[data-start-capability]");

        if (action === "rename") {
          startInlineRename(row, index);

        if (action === "favorite") {
          conversationHistory[index] = { ...record, favorite: !record.favorite, updatedAt: Date.now() };
          persistHistory();
          closeHistoryMenus();
          renderHistory();
          return;
        }
        if (action === "delete" && confirm("删除这条历史记录？")) {

          }
          conversationHistory.splice(index, 1);

        return;

        closeHistoryMenus();

          renderHistory();

      agentsView.classList.add("active");
      switchPluginContent("agents", { updateHash: false });
    } else if (location.hash === "#skills") {
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.add("active");
      subscriptionsView.classList.remove("active");
      skillsView?.classList.remove("active");
      switchPluginContent("skills", { updateHash: false });
    } else if (location.hash === "#subscriptions") {
      homeView.classList.remove("active");
      reportsView.classList.remove("active");
      agentsView.classList.remove("active");
      skillsView?.classList.remove("active");
      subscriptionsView.classList.add("active");
      setSidebarActive("subscriptions");
      resetSubscriptionCalendarToToday();
      setSubscriptionView(activeSubscriptionView, { render: false });
      activeEditingSubscriptionId = "";
      renderSubscriptions();
    } else {
      setSidebarActive("home");
    }
  </script>


</body>

</html>
