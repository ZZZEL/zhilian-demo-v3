<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #fff; color: #151b26; font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.78; letter-spacing: 0; }
.doc { max-width: 760px; margin: 0 auto; padding: 38px 46px 64px; }
h1 { margin: 0 0 24px; font-size: 25px; line-height: 1.3; letter-spacing: 0; }
h2 { margin: 30px 0 12px; font-size: 18px; line-height: 1.45; border-top: 1px solid #e4e9f0; padding-top: 20px; }
h3 { margin: 16px 0 8px; font-size: 15px; line-height: 1.5; color: #202938; }
p { margin: 0 0 10px; font-size: 13.5px; color: #3f4857; }
ul { padding-left: 20px; margin: 0 0 14px; color: #3f4857; font-size: 13.5px; }
li { margin-bottom: 6px; }
@media (max-width: 640px) { .doc { padding: 26px 22px 44px; } h1 { font-size: 22px; } }
</style>
</head>
<body>
<article class="doc">
  <h1>供应链安全库存清单</h1>
  <h2>摘要</h2>
  <p>面向华东、华南仓网的库存盘点文档，聚焦可用库存、在途批次、安全库存阈值及补充采购建议，支持仓储协同与履约排产决策。</p>
  <h2>核心字段</h2>
  <h3>库存状态</h3>
  <ul>
    <li>仓库：华东（华南）关键节点仓库的库存可见性</li>
    <li>品类：粮食相关关键品种库存占比与周转状况</li>
    <li>安全库存：与最近 3 个月履约波动对齐后的阈值</li>
    <li>预警：库存低于阈值时触发补给与调拨动作</li>
  </ul>
  <h3>链路建议</h3>
  <ul>
    <li>先补齐安全库存线以下仓位，优先保障高优先级履约批次</li>
    <li>结合在途批次到港节奏，提前预判短缺窗口</li>
    <li>同步更新补货来源、运输时点与可替代仓位策略</li>
  </ul>
</article>
</body>
</html>
